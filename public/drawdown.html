<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <script src="app-config.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="投资助手">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>投资助手 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-input-bg: #e9e9eb;
            --ios-primary: #007aff;
            --ios-red: #ff3b30;
            --ios-green: #34c759;
            --ios-orange: #ff9500;
            --ios-text: #1c1c1e;
            --ios-secondary: #8e8e93;
            --ios-border: rgba(0,0,0,0.1);
            --ios-shadow: rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --ios-bg: #000000;
            --ios-card: #1c1c1e;
            --ios-input-bg: #2c2c2e;
            --ios-text: #ffffff;
            --ios-secondary: #a1a1a6;
            --ios-border: rgba(255,255,255,0.1);
            --ios-shadow: rgba(0,0,0,0.3);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            background-color: var(--ios-bg);
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            color: var(--ios-text);
            display: flex; justify-content: center;
            padding: env(safe-area-inset-top) 16px 40px;
            transition: background-color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }
        .theme-toggle {
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .theme-toggle:active { opacity: 0.4; }

        /* 分段切换器 */
        .segmented-control {
            background: rgba(118, 118, 128, 0.12);
            border-radius: 12px;
            display: flex;
            padding: 4px;
            margin-bottom: 20px;
        }
        .segment {
            flex: 1;
            border: none;
            background: none;
            padding: 12px 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--ios-secondary);
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .segment.active {
            background: var(--ios-card);
            color: var(--ios-primary);
            box-shadow: 0 2px 8px var(--ios-shadow);
        }

        .tool-content {
            display: none;
        }
        .tool-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 核心数值卡片 */
        .display-card {
            background: var(--ios-card);
            border-radius: 20px;
            padding: 28px 24px;
            text-align: center;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px var(--ios-shadow);
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        .label {
            font-size: 12px;
            color: var(--ios-secondary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .value {
            font-size: 42px;
            font-weight: 800;
            margin: 10px 0;
            letter-spacing: -1.5px;
            font-variant-numeric: tabular-nums;
        }
        .sub-value {
            font-size: 15px;
            font-weight: 500;
            min-height: 22px;
            color: var(--ios-secondary);
        }

        /* 输入区域 */
        .input-group {
            background: var(--ios-card);
            border-radius: 20px;
            box-shadow: 0 4px 20px var(--ios-shadow);
            transition: background-color 0.3s, transform 0.2s;
        }
        .input-group:active {
            transform: scale(0.995);
        }
        .row {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 0.5px solid var(--ios-border);
        }
        .row:last-child { border-bottom: none; }
        .row label {
            font-size: 16px;
            font-weight: 500;
            flex: 1;
        }
        .row input {
            background: none;
            border: none;
            color: var(--ios-text);
            font-size: 16px;
            text-align: right;
            width: 200px;
            outline: none;
            font-family: inherit;
            font-weight: 600;
        }
        .row input::placeholder { color: var(--ios-secondary); opacity: 0.6; }
        .row .unit {
            color: var(--ios-secondary);
            margin-left: 8px;
            font-size: 14px;
            width: 24px;
            text-align: right;
        }

        /* 按钮 */
        .btn-clear {
            display: block;
            margin: 20px auto 0;
            color: var(--ios-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            background: none;
            border: none;
            padding: 8px 16px;
        }

        .up { color: var(--ios-red) !important; }
        .down { color: var(--ios-green) !important; }
        .highlight { color: var(--ios-primary); font-weight: 600; }

        /* 结果提示 */
        .tip-success { color: var(--ios-green); }
        .tip-warning { color: var(--ios-orange); }

        /* 基金回撤模块 */
        .btn-analyze {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--ios-primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 16px;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
            letter-spacing: 0.5px;
        }
        .btn-analyze:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.2);
        }
        .btn-analyze:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .fund-result-card {
            background: var(--ios-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px var(--ios-shadow);
        }
        .fund-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 0.5px solid var(--ios-border);
        }
        .fund-code {
            font-size: 16px;
            font-weight: 600;
        }
        .fund-name {
            font-size: 12px;
            color: var(--ios-secondary);
            margin-top: 2px;
        }
        .fund-date-range {
            font-size: 12px;
            color: var(--ios-secondary);
        }
        .fund-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }
        .fund-stats.has-estimate {
            grid-template-columns: 1fr 1fr 1fr 1fr;
        }
        .stat-item {
            text-align: center;
            min-width: 0;
        }
        .stat-label {
            font-size: 11px;
            color: var(--ios-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .stat-value {
            font-size: 22px;
            font-weight: 700;
            margin-top: 4px;
            word-break: keep-all;
        }
        .stat-label {
            font-size: 11px;
            color: var(--ios-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-top: 4px;
        }
        .stat-value.negative { color: var(--ios-green); }
        .stat-value.positive { color: var(--ios-red); }
        .stat-sub {
            font-size: 12px;
            color: var(--ios-secondary);
            margin-top: 2px;
        }
        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: var(--ios-secondary);
        }
        .error-msg {
            color: var(--ios-red);
            text-align: center;
            padding: 20px;
        }

        /* 净值曲线图 */
        .chart-container {
            margin-top: 16px;
            padding: 12px;
            background: var(--ios-card);
            border-radius: 12px;
        }
        .chart-container canvas {
            width: 100% !important;
            height: 150px !important;
        }

        /* 多选下拉框样式 */
        .fund-select-wrapper {
            position: relative;
            width: 140px;
        }
        .fund-select-display {
            background: none;
            border: none;
            color: var(--ios-text);
            font-size: 16px;
            text-align: right;
            width: 100%;
            outline: none;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .fund-select-display::placeholder {
            color: var(--ios-secondary);
            opacity: 0.6;
            font-weight: normal;
        }
        .fund-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: var(--ios-card);
            border-radius: 12px;
            box-shadow: 0 4px 20px var(--ios-shadow);
            z-index: 1000;
            min-width: 280px;
            width: 280px;
            display: none;
            overflow: hidden;
        }
        .fund-dropdown * {
            box-sizing: border-box;
        }
        #fund-options-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .fund-dropdown.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }
        .fund-option {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background-color 0.15s;
            border-bottom: 0.5px solid var(--ios-border);
        }
        .fund-option:last-child {
            border-bottom: none;
        }
        .fund-option:hover {
            background: rgba(0, 122, 255, 0.08);
        }
        .fund-option-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--ios-secondary);
            border-radius: 6px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            background: var(--ios-card);
            box-sizing: border-box;
        }
        .fund-option.selected .fund-option-checkbox {
            background: var(--ios-primary);
            border-color: var(--ios-primary);
        }
        .fund-option-checkbox::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
            display: none;
            line-height: 1;
        }
        .fund-option.selected .fund-option-checkbox::after {
            display: block;
        }
        .fund-option-info {
            flex: 1;
            min-width: 0;
        }
        .fund-option-code {
            font-size: 14px;
            font-weight: 600;
            color: var(--ios-text);
        }
        .fund-option-name {
            font-size: 12px;
            color: var(--ios-secondary);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .fund-select-actions {
            padding: 12px 16px;
            border-top: 0.5px solid var(--ios-border);
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }
        .fund-select-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
            flex: 1;
        }
        .fund-select-btn:active {
            opacity: 0.7;
        }
        .fund-select-btn-clear {
            background: rgba(0, 122, 255, 0.1);
            color: var(--ios-primary);
        }
        .fund-select-btn-all {
            background: var(--ios-primary);
            color: white;
        }
        .fund-search-box {
            padding: 12px 12px;
            border-bottom: 0.5px solid var(--ios-border);
            position: relative;
            z-index: 10;
            pointer-events: auto;
            overflow: visible;
        }
        .fund-search-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--ios-input-bg);
            border: none;
            border-radius: 10px;
            font-size: 14px;
            color: var(--ios-text);
            outline: none;
            font-family: inherit;
            position: relative;
            z-index: 999;
            pointer-events: auto;
            display: block;
            box-sizing: border-box;
            cursor: text;
            text-indent: 0;
            margin: 0;
        }
        .fund-search-input::placeholder {
            color: var(--ios-secondary);
            opacity: 0.6;
        }
        .days-preset {
            display: flex;
            gap: 6px;
            padding: 8px 16px 16px;
            flex-wrap: wrap;
        }
        .days-preset-btn {
            padding: 6px 12px;
            background: rgba(0, 122, 255, 0.1);
            border: none;
            border-radius: 8px;
            font-size: 12px;
            color: var(--ios-primary);
            cursor: pointer;
            font-weight: 500;
            font-family: inherit;
        }
        .days-preset-btn.active {
            background: var(--ios-primary);
            color: white;
        }
        .compare-chart-container {
            background: var(--ios-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px var(--ios-shadow);
        }
        .compare-chart-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--ios-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .compare-chart-container canvas {
            width: 100% !important;
            height: 200px !important;
        }
    </style>
</head>
<body data-theme="light">

    <div class="container">
    <div class="header">
        <h1>投资助手</h1>
        <div class="theme-toggle" onclick="toggleTheme()">&#127769;</div>
    </div>

    <div class="segmented-control">
        <button class="segment active" onclick="switchTab(0)">基金回撤</button>
        <button class="segment" onclick="switchTab(1)">成本助手</button>
        <button class="segment" onclick="switchTab(2)">回撤计算</button>
    </div>

    <!-- 模块一：基金回撤 -->
    <div id="tab-fund" class="tool-content active">
        <div class="input-group" style="margin-bottom: 16px;">
            <div class="row">
                <label>基金代码</label>
                <div class="fund-select-wrapper">
                    <button type="button" class="fund-select-display" id="fund-select-display">选择基金</button>
                    <input type="hidden" id="in-fund-codes">
                    <div class="fund-dropdown" id="fund-dropdown">
                        <div class="fund-search-box">
                            <input type="text" class="fund-search-input" id="fund-search-input" placeholder="搜索基金代码或名称" oninput="filterFundOptions(this.value)">
                        </div>
                        <div id="fund-options-list"></div>
                        <div class="fund-select-actions">
                            <button type="button" class="fund-select-btn fund-select-btn-clear" onclick="clearFundSelection()">清空</button>
                            <button type="button" class="fund-select-btn fund-select-btn-all" onclick="selectAllFunds()">全选</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <label>分析天数</label>
                <input type="number" id="in-fund-days" placeholder="90" value="90" oninput="onDaysInputChange()">
                <!-- <span class="unit">天</span> -->
            </div>
            <div class="days-preset">
                <button type="button" class="days-preset-btn" data-days="30" onclick="setDaysPreset(30)">近1月</button>
                <button type="button" class="days-preset-btn active" data-days="90" onclick="setDaysPreset(90)">近3月</button>
                <button type="button" class="days-preset-btn" data-days="180" onclick="setDaysPreset(180)">近半年</button>
                <button type="button" class="days-preset-btn" data-days="365" onclick="setDaysPreset(365)">近1年</button>
            </div>
        </div>
        <button class="btn-analyze" onclick="analyzeFundDrawdown()">开始分析</button>
        <div id="fund-results"></div>
    </div>

    <!-- 模块二：成本助手 -->
    <div id="tab-cost" class="tool-content">
        <div class="display-card" id="card-cost">
            <div class="label">推算成本点位</div>
            <div class="value" id="res-cost-point">0.00</div>
            <div class="sub-value" id="res-cost-tip">输入数据开始推算</div>
        </div>
        <div class="input-group">
            <div class="row">
                <label>当前点位</label>
                <input type="number" id="in-now-p" placeholder="4690" oninput="runCost()">
                <span class="unit">点</span>
            </div>
            <div class="row">
                <label>收益率</label>
                <input type="number" id="in-now-y" placeholder="-14.61" oninput="runCost()">
                <span class="unit">%</span>
            </div>
            <div class="row">
                <label>目标成本</label>
                <input type="number" id="in-target-p" placeholder="5000" oninput="runCost()">
                <span class="unit">点</span>
            </div>
        </div>
                <button class="btn-clear" onclick="clearInputs('cost')">重置所有数值</button>
    </div>

    <!-- 模块三：回撤计算 -->
    <div id="tab-drawdown" class="tool-content">
        <div class="display-card" id="card-dd">
            <div class="label" id="dd-label">实际回撤率</div>
            <div class="value" id="res-dd-value">0.00%</div>
            <div class="sub-value" id="res-dd-tip">请输入比例</div>
        </div>
        <div class="input-group">
            <div class="row">
                <label>前次高点收益</label>
                <input type="number" id="in-h-v" placeholder="0.00" oninput="runDD()">
                <span class="unit">%</span>
            </div>
            <div class="row">
                <label>当前收益率</label>
                <input type="number" id="in-c-v" placeholder="-14.61" oninput="runDD()">
                <span class="unit">%</span>
            </div>
        </div>
                <button class="btn-clear" onclick="clearInputs('dd')">重置所有数值</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'invest_drawdown_v1';

    // 持仓基金数据
    let holdingFunds = [];
    let selectedFundCodes = new Set();
    let fundQuotes = {}; // 存储基金行情数据

    // 初始化
    window.onload = function() {
        loadData();
        const savedTab = parseInt(localStorage.getItem('invest_dd_tab') || '0');
        switchTab(savedTab);
        loadHoldingFunds();
        initFundSelect();
    };

    // 主题切换
    function toggleTheme() {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('invest_dd_theme', isDark ? 'light' : 'dark');
    }

    // 加载保存的主题
    (function() {
        const savedTheme = localStorage.getItem('invest_dd_theme');
        if (savedTheme) {
            document.body.setAttribute('data-theme', savedTheme);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.setAttribute('data-theme', 'dark');
        }
    })();

    function switchTab(index) {
        const tabs = document.querySelectorAll('.tool-content');
        const segments = document.querySelectorAll('.segment');
        tabs.forEach((t, i) => t.classList.toggle('active', i === index));
        segments.forEach((s, i) => s.classList.toggle('active', i === index));
        localStorage.setItem('invest_dd_tab', index);
    }

    function runCost() {
        const p = parseFloat(document.getElementById('in-now-p').value);
        const y = parseFloat(document.getElementById('in-now-y').value);
        const t = parseFloat(document.getElementById('in-target-p').value);
        const resP = document.getElementById('res-cost-point');
        const resT = document.getElementById('res-cost-tip');

        saveData();

        if (isNaN(p) || isNaN(y)) return;

        const cost = p / (1 + (y / 100));
        resP.innerText = cost.toFixed(2);

        if (!isNaN(t)) {
            if (t >= cost) {
                resT.innerHTML = '<span class="tip-success">&#10003; 已达标</span>';
            } else if (t <= p) {
                resT.innerHTML = '<span class="tip-warning">&#9888; 目标低于现价</span>';
            } else {
                const multi = (cost - t) / (t - p);
                resT.innerHTML = '需补仓 <span class="highlight">' + multi.toFixed(2) + '</span> 倍本金';
            }
        } else {
            resT.innerHTML = '回本需上涨 <span class="highlight">' + ((cost/p-1)*100).toFixed(2) + '%</span>';
        }
    }

    function runDD() {
        const h = parseFloat(document.getElementById('in-h-v').value);
        const c = parseFloat(document.getElementById('in-c-v').value);
        const valEl = document.getElementById('res-dd-value');
        const tipEl = document.getElementById('res-dd-tip');
        const labelEl = document.getElementById('dd-label');

        saveData();

        if (isNaN(h) || isNaN(c)) return;

        const dd = ((1+c/100)/(1+h/100) - 1) * 100;
        valEl.innerText = (dd > 0 ? "+" : "") + dd.toFixed(2) + "%";
        valEl.className = "value " + (dd >= 0 ? "up" : "down");
        labelEl.innerText = dd >= 0 ? "资产增长率" : "实际回撤率";

        const diff = Math.abs(c - h).toFixed(2);
        tipEl.innerHTML = dd >= 0
            ? '<span class="up">&#9650;</span> 上涨 ' + diff + ' 个百分点'
            : '<span class="down">&#9660;</span> 回撤 ' + diff + ' 个百分点';
    }

    function clearInputs(type) {
        if(type === 'cost') {
            ['in-now-p', 'in-now-y', 'in-target-p'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('res-cost-point').innerText = '0.00';
            document.getElementById('res-cost-tip').innerText = '输入数据开始推算';
        } else {
            ['in-h-v', 'in-c-v'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('res-dd-value').innerText = '0.00%';
            document.getElementById('res-dd-value').className = 'value';

    // ==================== 基金回撤分析 ====================
    let chartDataList = [];
    
    function drawCompareChart(canvasId, results) {
        const ctx = document.getElementById(canvasId);
        if (!ctx) return;

        // 判断当前主题
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
        const textColor = isDark ? '#a1a1a6' : '#8e8e93';

        // 不同基金的颜色
        const colors = [
            '#007aff', '#ff3b30', '#34c759', '#ff9500', '#af52de',
            '#5856d6', '#ff2d55', '#00c7be'
        ];

        // 找出所有日期的并集
        const allDates = new Set();
        results.forEach(r => {
            if (r.success && r.navList) {
                r.navList.forEach(n => allDates.add(n.date));
            }
        });
        const sortedDates = Array.from(allDates).sort();

        // 构建数据集
        const datasets = [];
        results.forEach((r, idx) => {
            if (!r.success || !r.navList) return;

            // 创建日期到净值的映射
            const navMap = new Map();
            r.navList.forEach(n => navMap.set(n.date, n.nav));

            // 找到第一个有效净值作为基准
            let firstNav = null;
            for (const date of sortedDates) {
                const nav = navMap.get(date);
                if (nav) {
                    firstNav = nav;
                    break;
                }
            }
            if (!firstNav) return;

            // 构建数据点，缺失值用null填充
            const data = [];
            sortedDates.forEach(date => {
                const nav = navMap.get(date);
                if (nav) {
                    data.push(((nav / firstNav) - 1) * 100);
                } else {
                    data.push(null);
                }
            });

            datasets.push({
                label: `${r.fundCode} ${r.fundName || ''}`,
                data: data,
                borderColor: colors[idx % colors.length],
                borderWidth: 2,
                fill: false,
                tension: 0.3,
                pointRadius: 0,
                pointHitRadius: 10,
                spanGaps: true
            });
        });

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: sortedDates.map(d => d.slice(5)),
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: true,
                        position: 'top',
                        labels: {
                            color: textColor,
                            font: { size: 11 },
                            boxWidth: 12
                        }
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: {
                            label: ctx => {
                                if (ctx.parsed.y !== null) {
                                    const sign = ctx.parsed.y >= 0 ? '+' : '';
                                    return `${ctx.dataset.label}: ${sign}${ctx.parsed.y.toFixed(2)}%`;
                                }
                                return '';
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        display: true,
                        grid: { display: false },
                        ticks: {
                            color: textColor,
                            maxTicksLimit: 8,
                            font: { size: 10 }
                        }
                    },
                    y: {
                        display: true,
                        grid: { color: gridColor },
                        ticks: {
                            color: textColor,
                            font: { size: 10 },
                            callback: v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%'
                        }
                    }
                }
            }
        });
    }

    function drawChart(canvasId, navList, peakDate, troughDate) {
        if (!navList || navList.length === 0) return;

        const ctx = document.getElementById(canvasId);
        if (!ctx) return;

        // 判断当前主题
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
        const textColor = isDark ? '#a1a1a6' : '#8e8e93';

        // 以第一个净值为基准，计算涨跌百分比
        const firstNav = navList[0].nav;

        // 构建数据：蓝色线完整显示，橙色线只显示回撤段（更粗）
        const normalData = [];
        const drawdownData = [];

        // 确保日期格式一致
        const normalizeDate = (d) => (d || '').replace(/\//g, '-');
        const pDate = normalizeDate(peakDate);
        const tDate = normalizeDate(troughDate);

        navList.forEach((n, i) => {
            const nDate = normalizeDate(n.date);
            const isInRange = nDate >= pDate && nDate <= tDate;
            const changePercent = ((n.nav / firstNav) - 1) * 100;
            normalData.push(changePercent);           // 蓝色线显示全部
            drawdownData.push(isInRange ? changePercent : null);  // 橙色线只显示回撤段
        });

        // 收集所有出现的年份
        const years = new Set();
        navList.forEach(n => years.add(n.date.slice(0, 4)));
        const yearList = Array.from(years).sort();

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: navList.map(n => n.date), // 保留完整日期
                datasets: [
                    {
                        label: '净值',
                        data: normalData,
                        borderColor: '#007aff',
                        borderWidth: 1.5,
                        fill: false,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHitRadius: 10,
                        spanGaps: true
                    },
                    {
                        label: '回撤段',
                        data: drawdownData,
                        borderColor: '#ff3b30', // 红色，最醒目
                        borderWidth: 3.5,
                        fill: false,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHitRadius: 10,
                        spanGaps: true
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: {
                            label: ctx => {
                                if (ctx.parsed.y !== null) {
                                    const prefix = ctx.datasetIndex === 1 ? '📉 回撤段: ' : '涨跌幅: ';
                                    const sign = ctx.parsed.y >= 0 ? '+' : '';
                                    return prefix + sign + ctx.parsed.y.toFixed(2) + '%';
                                }
                                return '';
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        display: true,
                        grid: { display: false },
                        ticks: {
                            color: textColor,
                            maxTicksLimit: 8,
                            font: { size: 10 },
                            callback: function(value, index) {
                                const dateStr = navList[value]?.date;
                                if (!dateStr) return '';
                                const year = dateStr.slice(0, 4);
                                const monthDay = dateStr.slice(5);

                                // 找到该年份第一次出现的索引
                                const firstIndexForYear = navList.findIndex(n => n.date.slice(0, 4) === year);

                                // 如果是该年份的第一个数据点，显示完整年份
                                if (value === firstIndexForYear) {
                                    return dateStr;
                                }
                                // 否则只显示月-日
                                return monthDay;
                            }
                        }
                    },
                    y: {
                        display: true,
                        grid: { color: gridColor },
                        ticks: {
                            color: textColor,
                            font: { size: 10 },
                            callback: v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%'
                        }
                    }
                }
            }
        });
    }

    // ==================== 基金选择器 ====================
    async function loadHoldingFunds() {
        try {
            const response = await fetch(window.API_BASE_URL + '/api/data');
            const data = await response.json();
            if (data && data.rows) {
                holdingFunds = data.rows.filter(row => row.isFund === true || row.isFund === 'true' || row.isFund === 1);

                // 同时加载基金行情数据
                if (holdingFunds.length > 0) {
                    const params = new URLSearchParams();
                    params.set('items', holdingFunds.map(f => `${f.code}:1`).join(','));
                    const quotesRes = await fetch(window.API_BASE_URL + `/api/quotes?${params.toString()}`);
                    const quotesData = await quotesRes.json();
                    fundQuotes = quotesData?.quotes || {};
                }

                renderFundOptions();
            }
        } catch (e) {
            console.error('加载持仓基金失败:', e);
        }
    }

    function initFundSelect() {
        const displayBtn = document.getElementById('fund-select-display');
        const dropdown = document.getElementById('fund-dropdown');
        const searchInput = document.getElementById('fund-search-input');

        // 点击显示/隐藏下拉框
        displayBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isShowing = dropdown.classList.toggle('show');
            if (isShowing && searchInput) {
                searchInput.value = '';
                renderFundOptions('');
                setTimeout(() => searchInput.focus(), 50);
            }
        });

        // 点击外部关闭下拉框
        document.addEventListener('click', (e) => {
            if (!dropdown.contains(e.target) && e.target !== displayBtn) {
                dropdown.classList.remove('show');
            }
        });

        // 阻止搜索框的点击事件冒泡，防止关闭下拉框
        if (searchInput) {
            searchInput.addEventListener('click', (e) => {
                e.stopPropagation();
            });

            // 回车添加基金
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    e.stopPropagation();
                    const kw = searchInput.value.trim();
                    if (kw && /^\d+$/.test(kw)) {
                        toggleFundSelection(kw);
                        searchInput.value = '';
                        renderFundOptions('');
                    }
                }
            });
        }
    }

    function filterFundOptions(keyword) {
        renderFundOptions(keyword);
    }

    function renderFundOptions(searchKeyword = '') {
        const container = document.getElementById('fund-options-list');
        if (!container) return;

        const kw = searchKeyword.trim();
        const kwLower = kw.toLowerCase();

        // 过滤基金列表
        let filteredFunds = holdingFunds;
        if (kw) {
            filteredFunds = holdingFunds.filter(fund =>
                (fund.code && fund.code.toLowerCase().includes(kwLower)) ||
                (fund.name && fund.name.toLowerCase().includes(kwLower))
            );
        }

        // 按盈亏率排序：亏最多的排前面
        filteredFunds = [...filteredFunds].sort((a, b) => {
            const getProfit = (fund) => {
                const quote = fundQuotes[`${fund.code}:1`];
                if (quote && quote.price && fund.cost && fund.cost > 0) {
                    return ((quote.price - fund.cost) / fund.cost) * 100;
                }
                return 0;
            };
            return getProfit(a) - getProfit(b);
        });

        let html = '';

        // 渲染持仓基金
        html += filteredFunds.map(fund => {
            const quote = fundQuotes[`${fund.code}:1`];
            let profitHtml = '';
            if (quote && quote.price && fund.cost && fund.cost > 0) {
                const profitPercent = ((quote.price - fund.cost) / fund.cost) * 100;
                const color = profitPercent >= 0 ? 'var(--ios-red)' : 'var(--ios-green)';
                const sign = profitPercent >= 0 ? '+' : '';
                profitHtml = `<span style="float: right; color: ${color}; font-weight: 600;">${sign}${profitPercent.toFixed(2)}%</span>`;
            }
            return `
            <div class="fund-option ${selectedFundCodes.has(fund.code) ? 'selected' : ''}" data-code="${fund.code}">
                <div class="fund-option-checkbox"></div>
                <div class="fund-option-info">
                    <div class="fund-option-code">${fund.code}</div>
                    <div class="fund-option-name">${fund.name || ''}${profitHtml}</div>
                </div>
            </div>
        `}).join('');

        // 如果输入了内容且不是持仓基金，显示"添加基金"选项
        if (kw && /^\d+$/.test(kw) && !holdingFunds.some(f => f.code === kw)) {
            if (filteredFunds.length > 0) {
                html += `<div style="height: 0.5px; background: var(--ios-border); margin: 0 16px;"></div>`;
            }
            const isSelected = selectedFundCodes.has(kw);
            html += `
            <div class="fund-option ${isSelected ? 'selected' : ''}" data-code="${kw}" data-custom="true">
                <div class="fund-option-checkbox"></div>
                <div class="fund-option-info">
                    <div class="fund-option-code">${kw}</div>
                    <div class="fund-option-name" style="color: var(--ios-primary);">
                        ${isSelected ? '已添加' : '添加此基金'}
                    </div>
                </div>
            </div>`;
        }

        if (!html) {
            html = '<div style="padding: 20px; text-align: center; color: var(--ios-secondary); font-size: 14px;">暂无持仓基金</div>';
        }

        container.innerHTML = html;

        // 绑定点击事件
        container.querySelectorAll('.fund-option').forEach(opt => {
            const handleClick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                const code = opt.dataset.code;
                toggleFundSelection(code);
            };
            opt.addEventListener('click', handleClick);
        });
    }

    function toggleFundSelection(code) {
        if (selectedFundCodes.has(code)) {
            selectedFundCodes.delete(code);
        } else {
            selectedFundCodes.add(code);
        }
        updateFundSelection();
    }

    function updateFundSelection() {
        // 更新隐藏输入框
        document.getElementById('in-fund-codes').value = Array.from(selectedFundCodes).join(',');

        // 更新显示文本
        const displayBtn = document.getElementById('fund-select-display');
        if (selectedFundCodes.size === 0) {
            displayBtn.textContent = '选择持仓基金';
        } else if (selectedFundCodes.size === 1) {
            const code = Array.from(selectedFundCodes)[0];
            const fund = holdingFunds.find(f => f.code === code);
            displayBtn.textContent = fund ? fund.code : code;
        } else {
            displayBtn.textContent = `已选 ${selectedFundCodes.size} 只`;
        }

        // 更新选项状态
        const options = document.querySelectorAll('.fund-option');
        options.forEach(opt => {
            const code = opt.dataset.code;
            if (selectedFundCodes.has(code)) {
                opt.classList.add('selected');
            } else {
                opt.classList.remove('selected');
            }
        });
    }

    function clearFundSelection() {
        selectedFundCodes.clear();
        updateFundSelection();
    }

    function selectAllFunds() {
        holdingFunds.forEach(fund => selectedFundCodes.add(fund.code));
        updateFundSelection();
    }

    function setDaysPreset(days) {
        document.getElementById('in-fund-days').value = days;
        // 更新按钮状态
        document.querySelectorAll('.days-preset-btn').forEach(btn => {
            btn.classList.toggle('active', parseInt(btn.dataset.days) === days);
        });
    }

    function onDaysInputChange() {
        const inputDays = parseInt(document.getElementById('in-fund-days').value);
        // 检查是否匹配预设值
        let matched = false;
        document.querySelectorAll('.days-preset-btn').forEach(btn => {

        if (!matched) {

                btn.classList.remove('active');
            });
        }

    // ==================== 基金回撤分析 ====================
    async function analyzeFundDrawdown() {
        chartDataList = []; // 重置图表数据列表
        const codesInput = document.getElementById('in-fund-codes').value.trim();
        const days = parseInt(document.getElementById('in-fund-days').value) || 365;
        const resultsEl = document.getElementById('fund-results');
        const btnEl = document.querySelector('.btn-analyze');

        if (!codesInput) {
            resultsEl.innerHTML = '<div class="error-msg">请输入基金代码</div>';
            return;
        }

        const fundCodes = codesInput.split(',').map(c => c.trim()).filter(c => c);

        // 显示加载状态
        btnEl.disabled = true;
        btnEl.textContent = '分析中...';
        resultsEl.innerHTML = '<div class="loading-spinner">正在获取基金数据...</div>';

        try {
            // 先获取基金实时估算数据
            const estimateRes = await fetch(window.API_BASE_URL + '/api/fund-estimate/batch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fundCodes })
            });
            const estimateData = await estimateRes.json();
            const estimates = {};
            if (estimateData.success && estimateData.results) {
                estimateData.results.forEach(r => {
                    if (r.success) {
                        estimates[r.fundCode] = r;
                    }
                });
            }

            // 再获取行情数据（用于 fallback）
            const quotesRes = await fetch(window.API_BASE_URL + '/api/quotes?items=' + fundCodes.map(c => `${c}:1`).join(','));
            const quotesData = await quotesRes.json();
            const quotes = quotesData?.quotes || {};

            // 逐个请求基金数据，显示进度
            const results = [];
            for (let i = 0; i < fundCodes.length; i++) {
                const code = fundCodes[i];
                resultsEl.innerHTML = `<div class="loading-spinner">正在分析 ${i + 1}/${fundCodes.length} - ${code}</div>`;

                try {
                    const res = await fetch(window.API_BASE_URL + '/api/fund-drawdown/' + code + '?days=' + days);
                    const data = await res.json();
                    results.push(data);
                } catch (e) {
                    results.push({
                        success: false,
                        fundCode: code,
                        error: e.message
                    });
                }
            }

            // 按最大回撤从大到小排序
            const sortedResults = [...results].sort((a, b) => {
                if (!a.success) return 1;
                if (!b.success) return -1;
                return parseFloat(b.maxDrawdown.maxDrawdownPercent) - parseFloat(a.maxDrawdown.maxDrawdownPercent);
            });

            // 成功的基金数量
            const successResults = sortedResults.filter(r => r.success);

            // 渲染结果
            let html = '';

            // 如果有多只基金，先渲染对比图
            if (successResults.length > 1) {
                html += `<div class="compare-chart-container">
                    <div class="compare-chart-title">基金对比</div>
                    <canvas id="compare-chart"></canvas>
                </div>`;
            }

            for (const result of sortedResults) {
                if (!result.success) {
                    html += `<div class="fund-result-card">
                        <div class="fund-code">${result.fundCode}</div>
                        <div class="error-msg">获取失败: ${result.error}</div>
                    </div>`;
                    continue;
                }

                const dd = result.maxDrawdown;
                const ret = result.returnData;
                const isPositive = parseFloat(ret.returnPercent) >= 0;
                const chartId = 'chart-' + result.fundCode;

                // 获取基金实时估算数据
                const estimate = estimates[result.fundCode];
                const quote = quotes[`${result.fundCode}:1`];
                let estimateHtml = '';
                let yesterdayChangeHtml = '';
                let hasEstimate = false;

                // 优先用实时估算数据
                if (estimate && estimate.estimateChange !== undefined && estimate.estimateChange !== null && !isNaN(estimate.estimateChange)) {
                    const change = estimate.estimateChange;
                    const color = change >= 0 ? 'var(--ios-red)' : 'var(--ios-green)';
                    const sign = change >= 0 ? '+' : '';
                    hasEstimate = true;
                    estimateHtml = `
                        <div class="stat-item">
                            <div class="stat-label">估算涨跌</div>
                            <div class="stat-value" style="color: ${color};">${sign}${change.toFixed(2)}%</div>
                            <div class="stat-sub">${estimate.estimateTime || ''}</div>
                        </div>`;
                }
                // 昨日净值涨跌
                if (quote && quote.change !== undefined && quote.change !== null && !isNaN(quote.change)) {
                    const change = quote.change;
                    const color = change >= 0 ? 'var(--ios-red)' : 'var(--ios-green)';
                    const sign = change >= 0 ? '+' : '';
                    // 判断净值日期来决定显示"今日"还是"昨日"
                    let label = '净值涨跌';
                    if (quote.priceDate) {
                        const today = new Date();
                        const todayStr = today.getFullYear().toString() +
                                       (today.getMonth() + 1).toString().padStart(2, '0') +
                                       today.getDate().toString().padStart(2, '0');
                        const yesterday = new Date(today);
                        yesterday.setDate(yesterday.getDate() - 1);
                        const yesterdayStr = yesterday.getFullYear().toString() +
                                           (yesterday.getMonth() + 1).toString().padStart(2, '0') +
                                           yesterday.getDate().toString().padStart(2, '0');

                        if (quote.priceDate === todayStr) {
                            label = '今日涨跌';
                        } else if (quote.priceDate === yesterdayStr) {
                            label = '昨日涨跌';
                        }
                    }
                    yesterdayChangeHtml = `
                        <div class="stat-item">
                            <div class="stat-label">${label}</div>
                            <div class="stat-value" style="color: ${color};">${sign}${change.toFixed(2)}%</div>
                        </div>`;
                }

                html += `<div class="fund-result-card">
                    <div class="fund-header">
                        <div>
                            <div class="fund-code">${result.fundCode}</div>
                            <div class="fund-name">${result.fundName || ''}</div>
                        </div>
                        <span class="fund-date-range">${result.dataRange.startDate} ~ ${result.dataRange.endDate}</span>
                    </div>
                    <div class="fund-stats ${hasEstimate ? 'has-estimate' : ''}">
                        <div class="stat-item">
                            <div class="stat-label">最大回撤</div>
                            <div class="stat-value negative">${dd.maxDrawdownPercent}%</div>
                            <div class="stat-sub">${dd.peakDate} → ${dd.troughDate}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">区间收益</div>
                            <div class="stat-value ${isPositive ? 'positive' : 'negative'}">${isPositive ? '+' : ''}${ret.returnPercent}%</div>
                            <div class="stat-sub">${result.dataRange.dataPoints} 个交易日</div>
                        </div>
                        ${yesterdayChangeHtml}
                        ${estimateHtml}
                    </div>
                    <div class="chart-container">
                        <canvas id="${chartId}"></canvas>
                    </div>
                </div>`;

                // 存储数据用于绑图
                chartDataList.push({
                    id: chartId,
                    navList: result.navList,
                    peakDate: dd.peakDate,
                    troughDate: dd.troughDate
                });
            }
            resultsEl.innerHTML = html;

            // 先绑定对比图
            if (successResults.length > 1) {
                drawCompareChart('compare-chart', successResults);
            }

            // 绑制所有单独图表
            chartDataList.forEach(item => drawChart(item.id, item.navList, item.peakDate, item.troughDate));

        } catch (e) {
            resultsEl.innerHTML = `<div class="error-msg">请求失败: ${e.message}</div>`;
        } finally {
            btnEl.disabled = false;
            btnEl.textContent = '开始分析';
        }
    }
</script>
</body>
</html>
