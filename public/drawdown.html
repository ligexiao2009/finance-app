<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <script src="app-config.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="投资助手">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>投资助手 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* 现代 iOS 色彩系统 */
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-card-glass: rgba(255, 255, 255, 0.85);
            --ios-input-bg: rgba(118, 118, 128, 0.12);
            --ios-primary: #007aff;
            --ios-primary-gradient: linear-gradient(135deg, #007aff 0%, #0056b3 100%);
            --ios-red: #ff3b30;
            --ios-green: #34c759;
            --ios-orange: #ff9500;
            --ios-text: #1c1c1e;
            --ios-secondary: #8e8e93;
            --ios-border: rgba(60, 60, 67, 0.1);
            
            /* 优化多层柔和阴影 */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.08);
            
            /* 圆角系统 */
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        [data-theme="dark"] {
            --ios-bg: #000000;
            --ios-card: #1c1c1e;
            --ios-card-glass: rgba(28, 28, 30, 0.85);
            --ios-input-bg: rgba(118, 118, 128, 0.24);
            --ios-text: #f2f2f7;
            --ios-secondary: #98989d;
            --ios-border: rgba(84, 84, 88, 0.3);
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.4);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            background-color: var(--ios-bg);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overscroll-behavior-y: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
            color: var(--ios-text);
            display: flex; justify-content: center;
            padding: env(safe-area-inset-top) 16px 40px;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding-top: 12px;
        }

        /* --- Header --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 4px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.8px;
        }
        .theme-toggle {
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            opacity: 0.8;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            background: var(--ios-input-bg);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .theme-toggle:active { 
            transform: scale(0.9); 
            opacity: 0.5; 
        }

        /* --- 分段切换器 (Segmented Control) --- */
        .segmented-control {
            background: var(--ios-input-bg);
            border-radius: 14px;
            display: flex;
            padding: 3px;
            margin-bottom: 24px;
        }
        .segment {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--ios-text);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            opacity: 0.6;
        }
        .segment.active {
            background: var(--ios-card);
            color: var(--ios-text);
            box-shadow: var(--shadow-sm);
            opacity: 1;
        }

        .tool-content {
            display: none;
        }
        .tool-content.active {
            display: block;
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- 核心数值卡片 --- */
        .display-card {
            background: var(--ios-card);
            border-radius: var(--radius-xl);
            padding: 32px 24px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .label {
            font-size: 13px;
            color: var(--ios-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }
        .value {
            font-size: 48px;
            font-weight: 800;
            margin: 12px 0;
            letter-spacing: -1.5px;
            font-variant-numeric: tabular-nums;
        }
        .sub-value {
            font-size: 15px;
            font-weight: 500;
            min-height: 22px;
            color: var(--ios-secondary);
        }

        /* --- 输入区域 --- */
        .input-group {
            background: var(--ios-card);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .row {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 0.5px solid var(--ios-border);
            position: relative;
        }
        .row:last-child { border-bottom: none; }
        .row label {
            font-size: 16px;
            font-weight: 500;
            flex: 1;
        }
        .row input {
            background: transparent;
            border: none;
            color: var(--ios-text);
            font-size: 17px;
            text-align: right;
            width: 60%;
            outline: none;
            font-family: inherit;
            font-weight: 600;
            padding: 0;
        }
        .row input::placeholder { color: var(--ios-secondary); font-weight: 400; }
        .row .unit {
            color: var(--ios-secondary);
            margin-left: 8px;
            font-size: 15px;
            font-weight: 500;
        }

        /* 快捷操作区 (全选/清空) */
        .quick-actions {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--ios-bg);
            border-bottom: 0.5px solid var(--ios-border);
        }
        .quick-btn {
            flex: 1;
            background: var(--ios-input-bg);
            color: var(--ios-primary);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .quick-btn:first-child { margin-right: 12px; }
        .quick-btn:active { transform: scale(0.96); opacity: 0.8; }
        .quick-btn.clear { color: var(--ios-text); }

        /* --- 按钮 --- */
        .btn-clear {
            display: block;
            margin: 24px auto 0;
            color: var(--ios-primary);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: var(--ios-input-bg);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            transition: all 0.2s ease;
        }
        .btn-clear:active { transform: scale(0.96); opacity: 0.8; }

        .up { color: var(--ios-red) !important; }
        .down { color: var(--ios-green) !important; }
        .highlight { color: var(--ios-primary); font-weight: 700; }
        .tip-success { color: var(--ios-green); font-weight: 600;}
        .tip-warning { color: var(--ios-orange); font-weight: 600;}

        /* --- 基金回撤模块 --- */
        .btn-analyze {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 18px;
            background: var(--ios-primary-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);
            letter-spacing: 0.5px;
        }
        .btn-analyze:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.2);
        }
        .btn-analyze:disabled {
            background: var(--ios-input-bg);
            color: var(--ios-secondary);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* 预设天数标签 */
        .days-preset {
            display: flex;
            gap: 8px;
            padding: 12px 20px 20px;
            flex-wrap: wrap;
            background: var(--ios-card);
        }
        .days-preset-btn {
            padding: 8px 14px;
            background: var(--ios-input-bg);
            border: none;
            border-radius: 10px;
            font-size: 13px;
            color: var(--ios-text);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .days-preset-btn.active {
            background: var(--ios-text);
            color: var(--ios-bg);
            box-shadow: var(--shadow-sm);
        }

        /* 结果卡片 */
        .fund-result-card {
            background: var(--ios-card);
            border-radius: var(--radius-xl);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        .fund-result-card.has-sort-control {
            position: relative;
            padding-top: 56px;
        }
        .fund-top-actions {
            position: absolute;
            top: 16px;
            right: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .fund-sort-btn,
        .fund-toolbar-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border: 1px solid rgba(60, 60, 67, 0.08);
            border-radius: 999px;
            padding: 6px 10px;
            background: rgba(118, 118, 128, 0.08);
            color: var(--ios-secondary);
            font-size: 11px;
            font-weight: 600;
            line-height: 1;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.2s ease;
        }
        .fund-sort-btn.active {
            color: var(--ios-primary);
            border-color: rgba(0, 122, 255, 0.14);
            background: rgba(0, 122, 255, 0.08);
        }
        .fund-sort-btn .sort-icon {
            font-size: 10px;
            opacity: 0.78;
            transform: translateY(-0.5px);
        }
        .fund-sort-btn .sort-label {
            letter-spacing: 0.1px;
        }
        .fund-sort-btn:active {
            transform: scale(0.96);
        }
        .fund-header {
            display: grid;
            grid-template-columns: 1fr 85px 85px 85px;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 0.5px solid var(--ios-border);
        }
        .fund-result-card.collapsed .fund-header {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .fund-code {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .fund-name {
            font-size: 13px;
            color: var(--ios-secondary);
            margin-top: 4px;
            font-weight: 500;
        }
        .fund-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(30%, 1fr));
            gap: 16px 8px;
        }
        .fund-card-body {
            display: block;
        }
        .fund-card-toggle {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 14px;
            margin-left: auto;
            border: none;
            background: transparent;
            color: var(--ios-primary);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            padding: 0;
        }
        .fund-card-toggle .toggle-icon {
            font-size: 10px;
            transition: transform 0.2s ease;
        }
        .fund-result-card.collapsed .fund-card-toggle .toggle-icon {
            transform: rotate(-90deg);
        }
        .fund-toolbar-btn {
            background: rgba(118, 118, 128, 0.08);
            color: var(--ios-primary);
        }
        .fund-toolbar-btn:active {
            transform: scale(0.96);
            opacity: 0.85;
        }
        .analysis-summary-card {
            background: var(--ios-card);
            border-radius: var(--radius-xl);
            padding: 18px 18px 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-md);
        }
        .analysis-summary-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }
        .analysis-summary-title {
            font-size: 16px;
            font-weight: 800;
            color: var(--ios-text);
        }
        .analysis-summary-meta {
            font-size: 12px;
            color: var(--ios-secondary);
            font-weight: 600;
        }
        .analysis-summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }
        .analysis-summary-item {
            background: var(--ios-input-bg);
            border-radius: var(--radius-md);
            padding: 12px 10px;
            text-align: center;
        }
        .analysis-summary-item.clickable {
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }
        .analysis-summary-item.clickable.active {
            background: rgba(0, 122, 255, 0.10);
            box-shadow: inset 0 0 0 1px rgba(0, 122, 255, 0.14);
        }
        .analysis-summary-item.clickable:active {
            transform: scale(0.98);
        }
        .analysis-summary-label {
            font-size: 11px;
            color: var(--ios-secondary);
            font-weight: 600;
        }
        .analysis-summary-value {
            margin-top: 6px;
            font-size: 20px;
            font-weight: 800;
            color: var(--ios-text);
            font-variant-numeric: tabular-nums;
        }
        .analysis-summary-value.up {
            color: var(--ios-red);
        }
        .analysis-summary-value.down {
            color: var(--ios-green);
        }
        .stat-item {
            text-align: center;
            background: var(--ios-input-bg);
            padding: 12px 8px;
            border-radius: var(--radius-md);
        }
        .stat-label {
            font-size: 11px;
            color: var(--ios-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 800;
            margin-top: 6px;
            font-variant-numeric: tabular-nums;
        }
        .stat-value.negative { color: var(--ios-green); }
        .stat-value.positive { color: var(--ios-red); }
        .stat-sub {
            font-size: 11px;
            color: var(--ios-secondary);
            margin-top: 6px;
            font-weight: 500;
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: var(--ios-secondary);
            font-weight: 500;
            font-size: 15px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .error-msg {
            color: var(--ios-red);
            text-align: center;
            padding: 20px;
            background: rgba(255, 59, 48, 0.1);
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 14px;
        }

        /* 净值曲线图 */
        .chart-container {
            margin-top: 16px;
            padding: 14px 12px 10px;
            background: linear-gradient(180deg, rgba(118, 118, 128, 0.08) 0%, rgba(118, 118, 128, 0.05) 100%);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(52, 199, 89, 0.22);
            box-shadow: 0 10px 24px rgba(52, 199, 89, 0.10);
            transform: translateY(-1px);
            transition: box-shadow 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
        }
        .chart-container.highlighted {
            border-color: rgba(52, 199, 89, 0.22);
            box-shadow: 0 10px 24px rgba(52, 199, 89, 0.10);
            transform: translateY(-1px);
        }
        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            padding: 0 2px;
        }
        .chart-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--ios-text);
            letter-spacing: 0.2px;
        }
        .chart-meta {
            font-size: 11px;
            color: var(--ios-secondary);
            font-weight: 500;
        }
        .chart-container canvas {
            width: 100% !important;
            height: 128px !important;
        }

        /* --- 多选下拉框样式 (Glassmorphism) --- */
        .fund-select-wrapper {
            position: relative;
            width: 160px;
        }
        .fund-select-display {
            background: transparent;
            border: none;
            color: var(--ios-primary);
            font-size: 16px;
            text-align: right;
            width: 100%;
            outline: none;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .fund-select-display::after {
            content: "›";
            margin-left: 6px;
            font-size: 18px;
            position: relative;
            top: -1px;
        }
        .fund-dropdown {
            position: absolute;
            top: calc(100% + 12px);
            right: 0;
            background: var(--ios-card-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid var(--ios-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            min-width: 300px;
            display: none;
            overflow: hidden;
            transform-origin: top right;
        }
        .fund-dropdown.show {
            display: block;
            animation: dropdownPop 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes dropdownPop {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        #fund-options-list {
            max-height: 280px;
            overflow-y: auto;
            overscroll-behavior: contain;
        }
        .fund-option {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 0.5px solid var(--ios-border);
        }
        .fund-option:last-child { border-bottom: none; }
        .fund-option:hover { background: rgba(0, 122, 255, 0.05); }
        
        .fund-option-checkbox {
            width: 20px;
            height: 20px;
            border: 1.5px solid var(--ios-secondary);
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        .fund-option.selected .fund-option-checkbox {
            background: var(--ios-primary);
            border-color: var(--ios-primary);
        }
        .fund-option-checkbox::after {
            content: '';
            width: 6px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg) translateY(-1px);
            display: none;
        }
        .fund-option.selected .fund-option-checkbox::after { display: block; }
        
        .fund-option-info { flex: 1; min-width: 0; }
        .fund-option-code { font-size: 15px; font-weight: 600; color: var(--ios-text); }
        .fund-option-name {
            font-size: 12px;
            color: var(-row input-ios-secondary);
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .fund-search-box {
            padding: 12px;
            background: var(--ios-card);
            border-bottom: 0.5px solid var(--ios-border);
        }

        /* 对比图 */
        .compare-chart-container {
            background: var(--ios-card);
            border-radius: var(--radius-xl);
            padding: 24px 16px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
        }
        .compare-chart-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--ios-text);
            margin-bottom: 16px;
            text-align: center;
        }
        .compare-chart-container canvas {
            width: 100% !important;
            height: 220px !important;
        }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--ios-border); border-radius: 10px; }

        /* Loading 遮罩层 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }
        [data-theme="dark"] .loading-overlay {
            background: rgba(0, 0, 0, 0.7);
        }

        .loading-content {
            background: var(--ios-card);
            border-radius: var(--radius-xl);
            padding: 40px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            max-width: 400px;
            width: 90%;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to { 
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .loading-spinner-large {
            width: 60px;
            height: 60px;
            border: 4px solid var(--ios-input-bg);
            border-top-color: var(--ios-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--ios-text);
            margin-bottom: 12px;
        }

        .loading-progress {
            font-size: 14px;

        .progress-bar-container {

        .progress-bar {

        .loading-subtext {

        /* 修复进度弹框 */

            background: rgba(0, 0, 0, 0.5);

        [data-theme="dark"] .recovery-modal-overlay {

        }
        .recovery-modal {
            background: var(--ios-card);
            border-radius: var(--radius-xl);
            padding: 28px 24px 24px;
            max-width: 340px;
            width: 90%;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .recovery-modal-title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            color: var(--ios-text);
        }
        .recovery-modal-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 0.5px solid var(--ios-border);
        }
        .recovery-modal-row:last-child {
            border-bottom: none;

        .recovery-modal-label {
