<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>投资管理 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@latest/dist/chartjs-chart-financial.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        :root {
            --system-red: #ff3b30;
            --system-green: #34c759;
            --system-blue: #007aff;
            --bg-color: #f2f2f7;
            --card-bg: rgba(255, 255, 255, 0.8);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(at 0% 0%, rgba(0, 122, 255, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 59, 48, 0.05) 0px, transparent 50%),
                var(--bg-color);
            min-height: 100vh;
            color: #1c1c1e;
        }

        .container {
            max-width: 440px;
            margin: auto;
            padding: 20px 16px;
        }

        /* 主资产卡片 */
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
        }

        .header-label {
            font-size: 13px;
            color: #8e8e93;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .profit-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 20px;
        }

        .big-num {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: -1.2px;
            transition: color 0.3s;
        }

        .percent-badge {
            font-size: 14px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        /* KPI 指标卡片 */
        .kpis {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .kpi {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            padding: 12px 6px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.4), 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .kpi .v {
            font-size: 14px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .kpi .l {
            font-size: 10px;
            color: #8e8e93;
            margin-top: 4px;
            font-weight: 500;
        }

        /* 头部价格输入（缩小版） */
        .price-input-group {
            display: flex;
            background: rgba(0, 0, 0, 0.05);
            padding: 5px;
            border-radius: 14px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-wrapper::before {
            content: attr(data-label);
            position: absolute;
            left: 12px;
            top: 8px;
            font-size: 10px;
            color: #8e8e93;
            font-weight: 600;
        }

        .price-input-group input {
            width: 100%;
            padding: 22px 12px 8px;
            border: none;
            background: transparent;
            font-size: 18px;
            font-weight: 700;
            color: var(--system-blue);
            outline: none;
        }

        /* 列表记录 */
        .list-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 4px 16px;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
        }

        .item:last-child {
            border: none;
        }

        /* 列表中的输入框（缩小版） */
        .entry-fields {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .entry-fields input {
            width: 72px;
            padding: 8px 6px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            background: white;
            font-size: 15px;
            text-align: center;
            font-weight: 700;
            outline: none;
        }

        .entry-fields span {
            font-size: 12px;
            color: #c7c7cc;
            font-weight: 600;
        }

        .item-right-box {
            display: flex;
            align-items: center;
        }

        .item-right {
            text-align: right;
            min-width: 80px;
        }

        .item-profit {
            font-size: 16px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .item-rate {
            font-size: 11px;
            margin-top: 2px;
            font-weight: 600;
        }

        .delete-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 59, 48, 0.1);
            color: var(--system-red);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin-left: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .delete-btn:active {
            background: var(--system-red);
            color: white;
            transform: scale(0.9);
        }

        .add-btn {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            border: none;
            background: var(--system-blue);
            color: white;
            margin-top: 16px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.25);
        }

        .add-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* 状态色 */
        .red {
            color: var(--system-red);
        }

        .green {
            color: var(--system-green);
        }

        .bg-red {
            background: rgba(255, 59, 48, 0.1);
            color: var(--system-red);
        }

        .bg-green {
            background: rgba(52, 199, 89, 0.1);
            color: var(--system-green);
        }

        .fade {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* K线图容器 */
        .chart-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 28px;
            padding: 20px;
            margin-top: 16px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
            display: none; /* 默认隐藏，选择股票后显示 */
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .chart-title {
            font-size: 14px;
            font-weight: 700;
            color: #1c1c1e;
        }

        .chart-period {
            display: flex;
            gap: 8px;
        }

        .period-btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: white;
            font-size: 12px;
            font-weight: 600;
            color: #8e8e93;
            cursor: pointer;
            transition: all 0.2s;
        }

        .period-btn.active {
            background: var(--system-blue);
            color: white;
            border-color: var(--system-blue);
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .chart-loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
            color: #8e8e93;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
    <script src="app-config.js"></script>
</head>

<body>

    <div class="container">
        <div class="main-card">
            <div class="header-label">预计总盈亏</div>
            <div class="profit-row">
                <div id="profit" class="big-num red">¥0</div>
                <div id="rate" class="percent-badge bg-red">0.00%</div>
            </div>

            <div class="kpis">
                <div class="kpi">
                    <div id="cost" class="v">¥0</div>
                    <div class="l">总成本</div>
                </div>
                <div class="kpi">
                    <div id="value" class="v">¥0</div>
                    <div class="l">当前市值</div>
                </div>
                <div class="kpi">
                    <div id="breakeven" class="v">0.00</div>
                    <div class="l">回本单价</div>
                </div>
            </div>

            <div class="price-input-group">
                <div class="input-wrapper" data-label="市场单价">
                    <input type="number" id="price" value="170" step="0.01" oninput="calculateOnly()"
                        onfocus="handleFocus(this)">
                </div>
                <div style="width:1px; background:rgba(0,0,0,0.08); margin:10px 0;"></div>
                <div class="input-wrapper" data-label="累计持仓">
                    <input type="number" id="total-display" value="0" readonly>
                </div>
            </div>
        </div>

        <div class="list-card" style="margin-bottom: 12px; padding: 16px;">
            <div style="flex: 1;">
                <select id="stock-select" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: white; font-size: 14px; font-weight: 600; outline: none; color: #1c1c1e;" onchange="onStockSelectChange(this)">
                    <option value="">选择持仓股票...</option>
                </select>
            </div>
        </div>

        <div class="list-card">
            <div id="list"></div>
        </div>

        <button class="add-btn" onclick="addRecord()">+ 新增补仓记录</button>

        <div class="chart-card" id="chart-card">
            <div class="chart-header">
                <div class="chart-title" id="chart-title">K线图</div>
                <div class="chart-period">
                    <button class="period-btn active" data-scale="240" onclick="changeChartPeriod(240)">日线</button>
                    <button class="period-btn" data-scale="1200" onclick="changeChartPeriod(1200)">周K</button>
                    <button class="period-btn" data-scale="7200" onclick="changeChartPeriod(7200)">月K</button>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="kline-chart"></canvas>
                <div class="chart-loading" id="chart-loading">正在加载K线数据...</div>
            </div>
        </div>
    </div>

    <script>
        // 检查Chart.js和插件加载状态
        window.addEventListener('load', function() {
            console.log('Chart.js版本:', Chart.version);
            console.log('可用的控制器:', Chart.controllers ? Object.keys(Chart.controllers) : '无');
            console.log('全局变量FinancialController:', window.FinancialController ? '已定义' : '未定义');
            console.log('全局变量CandlestickController:', window.CandlestickController ? '已定义' : '未定义');
            console.log('全局变量CandlestickElement:', window.CandlestickElement ? '已定义' : '未定义');
            console.log('全局变量FinancialElement:', window.FinancialElement ? '已定义' : '未定义');

            // 如果插件需要手动注册，尝试注册
            if (window.FinancialController) {
                console.log('FinancialController已加载，尝试注册');
                Chart.register(window.FinancialController);
            }
            if (window.CandlestickController) {
                console.log('CandlestickController已加载，尝试注册');
                Chart.register(window.CandlestickController);
            }
            // 对于chartjs-chart-financial 2.x，可能需要注册FinancialElement和CandlestickElement
            if (window.FinancialElement) {
                console.log('FinancialElement已加载，尝试注册');
                Chart.register(window.FinancialElement);
            }
            if (window.CandlestickElement) {
                console.log('CandlestickElement已加载，尝试注册');
                Chart.register(window.CandlestickElement);
            }
            // 尝试直接注册financial控制器（如果插件已自动注册但不在Chart.controllers中）
            try {
                if (typeof Chart.controllers.financial === 'undefined' && window.FinancialController) {
                    Chart.register(window.FinancialController);
                    console.log('已手动注册FinancialController');
                }
                if (typeof Chart.controllers.candlestick === 'undefined' && window.CandlestickController) {
                    Chart.register(window.CandlestickController);
                    console.log('已手动注册CandlestickController');
                }
            } catch (e) {
                console.error('注册控制器时出错:', e);
            }
        });

        // 持仓数据
        let data = JSON.parse(localStorage.getItem('invest_pro_data')) || [
            { shares: 700, price: 141 },
            { shares: 700, price: 100 }
        ];

        // K线图相关变量
        let klineChart = null;
        let currentStockCode = null;
        let currentChartScale = 240; // 默认日线

        function handleFocus(el) {
            if (el.value === "0") {
                el.value = "";
            } else {
                el.select();
            }
        }

        function animateNumber(el, to) {
            const start = Number(el.dataset.val || 0);
            const duration = 400;
            const startTime = performance.now();

            function tick(now) {
                const progress = Math.min((now - startTime) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                const val = start + (to - start) * ease;
                el.innerText = '¥' + Math.round(val).toLocaleString();
                if (progress < 1) requestAnimationFrame(tick);
                else el.dataset.val = to;
            }
            requestAnimationFrame(tick);
        }

        function calculateOnly() {
            let totalCost = 0;
            let totalShares = 0;
            const currentPrice = +document.getElementById('price').value || 0;

            data.forEach((d, i) => {
                const cost = d.shares * d.price;
                const profit = (d.shares * currentPrice) - cost;
                const rate = cost ? (profit / cost * 100).toFixed(2) : '0.00';

                totalCost += cost;
                totalShares += d.shares;

                const itemProfitEl = document.getElementById(`p-${i}`);
                const itemRateEl = document.getElementById(`r-${i}`);
                if (itemProfitEl && itemRateEl) {
                    itemProfitEl.innerText = (profit >= 0 ? '+' : '') + Math.round(profit);
                    itemProfitEl.className = `item-profit ${profit >= 0 ? 'red' : 'green'}`;
                    itemRateEl.innerText = rate + '%';
                    itemRateEl.className = `item-rate ${profit >= 0 ? 'red' : 'green'}`;
                }
            });

            const totalValue = totalShares * currentPrice;
            const totalProfit = totalValue - totalCost;
            const totalRate = totalCost ? (totalProfit / totalCost * 100).toFixed(2) : '0.00';

            animateNumber(document.getElementById('profit'), totalProfit);
            document.getElementById('profit').className = `big-num ${totalProfit >= 0 ? 'red' : 'green'}`;

            const rateEl = document.getElementById('rate');
            rateEl.innerText = (totalProfit >= 0 ? '+' : '') + totalRate + '%';
            rateEl.className = `percent-badge ${totalProfit >= 0 ? 'bg-red' : 'bg-green'}`;

            document.getElementById('cost').innerText = '¥' + Math.round(totalCost).toLocaleString();
            document.getElementById('value').innerText = '¥' + Math.round(totalValue).toLocaleString();
            document.getElementById('breakeven').innerText = totalShares ? (totalCost / totalShares).toFixed(2) : '0.00';
            document.getElementById('total-display').value = totalShares;

            localStorage.setItem('invest_pro_data', JSON.stringify(data));
        }

        function renderList() {
            const list = document.getElementById('list');
            list.innerHTML = '';

            data.forEach((d, i) => {
                const div = document.createElement('div');
                div.className = 'item fade';
                div.innerHTML = `
                    <div class="entry-fields">
                        <input type="number" value="${d.shares}" oninput="updateData(${i},'shares',this.value)" onfocus="handleFocus(this)">
                        <span>股 @</span>
                        <input type="number" value="${d.price}" oninput="updateData(${i},'price',this.value)" onfocus="handleFocus(this)">
                    </div>
                    <div class="item-right-box">
                        <div class="item-right">
                        <div id="p-${i}" class="item-profit">0</div>
                        <div id="r-${i}" class="item-rate">0%</div>
                        </div>
                        <button class="delete-btn" onclick="removeRecord(${i})">×</button>
                    </div>
                    `;
                list.appendChild(div);
            });
            calculateOnly();
        }

        function updateData(i, key, val) {
            data[i][key] = +val || 0;
            calculateOnly();
        }

        function addRecord() {
            data.push({ shares: 0, price: 0 });
            renderList();
        }

        function removeRecord(i) {
            const items = document.querySelectorAll('.item');
            items[i].style.opacity = '0';
            items[i].style.transform = 'translateX(40px)';
            setTimeout(() => {
                data.splice(i, 1);
                renderList();
            }, 250);
        }

        renderList();
        loadHoldings();

        async function loadHoldings() {
            try {
                console.log('开始加载持仓数据...');
                console.log('window.API_BASE_URL:', window.API_BASE_URL);
                console.log('window.APP_CONFIG:', window.APP_CONFIG);

                const apiBase = window.API_BASE_URL || '';
                const url = apiBase + '/api/data';
                console.log('请求URL:', url);

                const response = await fetch(url);
                if (!response.ok) {
                    console.error('API响应状态:', response.status, response.statusText);
                    throw new Error('获取持仓数据失败: ' + response.status);
                }
                const data = await response.json();
                console.log('持仓数据加载成功，共', data.rows ? data.rows.length : 0, '条记录');

                const select = document.getElementById('stock-select');
                // 清空现有选项（除了第一个placeholder）
                while (select.options.length > 1) {
                    select.remove(1);
                }
                // 只添加股票持仓（非基金）
                const stocks = data.rows.filter(row => !row.isFund);
                console.log('股票持仓数量:', stocks.length);

                stocks.forEach(stock => {
                    const option = document.createElement('option');
                    option.value = stock.id || stock.code;
                    option.textContent = `${stock.name || stock.code} (${stock.shares}股 @ ${stock.cost})`;
                    option.dataset.shares = stock.shares;
                    option.dataset.cost = stock.cost;
                    option.dataset.code = stock.code;
                    select.appendChild(option);
                });

                if (stocks.length === 0) {
                    console.log('没有找到股票持仓数据');
                }
            } catch (error) {
                console.warn('加载持仓失败（API可能不可用）:', error.message);
                // 如果API失败，静默失败，不显示错误
                // 下拉框将保持为空，页面其他功能正常
            }
        }

        async function onStockSelectChange(select) {
            const selectedOption = select.options[select.selectedIndex];
            if (!selectedOption.value) {
                // 如果选择的是placeholder，不清除数据
                return;
            }
            const shares = parseFloat(selectedOption.dataset.shares);
            const cost = parseFloat(selectedOption.dataset.cost);
            const stockCode = selectedOption.dataset.code;
            if (isNaN(shares) || isNaN(cost) || shares <= 0 || cost <= 0) {
                alert('持仓数据无效');
                select.selectedIndex = 0;
                return;
            }
            // 清除现有补仓记录数据
            data.length = 0;
            // 添加一条补仓记录（第一条）
            data.push({ shares: shares, price: cost });
            renderList();
            // 保持选中当前股票，不清除选择

            // 获取股票最新价格并更新市场价输入框
            if (stockCode) {
                try {
                    const price = await fetchStockPrice(stockCode);
                    if (price > 0) {
                        const priceInput = document.getElementById('price');
                        priceInput.value = price;
                        // 触发计算
                        calculateOnly();
                    }
                } catch (error) {
                    console.error('获取股票价格失败:', error);
                }

                // 显示K线图并加载数据
                showKlineChart(stockCode);
            }
        }

        async function fetchStockPrice(stockCode) {
            try {
                const apiBase = window.API_BASE_URL || '';
                // 股票是非基金，isFund为0
                const url = `${apiBase}/api/quotes?items=${encodeURIComponent(stockCode + ':0')}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('获取价格失败');
                const data = await response.json();
                const key = `${stockCode}:0`;
                const quote = data.quotes[key];
                if (quote && quote.price > 0) {
                    return quote.price;
                }
                return 0;
            } catch (error) {
                console.error('获取股票价格失败:', error);
                return 0;
            }
        }

        // 显示K线图并加载数据
        async function showKlineChart(stockCode) {
            currentStockCode = stockCode;

            // 显示K线图卡片
            const chartCard = document.getElementById('chart-card');
            chartCard.style.display = 'block';

            // 更新标题
            const chartTitle = document.getElementById('chart-title');
            chartTitle.textContent = `${stockCode} K线图`;

            // 显示加载状态
            const loadingEl = document.getElementById('chart-loading');
            const canvasEl = document.getElementById('kline-chart');
            loadingEl.style.display = 'flex';
            canvasEl.style.display = 'none';

            // 加载K线数据
            await loadKlineData(stockCode, currentChartScale);
        }

        // 加载K线数据
        async function loadKlineData(stockCode, scale) {
            try {
                // 确定股票市场前缀
                let symbol;
                if (stockCode.length === 5) {
                    // 港股
                    symbol = 'hk' + stockCode;
                } else if (/^[569]/.test(stockCode)) {
                    // 上海
                    symbol = 'sh' + stockCode;
                } else {
                    // 深圳
                    symbol = 'sz' + stockCode;
                }

                // 使用代理API避免CORS问题
                const apiBase = window.API_BASE_URL || '';
                const url = `${apiBase}/api/kline/${symbol}?scale=${scale}&datalen=1023`;

                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const result = await response.json();
                if (!result.success) {
                    throw new Error(result.error || '获取K线数据失败');
                }

                const klineData = result.data;

                // 解析数据
                const parsedData = parseKlineData(klineData);

                // 绘制图表
                renderKlineChart(parsedData);

                // 隐藏加载状态，显示图表
                const loadingEl = document.getElementById('chart-loading');
                const canvasEl = document.getElementById('kline-chart');
                loadingEl.style.display = 'none';
                canvasEl.style.display = 'block';

            } catch (error) {
                console.error('加载K线数据失败:', error);
                const loadingEl = document.getElementById('chart-loading');
                loadingEl.textContent = '加载K线数据失败，请重试';
            }
        }

        // 解析K线数据
        function parseKlineData(klineData) {
            if (!Array.isArray(klineData) || klineData.length === 0) {
                return {
                    labels: [],
                    timestamps: [],
                    opens: [],
                    highs: [],
                    lows: [],
                    closes: [],
                    dates: []
                };
            }

            // 新浪财经数据格式: {day: "2024-01-01", open: "10.00", high: "10.50", low: "9.80", close: "10.20"}
            const labels = [];
            const timestamps = [];
            const opens = [];
            const highs = [];
            const lows = [];
            const closes = [];
            const dates = [];

            // 按时间顺序排序（新浪返回的数据可能是倒序）
            const sortedData = [...klineData].sort((a, b) => {
                return new Date(a.day) - new Date(b.day);
            });

            // 只取最近100个数据点以避免图表过于拥挤
            const recentData = sortedData.slice(-100);

            recentData.forEach(item => {
                const date = new Date(item.day);
                const timestamp = date.getTime();

                labels.push(item.day); // 保持向后兼容
                timestamps.push(timestamp);
                dates.push(item.day); // 原始日期字符串
                opens.push(parseFloat(item.open));
                highs.push(parseFloat(item.high));
                lows.push(parseFloat(item.low));
                closes.push(parseFloat(item.close));
            });

            return {
                labels,        // 日期字符串，用于显示
                timestamps,    // 时间戳，用于图表x轴
                opens,
                highs,
                lows,
                closes,
                dates          // 原始日期字符串
            };
        }

        // 绘制K线图
        function renderKlineChart(data) {
            const canvas = document.getElementById('kline-chart');
            if (!canvas) {
                console.error('Canvas元素未找到');
                return;
            }

            // 检查数据是否有效
            if (!data || !Array.isArray(data.labels) || !Array.isArray(data.closes)) {
                console.error('无效的K线数据格式:', data);
                return;
            }

            const ctx = canvas.getContext('2d');

            // 检查可用的K线图控制器
            let chartType = null;
            let controllerName = null;

            console.log('检查Chart.controllers:', Chart.controllers);
            if (Chart.controllers) {
                const controllerKeys = Object.keys(Chart.controllers);
                console.log('可用控制器列表:', controllerKeys);

                // 尝试所有可能的K线图控制器名称
                const possibleControllers = ['financial', 'candlestick', 'Candlestick', 'Financial', 'CandlestickController', 'FinancialController'];
                for (const ctrl of possibleControllers) {
                    if (Chart.controllers[ctrl]) {
                        chartType = ctrl;
                        controllerName = ctrl;
                        console.log(`找到${ctrl}控制器`);
                        break;
                    }
                }
            }

            if (!chartType) {
                console.warn('K线图控制器未注册，使用折线图作为降级方案');
                console.log('所有可用控制器:', Chart.controllers ? Object.keys(Chart.controllers) : '无');

                // 使用折线图作为降级方案
                chartType = 'line';
                controllerName = 'line';

                // 显示警告信息
                const loadingEl = document.getElementById('chart-loading');
                loadingEl.innerHTML = 'K线图插件未加载，显示收盘价折线图<br><small>如需K线图，请确保chartjs-chart-financial插件已正确加载</small>';
                loadingEl.style.display = 'flex';

                // 不立即返回，继续使用折线图
            }

            console.log('使用图表类型:', chartType);

            // 确保销毁任何现有的图表实例
            if (klineChart) {
                try {
                    klineChart.destroy();
                    klineChart = null;
                } catch (error) {
                    console.warn('销毁现有图表时出错:', error);
                }
            }

            // 使用Chart.js API检查是否还有其他图表实例绑定到这个canvas
            const existingChart = Chart.getChart(canvas);
            if (existingChart) {
                try {
                    existingChart.destroy();
                } catch (error) {
                    console.warn('通过Chart.getChart销毁图表时出错:', error);
                }
            }

            // 准备K线图数据
            // 验证数据长度一致性
            // 优先使用timestamps，如果不存在则使用labels（向后兼容）
            const xValues = data.timestamps && data.timestamps.length > 0 ? data.timestamps : data.labels;
            const len = xValues.length;
            if (len === 0 || data.opens.length !== len || data.highs.length !== len ||
                data.lows.length !== len || data.closes.length !== len) {
                console.error('K线数据长度不一致或为空', {
                    xValues: xValues.length,
                    opens: data.opens.length,
                    highs: data.highs.length,
                    lows: data.lows.length,
                    closes: data.closes.length,
                    timestamps: data.timestamps ? data.timestamps.length : '未定义',
                    labels: data.labels ? data.labels.length : '未定义'
                });
                return;
            }

            let chartData;
            if (chartType === 'line') {
                // 折线图数据格式 - 使用时间戳作为x值
                chartData = {
                    datasets: [{
                        label: '收盘价',
                        data: xValues.map((timestamp, index) => ({
                            x: timestamp,
                            y: data.closes[index]
                        })),
                        borderColor: 'rgb(0, 122, 255)',
                        backgroundColor: 'rgba(0, 122, 255, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.1
                    }]
                };
            } else {
                // K线图数据格式 - 使用时间戳作为x值
                chartData = {
                    datasets: [{
                        label: '价格',
                        data: xValues.map((timestamp, index) => ({
                            x: timestamp,
                            o: data.opens[index],
                            h: data.highs[index],
                            l: data.lows[index],
                            c: data.closes[index]
                        })),
                        backgroundColor: (ctx) => {
                            const item = ctx.raw;
                            return item.c >= item.o ? 'rgba(255, 59, 48, 0.8)' : 'rgba(52, 199, 89, 0.8)';
                        },
                        borderColor: (ctx) => {
                            const item = ctx.raw;
                            return item.c >= item.o ? 'rgb(255, 59, 48)' : 'rgb(52, 199, 89)';
                        },
                        borderWidth: 1
                    }]
                };
            }

            // 创建图表
            klineChart = new Chart(ctx, {
                type: chartType,
                data: chartData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: chartType === 'line' ? {
                            callbacks: {
                                label: (context) => {
                                    return `收盘价: ${context.parsed.y.toFixed(2)}`;
                                }
                            }
                        } : {
                            callbacks: {
                                label: (context) => {
                                    const item = context.raw;
                                    return [
                                        `开盘: ${item.o.toFixed(2)}`,
                                        `最高: ${item.h.toFixed(2)}`,
                                        `最低: ${item.l.toFixed(2)}`,
                                        `收盘: ${item.c.toFixed(2)}`
                                    ];
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'day'
                            },
                            ticks: {
                                maxRotation: 0,
                                autoSkip: true,
                                maxTicksLimit: 10
                            },
                            grid: {
                                display: false
                            }
                        },
                        y: {
                            position: 'right',
                            ticks: {
                                callback: function(value) {
                                    return value.toFixed(2);
                                }
                            }
                        }
                    }
                }
            });
        }

        // 切换K线周期
        async function changeChartPeriod(scale) {
            if (scale === currentChartScale || !currentStockCode) {
                return;
            }

            // 更新按钮状态（使用 == 进行宽松判断，支持数字或字符串形式的 scale）
            document.querySelectorAll('.period-btn').forEach(btn => {
                if (btn.dataset.scale == scale) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            currentChartScale = scale;

            // 重新加载数据
            const loadingEl = document.getElementById('chart-loading');
            const canvasEl = document.getElementById('kline-chart');
            loadingEl.style.display = 'flex';
            canvasEl.style.display = 'none';
            loadingEl.textContent = '正在加载K线数据...';

            await loadKlineData(currentStockCode, scale);
        }
    </script>

</body>
