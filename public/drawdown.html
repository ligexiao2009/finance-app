    </style>
</head>
<body data-theme="light">

    <div class="container">
    <div class="header">
        <h1>回撤分析</h1>
        <div class="theme-toggle" onclick="toggleTheme()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </div>
    </div>

    <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <div class="loading-content">
            <div class="loading-spinner-large"></div>
            <div class="loading-title" id="loading-title">深度分析中</div>
            <div class="loading-progress" id="loading-progress">正在准备数据...</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="loading-subtext" id="loading-subtext">此次分析已耗时 0 秒</div>
        </div>
    </div>

    <div id="recovery-modal-overlay" class="recovery-modal-overlay" style="display: none;" onclick="closeRecoveryModal(event)">
        <div class="recovery-modal" onclick="event.stopPropagation()">
            <div class="recovery-modal-title" id="recovery-modal-title">修复详情</div>
            <div id="recovery-modal-content"></div>
            <button class="recovery-modal-close" onclick="closeRecoveryModal()">好的</button>
        </div>
    </div>

    <div class="segmented-control">
        <button class="segment active" onclick="switchTab(0)">基金回撤</button>
        <button class="segment" onclick="switchTab(1)">成本推算</button>
        <button class="segment" onclick="switchTab(2)">回撤计算</button>
    </div>

    <div id="tab-fund" class="tool-content active">
        <div class="input-group">
            <div class="row">
                <label>选择基金</label>
                <div class="fund-select-wrapper">
                    <button type="button" class="fund-select-display" id="fund-select-display">点击选择</button>
                    <input type="hidden" id="in-fund-codes">
                    <div class="fund-dropdown" id="fund-dropdown">
                        <div class="fund-search-box">
                            <input type="text" class="fund-search-input" id="fund-search-input" placeholder="输入代码或名称搜索" oninput="filterFundOptions(this.value)">
                        </div>
                        <div id="fund-options-list"></div>
                    </div>
                </div>
            </div>
            <div class="quick-actions">
                <button type="button" class="quick-btn" onclick="selectAllFunds()">全选持仓</button>
                <button type="button" class="quick-btn clear" onclick="clearFundSelection()">清空选择</button>
            </div>
            
            <div class="row">
                <label>分析周期</label>
                <input type="number" id="in-fund-days" placeholder="90" value="90" oninput="onDaysInputChange()">
                <span class="unit">天</span>
            </div>
            <div class="days-preset">
                <button type="button" class="days-preset-btn" data-days="30" onclick="setDaysPreset(30)">近1月</button>
                <button type="button" class="days-preset-btn active" data-days="90" onclick="setDaysPreset(90)">近3月</button>
                <button type="button" class="days-preset-btn" data-days="180" onclick="setDaysPreset(180)">近半年</button>
                <button type="button" class="days-preset-btn" data-days="365" onclick="setDaysPreset(365)">近1年</button>
                <button type="button" class="days-preset-btn" data-days="730" onclick="setDaysPreset(730)">近2年</button>
                <button type="button" class="days-preset-btn" data-days="1095" onclick="setDaysPreset(1095)">近3年</button>
                <button type="button" class="days-preset-btn" data-days="1825" onclick="setDaysPreset(1825)">近5年</button>
                <button type="button" class="days-preset-btn" data-days="18250" onclick="setDaysPreset(18250)">成立来</button>
            </div>
        </div>
        <button class="btn-analyze" onclick="analyzeFundDrawdown()">开始分析</button>
        <div id="fund-results"></div>
    </div>

    <div id="tab-cost" class="tool-content">
        <div class="display-card" id="card-cost">
            <div class="label">推算成本点位</div>
            <div class="value" id="res-cost-point">0.00</div>
            <div class="sub-value" id="res-cost-tip">输入下方数据以开始推算</div>
        </div>
        <div class="input-group">
            <div class="row">
                <label>当前点位</label>
                <input type="number" id="in-now-p" placeholder="例如: 4690" oninput="runCost()">
                <span class="unit">点</span>
            </div>
            <div class="row">
                <label>收益率</label>
                <input type="number" id="in-now-y" placeholder="例如: -14.61" oninput="runCost()">
                <span class="unit">%</span>
            </div>
            <div class="row">
                <label>目标成本</label>
                <input type="number" id="in-target-p" placeholder="例如: 5000" oninput="runCost()">
                <span class="unit">点</span>
            </div>
        </div>
        <button class="btn-clear" onclick="clearInputs('cost')">清空重置</button>
    </div>

    <div id="tab-drawdown" class="tool-content">
        <div class="display-card" id="card-dd">
            <div class="label" id="dd-label">实际回撤率</div>
            <div class="value" id="res-dd-value">0.00%</div>
            <div class="sub-value" id="res-dd-tip">等待输入数据...</div>
        </div>
        <div class="input-group">
            <div class="row">
                <label>前高点收益</label>
                <input type="number" id="in-h-v" placeholder="0.00" oninput="runDD()">
                <span class="unit">%</span>
            </div>
            <div class="row">
                <label>当前收益率</label>
                <input type="number" id="in-c-v" placeholder="-14.61" oninput="runDD()">
                <span class="unit">%</span>
            </div>
        </div>
        <button class="btn-clear" onclick="clearInputs('dd')">清空重置</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'invest_drawdown_v1';

    // 持仓基金数据
    let holdingFunds = [];
    let selectedFundCodes = new Set();
    let fundQuotes = {}; // 存储基金行情数据
    let customFundNames = {}; // 缓存自定义基金名称
    let loadingFundCodes = new Set(); // 正在加载中的基金代码
    let loadingTimerId = null;
    let loadingStartTime = 0;

    // 初始化
    window.onload = function() {
        loadData();
        const savedTab = parseInt(localStorage.getItem('invest_dd_tab') || '0');
        switchTab(savedTab);
        loadHoldingFunds().then(() => {
            // 加载完成后默认全选持仓
            selectAllFunds();
        });
        initFundSelect();
    };

    // 主题切换
    function toggleTheme() {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('invest_dd_theme', isDark ? 'light' : 'dark');
        
        // 更换 SVG 图标
        const svg = document.querySelector('.theme-toggle svg');
        if (isDark) {
            // 月亮换太阳
            svg.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
        } else {
            // 太阳换月亮
            svg.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        }
    }

    // 加载保存的主题
    (function() {
        const savedTheme = localStorage.getItem('invest_dd_theme');
        const body = document.body;
        if (savedTheme) {
            body.setAttribute('data-theme', savedTheme);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            body.setAttribute('data-theme', 'dark');
        }
        
        // 初始化图标
        setTimeout(() => {
           const isDark = body.getAttribute('data-theme') === 'dark';
           const svg = document.querySelector('.theme-toggle svg');
           if(isDark && svg) svg.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
        }, 50);
    })();

    function switchTab(index) {
        const tabs = document.querySelectorAll('.tool-content');
        const segments = document.querySelectorAll('.segment');
        tabs.forEach((t, i) => t.classList.toggle('active', i === index));
        segments.forEach((s, i) => s.classList.toggle('active', i === index));
        localStorage.setItem('invest_dd_tab', index);
    }

    function runCost() {
        const p = parseFloat(document.getElementById('in-now-p').value);
        const y = parseFloat(document.getElementById('in-now-y').value);
        const t = parseFloat(document.getElementById('in-target-p').value);
        const resP = document.getElementById('res-cost-point');
        const resT = document.getElementById('res-cost-tip');

        saveData();

        if (isNaN(p) || isNaN(y)) return;

        const cost = p / (1 + (y / 100));
        resP.innerText = cost.toFixed(2);

        if (!isNaN(t)) {
            if (t >= cost) {
                resT.innerHTML = '<span class="tip-success">✓ 已达标，无需补仓</span>';
            } else if (t <= p) {
                resT.innerHTML = '<span class="tip-warning">⚠ 目标低于现价，无法测算</span>';
            } else {
                const multi = (cost - t) / (t - p);
                resT.innerHTML = '需补入当前仓位 <span class="highlight">' + multi.toFixed(2) + '</span> 倍资金';
            }
        } else {
            resT.innerHTML = '距回本还需上涨 <span class="highlight">' + ((cost/p-1)*100).toFixed(2) + '%</span>';
        }
    }

    function runDD() {
        const h = parseFloat(document.getElementById('in-h-v').value);
        const c = parseFloat(document.getElementById('in-c-v').value);
        const valEl = document.getElementById('res-dd-value');
        const tipEl = document.getElementById('res-dd-tip');
        const labelEl = document.getElementById('dd-label');

        saveData();

        if (isNaN(h) || isNaN(c)) return;

        const dd = ((1+c/100)/(1+h/100) - 1) * 100;
        valEl.innerText = (dd > 0 ? "+" : "") + dd.toFixed(2) + "%";
        valEl.className = "value " + (dd >= 0 ? "up" : "down");
        labelEl.innerText = dd >= 0 ? "资产增长率" : "实际回撤率";

        const diff = Math.abs(c - h).toFixed(2);
        tipEl.innerHTML = dd >= 0
            ? '<span class="up">↑</span> 上涨 ' + diff + ' 个百分点'
            : '<span class="down">↓</span> 回撤 ' + diff + ' 个百分点';
    }

    function clearInputs(type) {
        if(type === 'cost') {
            ['in-now-p', 'in-now-y', 'in-target-p'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('res-cost-point').innerText = '0.00';
            document.getElementById('res-cost-tip').innerText = '输入下方数据以开始推算';
        } else {
            ['in-h-v', 'in-c-v'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('res-dd-value').innerText = '0.00%';
            document.getElementById('res-dd-value').className = 'value';
            document.getElementById('dd-label').innerText = '实际回撤率';
            document.getElementById('res-dd-tip').innerText = '等待输入数据...';
        }
        saveData();
    }

    function saveData() {
        const data = {
            'in-now-p': document.getElementById('in-now-p').value,
            'in-now-y': document.getElementById('in-now-y').value,
            'in-target-p': document.getElementById('in-target-p').value,
            'in-h-v': document.getElementById('in-h-v').value,
            'in-c-v': document.getElementById('in-c-v').value
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadData() {
        const rawData = localStorage.getItem(STORAGE_KEY);
        if (!rawData) return;
        try {
            const data = JSON.parse(rawData);
            for (let id in data) {
                const el = document.getElementById(id);
                if (el && data[id]) el.value = data[id];
            }
            runCost();
            runDD();
        } catch (e) {}
    }

    let chartDataList = [];
    let latestFundAnalysisResults = [];
    let latestFundQuotes = {};
    let fundResultSortMode = 'drawdown';
    let chartInstances = {};
    let chartFocusStates = {};
    let expandedFundCards = {};
    const DEFAULT_EXPANDED_FUND_CARDS = 0;
    let fundResultFilterMode = '';
    
    function getCSSVariableValue(name) {
        return getComputedStyle(document.body).getPropertyValue(name).trim();
    }

    function getFundShortName(name) {
        const compactName = (name || '').replace(/\s+/g, '');
        if (!compactName) return '';
        if (compactName.length <= 8) return compactName;
        return compactName.slice(0, 8);
    }

    function getChartConfig(navList, peakDate, troughDate, costChangePercent = null, focusState = '', recoveryDate = '', hasRecoveryProgress = false) {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)';
        const textColor = isDark ? '#98989d' : '#8e8e93';
        const firstNav = navList[0].nav;
        const normalData = [];
        const drawdownData = [];
        const recoveryData = [];
        const normalizeDate = (d) => (d || '').replace(/\//g, '-');
        const pDate = normalizeDate(peakDate);
        const tDate = normalizeDate(troughDate);
        const rDate = normalizeDate(recoveryDate);
        const isDrawdownFocused = focusState === 'drawdown' || !focusState;
        const recoveryEndDate = rDate || normalizeDate(navList[navList.length - 1]?.date);
        const shouldShowRecovery = Boolean(tDate && recoveryEndDate && hasRecoveryProgress);

        navList.forEach((n, index) => {
            const nDate = normalizeDate(n.date);
            const isInRange = nDate >= pDate && nDate <= tDate;
            const isRecoveryRange = shouldShowRecovery && nDate >= tDate && nDate <= recoveryEndDate;
            const changePercent = ((n.nav / firstNav) - 1) * 100;
            normalData.push((isInRange || isRecoveryRange) ? null : changePercent);
            drawdownData.push(isInRange ? changePercent : null);
            recoveryData.push(isRecoveryRange ? changePercent : null);

            // Let the highlighted segment inherit one point from the previous section
            // so the transition looks continuous instead of leaving a small visual gap.
            if (isInRange && index > 0 && drawdownData[index - 1] === null) {
                drawdownData[index - 1] = normalData[index - 1];
            }
            if (isRecoveryRange && index > 0 && recoveryData[index - 1] === null) {
                recoveryData[index - 1] = drawdownData[index - 1] ?? normalData[index - 1];
            }
        });

        const datasets = [
            {
                label: '净值',
                data: normalData,
                borderColor: isDrawdownFocused ? 'rgba(0,122,255,0.55)' : '#007aff',
                borderWidth: isDrawdownFocused ? 1.5 : 2,
                fill: true,
                backgroundColor: (context) => {
                    const chart = context.chart;
                    const {ctx, chartArea} = chart;
                    if (!chartArea) return null;
                    const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                    gradient.addColorStop(0, isDark ? 'rgba(0,122,255,0.2)' : 'rgba(0,122,255,0.1)');
                    gradient.addColorStop(1, 'rgba(0,122,255,0)');
                    return gradient;
                },
                tension: 0.4,
                pointRadius: 0,
                pointHitRadius: 15,
                spanGaps: false
            },
            {
                label: '回撤段',
                data: drawdownData,
                borderColor: '#34c759',
                borderWidth: isDrawdownFocused ? 4 : 3,
                fill: false,
                tension: 0.4,
                pointRadius: 0,
                pointHitRadius: 15,
                spanGaps: true
            }
        ];

        if (shouldShowRecovery) {
            datasets.push({
                label: '修复区间',
                data: recoveryData,
                borderColor: '#ff9500',
                borderWidth: 3,
                fill: false,
                tension: 0.4,
                pointRadius: 0,
                pointHitRadius: 15,
                spanGaps: true
            });
        }

        if (costChangePercent !== null && costChangePercent !== undefined) {
            const costData = new Array(navList.length).fill(costChangePercent);
            datasets.push({
                label: '持仓成本',
                data: costData,
                borderColor: '#ff9500',
                borderWidth: 2,
                borderDash: [5, 5],
                fill: false,
                tension: 0,
                pointRadius: 0,
                pointHitRadius: 15,
                spanGaps: true
            });
        }

        return {
            data: {
                labels: navList.map(n => n.date),
                datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: isDark ? 'rgba(28,28,30,0.9)' : 'rgba(255,255,255,0.9)',
                        titleColor: isDark ? '#fff' : '#000',
                        bodyColor: isDark ? '#ccc' : '#333',
                        borderColor: gridColor,
                        borderWidth: 1,
                        padding: 10,
                        callbacks: {
                            label: ctx => {
                                if (ctx.parsed.y !== null) {
                                    let prefix = '';
                                    if (ctx.datasetIndex === 1) {
                                        prefix = '回撤 ';
                                    } else if (shouldShowRecovery && ctx.datasetIndex === 2) {
                                        prefix = '修复 ';
                                    } else if ((shouldShowRecovery && ctx.datasetIndex === 3) || (!shouldShowRecovery && ctx.datasetIndex === 2 && costChangePercent !== null)) {
                                        prefix = '持仓成本 ';
                                        return prefix + ctx.parsed.y.toFixed(2) + '%';
                                    } else {
                                        prefix = '涨跌 ';
                                    }
                                    const sign = ctx.parsed.y >= 0 ? '+' : '';
                                    return prefix + sign + ctx.parsed.y.toFixed(2) + '%';
                                }
                                return '';
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        display: true,
                        grid: { display: false },
                        ticks: {
                            color: textColor,
                            maxTicksLimit: 4,
                            font: { size: 10 },
                            callback: function(value, index, ticks) {
                                const label = this.getLabelForValue(value);
                                if (!label) return '';
                                if (index === 0) return label;
                                const prevValue = ticks[index - 1].value;
                                const prevLabel = this.getLabelForValue(prevValue);
                                if (label.substring(0, 4) !== prevLabel.substring(0, 4)) return label;
                                return label;
                            }
                        }
                    },
                    y: {
                        display: true,
                        border: { display: false },
                        grid: { color: gridColor },
                        ticks: {
                            color: textColor,
                            maxTicksLimit: 5,
                            font: { size: 10 },
                            callback: v => (v >= 0 ? '+' : '') + v.toFixed(0) + '%'
                        }
                    }
                }
            }
        };
    }

    function renderFundChart(item) {
        const ctx = document.getElementById(item.id);
        if (!ctx || !item.navList || item.navList.length === 0) return;
        if (chartInstances[item.id]) {
            chartInstances[item.id].destroy();
        }
        const chartConfig = getChartConfig(
            item.navList,
            item.peakDate,
            item.troughDate,
            item.costChangePercent,
            chartFocusStates[item.id] || '',
            item.recoveryDate,
            item.hasRecoveryProgress
        );
        chartInstances[item.id] = new Chart(ctx, {
            type: 'line',
            data: chartConfig.data,
            options: chartConfig.options
        });
    }

    function focusFundChart(chartId, focusType = 'drawdown') {
        const nextState = chartFocusStates[chartId] === focusType ? '' : focusType;
        chartFocusStates = {};
        document.querySelectorAll('.chart-container.highlighted').forEach(el => el.classList.remove('highlighted'));
        document.querySelectorAll('.stat-item.clickable.active').forEach(el => el.classList.remove('active'));

        if (!nextState) {
            chartDataList.forEach(item => renderFundChart(item));
            return;
        }

        chartFocusStates[chartId] = nextState;
        const canvas = document.getElementById(chartId);
        const chartContainer = canvas?.closest('.chart-container');
        const activeStat = document.querySelector(`[data-chart-id="${chartId}"][data-focus="${focusType}"]`);
        if (chartContainer) {
            chartContainer.classList.add('highlighted');
            chartContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        if (activeStat) activeStat.classList.add('active');
        chartDataList.forEach(item => renderFundChart(item));
    }
    
    function drawCompareChart(canvasId, results) {
        const ctx = document.getElementById(canvasId);
        if (!ctx) return;

        const isDark = document.body.getAttribute('data-theme') === 'dark';
        const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(60,60,67,0.08)';
        const textColor = isDark ? '#98989d' : '#8e8e93';

        const colors = [
            '#007aff', '#ff3b30', '#34c759', '#ff9500', '#af52de',
            '#5856d6', '#ff2d55', '#00c7be'
        ];

        const allDates = new Set();
        results.forEach(r => {
            if (r.success && r.navList) {
                r.navList.forEach(n => allDates.add(n.date));
            }
        });
        const sortedDates = Array.from(allDates).sort();

        const datasets = [];
        results.forEach((r, idx) => {
            if (!r.success || !r.navList) return;
            const navMap = new Map();
            r.navList.forEach(n => navMap.set(n.date, n.nav));

            let firstNav = null;
            for (const date of sortedDates) {
                const nav = navMap.get(date);
                if (nav) {
                    firstNav = nav;
                    break;
                }
            }
            if (!firstNav) return;

            const data = [];
            sortedDates.forEach(date => {
                const nav = navMap.get(date);
                if (nav) {
                    data.push(((nav / firstNav) - 1) * 100);
                } else {
                    data.push(null);
                }
            });

            datasets.push({
                label: `${r.fundCode} ${getFundShortName(r.fundName)}`,
                fullLabel: `${r.fundCode} ${r.fundName || ''}`,
                data: data,
                borderColor: colors[idx % colors.length],
                borderWidth: 2,
                fill: false,
                tension: 0.4,
                pointRadius: 0,
                pointHitRadius: 15,
                spanGaps: true
            });
        });

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: sortedDates, // 使用完整日期作为标签
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: {
                        display: true,
                        position: 'top',
                        labels: {
                            color: textColor,
                            font: { size: 11, family: "SF Pro Display" },
                            usePointStyle: true,
                            boxWidth: 6
                        }
                    },
                    tooltip: {
                        backgroundColor: isDark ? 'rgba(28,28,30,0.9)' : 'rgba(255,255,255,0.9)',
                        titleColor: isDark ? '#fff' : '#000',
                        bodyColor: isDark ? '#ccc' : '#333',
                        borderColor: gridColor,
                        borderWidth: 1,
                        padding: 10,
                        callbacks: {
                            label: ctx => {
                                if (ctx.parsed.y !== null) {
                                    const sign = ctx.parsed.y >= 0 ? '+' : '';
                                    const displayLabel = ctx.dataset.fullLabel || ctx.dataset.label;
                                    return ` ${displayLabel}: ${sign}${ctx.parsed.y.toFixed(2)}%`;
                                }
                                return '';
                            }
                        }
                    }
                },
                scales: {
                   x: {
                        display: true,
                        grid: { display: false },
                        ticks: { 
                            color: textColor, 
                            maxTicksLimit: 6, 
                            font: { size: 10 },
                            callback: function(value, index, ticks) {
                            const label = this.getLabelForValue(value); // 拿到 "2025-01-16"
                            if (!label) return '';
                            
                            // 第一个点必须带年份
                            if (index === 0) return label;

                            // 拿到前一个显示的点的索引（注意这里要用 ticks 数组）
                            const prevValue = ticks[index - 1].value;
                            const prevLabel = this.getLabelForValue(prevValue);
                            
                            // 比较年份是否变化
                            if (label.substring(0, 4) !== prevLabel.substring(0, 4)) {
                                return label; // 跨年了，显示全称
                            }
                            return label; // 同一年，显示 MM-DD
                                }
                            }
                        },
                    y: {
                        display: true,
                        border: { display: false },
                        grid: { color: gridColor },
                        ticks: {
                            color: textColor,
                            font: { size: 10 },
                            callback: v => (v >= 0 ? '+' : '') + v.toFixed(0) + '%'
                        }
                    }
                }
            }
        });
    }

    function drawChart(canvasId, navList, peakDate, troughDate, costChangePercent = null, recoveryDate = '', hasRecoveryProgress = false) {
        renderFundChart({
            id: canvasId,
            navList,
            peakDate,
            troughDate,
            costChangePercent,
            recoveryDate,
            hasRecoveryProgress
        });
    }

    async function loadHoldingFunds() {
        try {
            if(typeof window.API_BASE_URL === 'undefined') window.API_BASE_URL = '';
            const response = await fetch(window.API_BASE_URL + '/api/data');
            const data = await response.json();
            if (data && data.rows) {
                holdingFunds = data.rows.filter(row => row.isFund === true || row.isFund === 'true' || row.isFund === 1);
                if (holdingFunds.length > 0) {
                    const params = new URLSearchParams();
                    params.set('items', holdingFunds.map(f => `${f.code}:1`).join(','));
                    const quotesRes = await fetch(window.API_BASE_URL + `/api/quotes?${params.toString()}`);
                    const quotesData = await quotesRes.json();
                    fundQuotes = quotesData?.quotes || {};
                }
                renderFundOptions();
            }
        } catch (e) {
            console.error('加载持仓基金失败:', e);
        }
    }

    function initFundSelect() {
        const displayBtn = document.getElementById('fund-select-display');
        const dropdown = document.getElementById('fund-dropdown');
        const searchInput = document.getElementById('fund-search-input');

        displayBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isShowing = dropdown.classList.toggle('show');
            if (isShowing && searchInput) {
                searchInput.value = '';
                renderFundOptions('');
                setTimeout(() => searchInput.focus(), 50);
            }
        });

        document.addEventListener('click', (e) => {
            if (!dropdown.contains(e.target) && e.target !== displayBtn) {
                dropdown.classList.remove('show');
            }
        });

        if (searchInput) {
            searchInput.addEventListener('click', (e) => e.stopPropagation());
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    e.stopPropagation();
                    const kw = searchInput.value.trim();
                    if (kw && /^\d+$/.test(kw)) {
                        toggleFundSelection(kw);
                        searchInput.value = '';
                        renderFundOptions('');
                    }
                }
            });
        }
    }

    function filterFundOptions(keyword) { renderFundOptions(keyword); }

    async function fetchCustomFundName(fundCode) {
        if (customFundNames[fundCode] || loadingFundCodes.has(fundCode)) return;
        loadingFundCodes.add(fundCode);
        try {
            const res = await fetch(window.API_BASE_URL + '/api/fund-estimate/' + fundCode);
            const data = await res.json();
            if (data.success && data.fundName) {
                customFundNames[fundCode] = data.fundName;
                const searchInput = document.getElementById('fund-search-input');
                if (searchInput) renderFundOptions(searchInput.value);
            }
        } catch (e) {
            console.error('获取基金名称失败:', e);
        } finally {
            loadingFundCodes.delete(fundCode);
        }
    }

    function renderFundOptions(searchKeyword = '') {
        const container = document.getElementById('fund-options-list');
        if (!container) return;
        const kw = searchKeyword.trim().toLowerCase();
        let filteredFunds = holdingFunds;
        if (kw) {
            filteredFunds = holdingFunds.filter(fund =>
                (fund.code && fund.code.toLowerCase().includes(kw)) ||
                (fund.name && fund.name.toLowerCase().includes(kw))
            );
        }

        filteredFunds = [...filteredFunds].sort((a, b) => {
            const getProfit = (fund) => {
                const quote = fundQuotes[`${fund.code}:1`];
                if (quote && quote.price && fund.cost && fund.cost > 0) {
                    return ((quote.price - fund.cost) / fund.cost) * 100;
                }
                return 0;
            };
            return getProfit(a) - getProfit(b);
        });

        let html = '';
        html += filteredFunds.map(fund => {
            const quote = fundQuotes[`${fund.code}:1`];
            let profitHtml = '';
            if (quote && quote.price && fund.cost && fund.cost > 0) {
                const profitPercent = ((quote.price - fund.cost) / fund.cost) * 100;
                const color = profitPercent >= 0 ? 'var(--ios-red)' : 'var(--ios-green)';
                const sign = profitPercent >= 0 ? '+' : '';
                profitHtml = `<span style="float: right; color: ${color}; font-weight: 600;">${sign}${profitPercent.toFixed(2)}%</span>`;
            }
            return `
            <div class="fund-option ${selectedFundCodes.has(fund.code) ? 'selected' : ''}" data-code="${fund.code}">
                <div class="fund-option-checkbox"></div>
                <div class="fund-option-info">
                    <div class="fund-option-code">${fund.code}</div>
                    <div class="fund-option-name">${fund.name || ''}${profitHtml}</div>
                </div>
            </div>
        `}).join('');

        if (kw && /^\d+$/.test(kw) && !holdingFunds.some(f => f.code === kw)) {
            if (filteredFunds.length > 0) html += `<div style="height: 0.5px; background: var(--ios-border); margin: 0 16px;"></div>`;
            const isSelected = selectedFundCodes.has(kw);
            const fundName = customFundNames[kw];
            const isLoading = loadingFundCodes.has(kw);

            let displayName = isSelected ? (fundName ? `${fundName} · 已添加` : '已添加') : (fundName ? fundName : (isLoading ? '加载中...' : '添加此基金'));
            html += `
            <div class="fund-option ${isSelected ? 'selected' : ''}" data-code="${kw}" data-custom="true">
                <div class="fund-option-checkbox"></div>
                <div class="fund-option-info">
                    <div class="fund-option-code">${kw}</div>
                    <div class="fund-option-name" style="color: ${isSelected && fundName ? 'var(--ios-secondary)' : 'var(--ios-primary)'};">
                        ${displayName}
                    </div>
                </div>
            </div>`;
            if (!fundName && !isLoading) fetchCustomFundName(kw);
        }

        if (!html) html = '<div style="padding: 30px; text-align: center; color: var(--ios-secondary); font-size: 14px;">暂无相关基金</div>';
        container.innerHTML = html;

        container.querySelectorAll('.fund-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                toggleFundSelection(opt.dataset.code);
            });
        });
    }

    function toggleFundSelection(code) {
        selectedFundCodes.has(code) ? selectedFundCodes.delete(code) : selectedFundCodes.add(code);
        updateFundSelection();
    }

    function updateFundSelection() {
        document.getElementById('in-fund-codes').value = Array.from(selectedFundCodes).join(',');
        const displayBtn = document.getElementById('fund-select-display');
        if (selectedFundCodes.size === 0) {
            displayBtn.textContent = '点击选择';
        } else if (selectedFundCodes.size === 1) {
            const code = Array.from(selectedFundCodes)[0];
            const fund = holdingFunds.find(f => f.code === code);
            displayBtn.textContent = fund ? fund.code : code;
        } else {
            displayBtn.textContent = `已选 ${selectedFundCodes.size} 支`;
        }

        document.querySelectorAll('.fund-option').forEach(opt => {
            opt.classList.toggle('selected', selectedFundCodes.has(opt.dataset.code));
        });
    }

    function clearFundSelection() { selectedFundCodes.clear(); updateFundSelection(); }
    function selectAllFunds() { holdingFunds.forEach(fund => selectedFundCodes.add(fund.code)); updateFundSelection(); }

    function setDaysPreset(days) {
        document.getElementById('in-fund-days').value = days;
        document.querySelectorAll('.days-preset-btn').forEach(btn => {
            btn.classList.toggle('active', parseInt(btn.dataset.days) === days);
        });
    }

    function onDaysInputChange() {
        const inputDays = parseInt(document.getElementById('in-fund-days').value);
        let matched = false;
        document.querySelectorAll('.days-preset-btn').forEach(btn => {
            const isActive = parseInt(btn.dataset.days) === inputDays;
            btn.classList.toggle('active', isActive);
            if (isActive) matched = true;
        });
        if (!matched) document.querySelectorAll('.days-preset-btn').forEach(btn => btn.classList.remove('active'));
    }

    function getSortedFundResults(results, quotes, sortMode = fundResultSortMode) {
        return [...results].sort((a, b) => {
            if (!a.success) return 1;
            if (!b.success) return -1;

            if (sortMode === 'change') {
                const aChange = Number(quotes?.[`${a.fundCode}:1`]?.change);
                const bChange = Number(quotes?.[`${b.fundCode}:1`]?.change);
                const normalizedA = Number.isFinite(aChange) ? aChange : -Infinity;
                const normalizedB = Number.isFinite(bChange) ? bChange : -Infinity;
                if (normalizedA !== normalizedB) return normalizedB - normalizedA;
            }

            return parseFloat(b.maxDrawdown.maxDrawdownPercent) - parseFloat(a.maxDrawdown.maxDrawdownPercent);
        });
    }

    function getFundSortButtonHtml(isActive) {
        const btnClass = isActive ? 'fund-sort-btn active' : 'fund-sort-btn';
        const btnText = isActive ? '今日涨跌' : '排序';
        return `<button type="button" class="${btnClass}" onclick="toggleFundResultSort()"><span class="sort-icon">↕</span><span class="sort-label">${btnText}</span></button>`;
    }

    function isFundCardExpanded(fundCode, index) {
        if (Object.prototype.hasOwnProperty.call(expandedFundCards, fundCode)) {
            return expandedFundCards[fundCode];
        }
        return index < DEFAULT_EXPANDED_FUND_CARDS;
    }

    function toggleFundCard(fundCode) {
        const cardEl = document.querySelector(`[data-fund-code="${fundCode}"]`);
        const currentExpanded = cardEl ? !cardEl.classList.contains('collapsed') : isFundCardExpanded(fundCode, DEFAULT_EXPANDED_FUND_CARDS);
        expandedFundCards[fundCode] = !currentExpanded;
        renderFundAnalysisResults(latestFundAnalysisResults, latestFundQuotes);
    }

    function setAllFundCardsExpanded(expanded) {
        latestFundAnalysisResults
            .filter(result => result && result.success)
            .forEach(result => {
                expandedFundCards[result.fundCode] = expanded;
            });
        renderFundAnalysisResults(latestFundAnalysisResults, latestFundQuotes);
    }

    function areAllFundCardsExpanded(results) {
        const successResults = results.filter(result => result && result.success);
        if (!successResults.length) return false;
        return successResults.every((result, index) => isFundCardExpanded(result.fundCode, index));
    }

    function toggleAllFundCards() {
        const shouldCollapse = areAllFundCardsExpanded(latestFundAnalysisResults);
        setAllFundCardsExpanded(!shouldCollapse);
    }

    function getFundExpandToggleHtml(results) {
        const isAllExpanded = areAllFundCardsExpanded(results);
        return `<button type="button" class="fund-toolbar-btn" onclick="toggleAllFundCards()">${isAllExpanded ? '全部收起' : '全部展开'}</button>`;
    }

    function getHoldingProfit(result, quotes) {
        const holdingFund = holdingFunds.find(f => f.code === result.fundCode);
        const currentNav = Number(quotes?.[`${result.fundCode}:1`]?.price);
        if (!holdingFund || !(holdingFund.shares > 0) || !(holdingFund.cost > 0) || !Number.isFinite(currentNav) || currentNav <= 0) {
            return null;
        }
        return (currentNav - holdingFund.cost) * holdingFund.shares;
    }

    function toggleFundResultFilter(mode) {
        fundResultFilterMode = fundResultFilterMode === mode ? '' : mode;
        renderFundAnalysisResults(latestFundAnalysisResults, latestFundQuotes);
    }

    function getFundAnalysisSummaryHtml(results, quotes) {
        const successResults = results.filter(result => result && result.success);
        if (!successResults.length) return '';

        let upCount = 0;
        let unrecoveredCount = 0;
        let positiveHoldingCount = 0;
        let totalHoldingProfit = 0;
        let hasHoldingProfit = false;

        successResults.forEach(result => {
            const quoteChange = Number(quotes?.[`${result.fundCode}:1`]?.change);
            if (Number.isFinite(quoteChange) && quoteChange > 0) upCount += 1;
            if (!result.maxDrawdown?.recovered) unrecoveredCount += 1;

            const holdingFund = holdingFunds.find(f => f.code === result.fundCode);
            const holdingProfit = getHoldingProfit(result, quotes);
            if (holdingFund && holdingProfit !== null) {
                totalHoldingProfit += holdingProfit;
                hasHoldingProfit = true;
                if (holdingProfit > 0) positiveHoldingCount += 1;
            }
        });

        const totalHoldingProfitClass = hasHoldingProfit ? (totalHoldingProfit >= 0 ? 'up' : 'down') : '';
        const totalHoldingProfitText = hasHoldingProfit
            ? `${totalHoldingProfit >= 0 ? '+' : ''}${Math.round(totalHoldingProfit)}`
            : '--';

        return `<div class="analysis-summary-card">
            <div class="analysis-summary-header">
                <div class="analysis-summary-title">分析结果</div>
                <div class="analysis-summary-meta">共 ${successResults.length} 支基金</div>
            </div>
            <div class="analysis-summary-grid">
                <div class="analysis-summary-item">
                    <div class="analysis-summary-label">今日上涨</div>
                    <div class="analysis-summary-value up">${upCount}</div>
                </div>
                <div class="analysis-summary-item">
                    <div class="analysis-summary-label">未修复</div>
                    <div class="analysis-summary-value down">${unrecoveredCount}</div>
                </div>
                <div class="analysis-summary-item clickable${fundResultFilterMode === 'positive_holding' ? ' active' : ''}" onclick="toggleFundResultFilter('positive_holding')">
                    <div class="analysis-summary-label">持仓盈利</div>
                    <div class="analysis-summary-value up">${positiveHoldingCount}</div>
                </div>
                <div class="analysis-summary-item">
                    <div class="analysis-summary-label">持仓总收益</div>
                    <div class="analysis-summary-value ${totalHoldingProfitClass}">${totalHoldingProfitText}</div>
                </div>
            </div>
        </div>`;
    }

    function renderFundAnalysisResults(results, quotes) {
        Object.values(chartInstances).forEach(chart => chart?.destroy());
        chartInstances = {};
        chartFocusStates = {};
        chartDataList = [];
        const resultsEl = document.getElementById('fund-results');
        const sortedResults = getSortedFundResults(results, quotes, fundResultSortMode);
        const filteredResults = fundResultFilterMode === 'positive_holding'
            ? sortedResults.filter(result => !result.success || ((getHoldingProfit(result, quotes) ?? -Infinity) > 0))
            : sortedResults;
        const successResults = filteredResults.filter(r => r.success);
        let html = '';

        html += getFundAnalysisSummaryHtml(sortedResults, quotes);

        if (successResults.length > 1) {
            html += `<div class="compare-chart-container">
                <div class="compare-chart-title">组合收益走势对比</div>
                <canvas id="compare-chart"></canvas>
            </div>`;
        }

        for (let index = 0; index < filteredResults.length; index++) {
            const result = filteredResults[index];

            if (!result.success) {
                html += `<div class="fund-result-card${index === 0 ? ' has-sort-control' : ''}">
                    ${index === 0 ? `<div class="fund-top-actions">${getFundSortButtonHtml(fundResultSortMode === 'change')}${successResults.length > 1 ? getFundExpandToggleHtml(sortedResults) : ''}</div>` : ''}
                    <div class="fund-code">${result.fundCode}</div>
                    <div class="error-msg">获取失败: ${result.error}</div>
                </div>`;
                continue;
            }

            const dd = result.maxDrawdown;
            const ret = result.returnData;
            const isPositive = parseFloat(ret.returnPercent) >= 0;
            const chartId = 'chart-' + result.fundCode;
            const quote = quotes[`${result.fundCode}:1`];
            const isExpanded = isFundCardExpanded(result.fundCode, index);
            
            let yesterdayChangeHtml = '';
            
            if (quote && quote.change !== undefined && quote.change !== null && !isNaN(quote.change)) {
                const change = quote.change;
                const color = change >= 0 ? 'var(--ios-red)' : 'var(--ios-green)';
                const sign = change >= 0 ? '+' : '';
                let label = '净值涨跌';
                if (quote.priceDate) {
                    const today = new Date();
                    const todayStr = today.getFullYear().toString() + (today.getMonth() + 1).toString().padStart(2, '0') + today.getDate().toString().padStart(2, '0');
                    const yesterday = new Date(today);
                    yesterday.setDate(yesterday.getDate() - 1);
                    const yesterdayStr = yesterday.getFullYear().toString() + (yesterday.getMonth() + 1).toString().padStart(2, '0') + yesterday.getDate().toString().padStart(2, '0');
                    if (quote.priceDate === todayStr) label = '今日涨跌';
                    else if (quote.priceDate === yesterdayStr) label = '昨日涨跌';
                }
                yesterdayChangeHtml = `
                    <div style="display: flex; flex-direction: column; align-items: center;">
                        <span style="color: var(--ios-secondary); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; font-weight:600;">${label}</span>
                        <span style="color: ${color}; font-weight: 800; font-size: 16px; margin-top: 4px; font-variant-numeric: tabular-nums;">${sign}${change.toFixed(2)}%</span>
                    </div>`;
            }

            const holdingFund = holdingFunds.find(f => f.code === result.fundCode);
            let rightHeaderHtml = '';
            let holdingYieldHtml = '';
            
            if (holdingFund && holdingFund.shares && holdingFund.shares > 0) {
                const currentNav = quote?.price || 0;
                if (currentNav > 0 && holdingFund.cost && holdingFund.cost > 0) {
                    const holdingProfit = (currentNav - holdingFund.cost) * holdingFund.shares;
                    const holdingYieldPercent = ((currentNav - holdingFund.cost) / holdingFund.cost) * 100;
                    const profitColor = holdingProfit >= 0 ? 'var(--ios-red)' : 'var(--ios-green)';
                    const yieldColor = holdingYieldPercent >= 0 ? 'var(--ios-red)' : 'var(--ios-green)';
                    const profitSign = holdingProfit >= 0 ? '+' : '';
                    const yieldSign = holdingYieldPercent >= 0 ? '+' : '';
                    
                    holdingYieldHtml = `<div style="display: flex; flex-direction: column; align-items: center;">
                        <span style="color: var(--ios-secondary); font-size: 11px; font-weight: 600; text-align: center;">持仓收益率</span>
                        <span style="color: ${yieldColor}; font-weight: 800; font-size: 16px; margin-top: 4px; font-variant-numeric: tabular-nums;">${yieldSign}${holdingYieldPercent.toFixed(2)}%</span>
                    </div>`;
                    
                    rightHeaderHtml = `<div style="display: flex; flex-direction: column; align-items: center;">
                        <span style="color: var(--ios-secondary); font-size: 11px; font-weight: 600; text-align: center;">持仓收益</span>
                        <span style="color: ${profitColor}; font-weight: 800; font-size: 16px; margin-top:2px;">${profitSign}${Math.round(holdingProfit)}</span>
                    </div>`;
                }
            }

            let recoveryHtml = '';
            let peakRecoveryProfit = null;
            let peakNav = null;
            let peakNavDate = null;

            if (holdingFund && holdingFund.shares && holdingFund.shares > 0 && holdingFund.cost && holdingFund.cost > 0 && result.navList && result.navList.length > 0) {
                let maxNav = 0;
                let maxNavItem = null;
                for (const item of result.navList) {
                    if (item.nav && item.nav > maxNav) {
                        maxNav = item.nav;
                        maxNavItem = item;
                    }
                }
                if (maxNavItem) {
                    peakNav = maxNavItem.nav;
                    peakNavDate = maxNavItem.date;
                    peakRecoveryProfit = (peakNav - holdingFund.cost) * holdingFund.shares;
                }
            }

            const modalData = JSON.stringify({
                fundCode: result.fundCode,
                fundName: result.fundName,
                peakDate: dd.peakDate,
                troughDate: dd.troughDate,
                recoveryDate: dd.recoveryDate,
                recoveryDays: dd.recoveryDays,
                recovered: dd.recovered,
                currentRecoveryPercent: dd.currentRecoveryPercent,
                remainingRecoveryPercent: dd.remainingRecoveryPercent,
                peakNav: peakNav,
                peakNavDate: peakNavDate,
                costBasis: holdingFund?.cost,
                shares: holdingFund?.shares,
                peakRecoveryProfit: peakRecoveryProfit
            });

            if (dd.recovered && dd.recoveryDate) {
                recoveryHtml = `
                    <div class="stat-item clickable" onclick='showRecoveryModal(${modalData})'>
                        <div class="stat-label">修复周期</div>
                        <div class="stat-value" style="color: var(--ios-text);">${dd.recoveryDays}天</div>
                        <div class="stat-sub">${dd.troughDate.slice(5)}至${dd.recoveryDate.slice(5)}</div>
                    </div>`;
            } else if (dd.currentRecoveryPercent) {
                recoveryHtml = `
                    <div class="stat-item clickable" onclick='showRecoveryModal(${modalData})'>
                        <div class="stat-label">修复进度</div>
                        <div class="stat-value" style="color: var(--ios-orange);">+${dd.currentRecoveryPercent}%</div>
                        <div class="stat-sub">仍需 +${dd.remainingRecoveryPercent}%</div>
                    </div>`;
            }

            html += `<div class="fund-result-card${index === 0 ? ' has-sort-control' : ''}${isExpanded ? '' : ' collapsed'}" data-fund-code="${result.fundCode}">
                ${index === 0 ? `<div class="fund-top-actions">${getFundSortButtonHtml(fundResultSortMode === 'change')}${successResults.length > 1 ? getFundExpandToggleHtml(sortedResults) : ''}</div>` : ''}
                <div class="fund-header">
                    <div style="display: flex; flex-direction: column; align-items: flex-start;">
                        <div class="fund-code">${result.fundCode}</div>
                        <div class="fund-name" title="${result.fundName || ''}" style="max-width: 130px; font-size: 12px; line-height: 1.4; white-space: nowrap;">
                            ${(result.fundName || '').replace(/\s+/g, '').slice(0, 6)}<br/>
                            ${(result.fundName || '').replace(/\s+/g, '').length > 6 ? (result.fundName || '').replace(/\s+/g, '').slice(6, 12) : ''}
                        </div>
                    </div>
                    ${yesterdayChangeHtml || '<div></div>'}
                    ${holdingYieldHtml || '<div></div>'}
                    ${rightHeaderHtml || '<div></div>'}
                </div>
                <div class="fund-card-body"${isExpanded ? '' : ' style="display:none;"'}>
                    <div class="fund-stats">
                        <div class="stat-item clickable" data-chart-id="${chartId}" data-focus="drawdown" onclick="focusFundChart('${chartId}', 'drawdown')">
                            <div class="stat-label">最大回撤</div>
                            <div class="stat-value negative">${dd.maxDrawdownPercent}%</div>
                            <div class="stat-sub">${dd.peakDate.slice(5)}至${dd.troughDate.slice(5)}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">区间收益</div>
                            <div class="stat-value ${isPositive ? 'positive' : 'negative'}">${isPositive ? '+' : ''}${ret.returnPercent}%</div>
                            <div class="stat-sub">共 ${result.dataRange.dataPoints} 交易日</div>
                        </div>
                        ${recoveryHtml}
                    </div>
                    <div class="chart-container">
                        <div class="chart-header">
                            <div class="chart-title">区间走势</div>
                            <div class="chart-meta">${result.dataRange.dataPoints} 个交易日</div>
                        </div>
                        <canvas id="${chartId}"></canvas>
                    </div>
                </div>
                <button type="button" class="fund-card-toggle" onclick="toggleFundCard('${result.fundCode}')"><span class="toggle-icon">⌃</span><span>${isExpanded ? '收起详情' : '展开详情'}</span></button>
            </div>`;

            if (isExpanded) {
                chartDataList.push({
                    id: chartId,
                    navList: result.navList,
                    peakDate: dd.peakDate,
                    troughDate: dd.troughDate,
                    costChangePercent: result.costChangePercent,
                    recoveryDate: dd.recoveryDate,
                    hasRecoveryProgress: Boolean(dd.recoveryDate || dd.currentRecoveryPercent)
                });
            }
        }

        resultsEl.innerHTML = html;

        if (successResults.length > 1) drawCompareChart('compare-chart', successResults);
        chartDataList.forEach(item => drawChart(item.id, item.navList, item.peakDate, item.troughDate, item.costChangePercent, item.recoveryDate, item.hasRecoveryProgress));
    }

    function toggleFundResultSort() {
        if (!latestFundAnalysisResults.length) return;
        fundResultSortMode = fundResultSortMode === 'drawdown' ? 'change' : 'drawdown';
        renderFundAnalysisResults(latestFundAnalysisResults, latestFundQuotes);
    }

    async function analyzeFundDrawdown() {
        chartDataList = [];
        const codesInput = document.getElementById('in-fund-codes').value.trim();
        const days = parseInt(document.getElementById('in-fund-days').value) || 365;
        const resultsEl = document.getElementById('fund-results');
        const btnEl = document.querySelector('.btn-analyze');

        if (!codesInput) {
            resultsEl.innerHTML = '<div class="error-msg">请先选择或输入基金代码</div>';
            return;
        }

        const fundCodes = codesInput.split(',').map(c => c.trim()).filter(c => c);
        
        // 显示 Loading 遮罩
        showLoading();
        updateLoadingProgress(0, '正在获取实时行情...', '准备阶段');
        
        try {
            // 不需要实时估值，直接跳过
            const estimates = {};

            updateLoadingProgress(20, '正在获取实时行情...', '获取行情');
            
            // 获取实时行情
            const quotesRes = await fetch(window.API_BASE_URL + '/api/quotes?items=' + fundCodes.map(c => `${c}:1`).join(','));
            const quotesData = await quotesRes.json();
            const quotes = quotesData?.quotes || {};
            latestFundQuotes = quotes;
            fundResultSortMode = 'drawdown';

            const results = [];
            // 逐个分析基金
            for (let i = 0; i < fundCodes.length; i++) {
                const code = fundCodes[i];
                const progress = Math.round(30 + (i / fundCodes.length) * 60); // 30% - 90%
                updateLoadingProgress(
                    progress, 
                    `正在分析 ${i + 1}/${fundCodes.length}`, 
                    `处理基金 ${code}`
                );
                
                try {
                    // 查找持仓基金的成本数据
                    const holdingFund = holdingFunds.find(f => f.code === code);
                    const costBasis = (holdingFund && holdingFund.cost && holdingFund.cost > 0) ? holdingFund.cost : null;
                                
                    // 构建 URL，如果有持仓成本则传递
                    let url = window.API_BASE_URL + '/api/fund-drawdown/' + code + '?days=' + days;
                    if (costBasis) {
                        url += '&costBasis=' + encodeURIComponent(costBasis);
                    }
                                
                    const res = await fetch(url);
                    const data = await res.json();
                    results.push(data);
                } catch (e) {
                    results.push({ success: false, fundCode: code, error: e.message });
                }
            }
            latestFundAnalysisResults = results;
    
            // 更新进度到 100%
            updateLoadingProgress(100, '分析完成！', '正在渲染图表...');
                
            // 延迟一小段时间后关闭 loading，让用户看到完成状态
            await new Promise(resolve => setTimeout(resolve, 500));
            hideLoading();
    
            renderFundAnalysisResults(latestFundAnalysisResults, latestFundQuotes);
    
        } catch (e) {
            hideLoading();
            resultsEl.innerHTML = `<div class="error-msg">拉取数据失败：${e.message}</div>`;
        } finally {
            btnEl.disabled = false;
            btnEl.textContent = '开始分析';
        }
    }
    
    // ==================== Loading 控制函数 ====================
    function showLoading() {
        const overlay = document.getElementById('loading-overlay');
        overlay.style.display = 'flex';
        startLoadingTimer();
        document.body.style.overflow = 'hidden'; // 禁止背景滚动
    }
    
    function hideLoading() {
        const overlay = document.getElementById('loading-overlay');
        overlay.style.display = 'none';
        stopLoadingTimer();
        document.body.style.overflow = ''; // 恢复滚动
    }
    
    function updateLoadingProgress(progress, title, subtext) {
        const progressBar = document.getElementById('progress-bar');
        const loadingTitle = document.getElementById('loading-title');
        const loadingProgress = document.getElementById('loading-progress');
        const loadingSubtext = document.getElementById('loading-subtext');
    
        if (progressBar) {
            progressBar.style.width = progress + '%';
        }
        if (loadingTitle) {
            loadingTitle.textContent = title;
        }
        if (loadingProgress) {
            loadingProgress.textContent = subtext;
        }
    }

    function updateLoadingElapsedText() {
        const loadingSubtext = document.getElementById('loading-subtext');
        if (!loadingSubtext || !loadingStartTime) return;

        const elapsedSeconds = Math.floor((Date.now() - loadingStartTime) / 1000);
        loadingSubtext.textContent = `此次分析已耗时 ${elapsedSeconds} 秒`;
    }

    function startLoadingTimer() {
        stopLoadingTimer();
        loadingStartTime = Date.now();
        updateLoadingElapsedText();
        loadingTimerId = setInterval(updateLoadingElapsedText, 1000);
    }

    function stopLoadingTimer() {
        if (loadingTimerId) {
            clearInterval(loadingTimerId);
            loadingTimerId = null;
        }
        loadingStartTime = 0;
    }

    // ==================== 修复进度弹框函数 ====================
    function showRecoveryModal(data) {
        const overlay = document.getElementById('recovery-modal-overlay');
        const titleEl = document.getElementById('recovery-modal-title');
        const contentEl = document.getElementById('recovery-modal-content');

        titleEl.textContent = `${data.fundCode} ${data.fundName || ''}`.slice(0, 20);

        let html = '';

        // 回撤区间
        html += `<div class="recovery-modal-row">
            <span class="recovery-modal-label">回撤区间</span>
            <span class="recovery-modal-value">${data.peakDate?.slice(5) || '-'} 至 ${data.troughDate?.slice(5) || '-'}</span>
        </div>`;

        if (data.recovered && data.recoveryDate) {
            // 已修复
            html += `<div class="recovery-modal-row">
                <span class="recovery-modal-label">修复周期</span>
                <span class="recovery-modal-value">${data.recoveryDays}天</span>
            </div>`;
            html += `<div class="recovery-modal-row">
                <span class="recovery-modal-label">修复完成</span>
                <span class="recovery-modal-value">${data.recoveryDate?.slice(5) || '-'}</span>
            </div>`;
        } else if (data.currentRecoveryPercent) {
            // 修复中
            html += `<div class="recovery-modal-row">
                <span class="recovery-modal-label">已修复</span>
                <span class="recovery-modal-value" style="color: var(--ios-orange);">+${data.currentRecoveryPercent}%</span>
            </div>`;
            html += `<div class="recovery-modal-row">
                <span class="recovery-modal-label">仍需修复</span>
                <span class="recovery-modal-value">+${data.remainingRecoveryPercent}%</span>
            </div>`;
        }

        // 成本和份额、本金
        if (data.costBasis && data.shares) {
            const principal = data.costBasis * data.shares;
            html += `<div class="recovery-modal-row">
                <span class="recovery-modal-label">持仓成本</span>
                <span class="recovery-modal-value">${parseFloat(data.costBasis).toFixed(4)}</span>
            </div>`;
            html += `<div class="recovery-modal-row">
                <span class="recovery-modal-label">持有份额</span>
                <span class="recovery-modal-value">${parseFloat(data.shares).toFixed(2)}</span>
            </div>`;
            html += `<div class="recovery-modal-row">
                <span class="recovery-modal-label">本金</span>
                <span class="recovery-modal-value">${Math.round(principal)}</span>
            </div>`;
        }

        // 回到周期最高收益和收益率
        if (data.peakRecoveryProfit !== null && data.peakRecoveryProfit !== undefined && data.peakNav && data.costBasis && data.costBasis > 0) {
            const profitColor = data.peakRecoveryProfit >= 0 ? 'var(--ios-red)' : 'var(--ios-green)';
            const profitSign = data.peakRecoveryProfit >= 0 ? '+' : '';
            const peakYieldPercent = ((data.peakNav - data.costBasis) / data.costBasis) * 100;
            const yieldColor = peakYieldPercent >= 0 ? 'var(--ios-red)' : 'var(--ios-green)';
            const yieldSign = peakYieldPercent >= 0 ? '+' : '';

            html += `<div class="recovery-modal-row">
                <span class="recovery-modal-label">回到周期最高收益率</span>
                <span class="recovery-modal-value" style="color: ${yieldColor};">${yieldSign}${peakYieldPercent.toFixed(2)}%</span>
            </div>`;
            html += `<div class="recovery-modal-row">
                <span class="recovery-modal-label">回到周期最高赚</span>
                <span class="recovery-modal-value" style="color: ${profitColor};">${profitSign}${Math.round(data.peakRecoveryProfit)}</span>
            </div>`;
        }
        if (data.peakNav) {
            const peakDateDisplay = data.peakNavDate ? data.peakNavDate.slice(5) : '-';
            html += `<div class="recovery-modal-row">
                <span class="recovery-modal-label">周期最高净值</span>
                <span class="recovery-modal-value">${parseFloat(data.peakNav).toFixed(4)} (${peakDateDisplay})</span>
            </div>`;
        }

        contentEl.innerHTML = html;
        overlay.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeRecoveryModal(event) {
        if (event && event.target && event.target.id !== 'recovery-modal-overlay') return;
        const overlay = document.getElementById('recovery-modal-overlay');
        overlay.style.display = 'none';
        document.body.style.overflow = '';
    }
</script>
