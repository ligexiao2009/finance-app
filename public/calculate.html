<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>投资管理 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        :root {
            --system-red: #ff3b30;
            --system-green: #34c759;
            --system-blue: #007aff;
            --bg-color: #f2f2f7;
            --card-bg: rgba(255, 255, 255, 0.8);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(at 0% 0%, rgba(0, 122, 255, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 59, 48, 0.05) 0px, transparent 50%),
                var(--bg-color);
            min-height: 100vh;
            color: #1c1c1e;
        }

        .container {
            max-width: 440px;
            margin: auto;
            padding: 20px 16px;
        }

        /* 主资产卡片 */
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
        }

        .header-label {
            font-size: 13px;
            color: #8e8e93;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .profit-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 20px;
        }

        .big-num {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: -1.2px;
            transition: color 0.3s;
        }

        .percent-badge {
            font-size: 14px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        /* KPI 指标卡片 */
        .kpis {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .kpi {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            padding: 12px 6px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.4), 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .kpi .v {
            font-size: 14px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .kpi .l {
            font-size: 10px;
            color: #8e8e93;
            margin-top: 4px;
            font-weight: 500;
        }

        /* 头部价格输入（缩小版） */
        .price-input-group {
            display: flex;
            background: rgba(0, 0, 0, 0.05);
            padding: 5px;
            border-radius: 14px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-wrapper::before {
            content: attr(data-label);
            position: absolute;
            left: 12px;
            top: 8px;
            font-size: 10px;
            color: #8e8e93;
            font-weight: 600;
        }

        .price-input-group input {
            width: 100%;
            padding: 22px 12px 8px;
            border: none;
            background: transparent;
            font-size: 18px;
            font-weight: 700;
            color: var(--system-blue);
            outline: none;
        }

        /* 列表记录 */
        .list-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 4px 16px;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
        }

        .item:last-child {
            border: none;
        }

        /* 列表中的输入框（缩小版） */
        .entry-fields {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .entry-fields input {
            width: 72px;
            padding: 8px 6px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            background: white;
            font-size: 15px;
            text-align: center;
            font-weight: 700;
            outline: none;
        }

        .entry-fields span {
            font-size: 12px;
            color: #c7c7cc;
            font-weight: 600;
        }

        .item-right-box {
            display: flex;
            align-items: center;
        }

        .item-right {
            text-align: right;
            min-width: 80px;
        }

        .item-profit {
            font-size: 16px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .item-rate {
            font-size: 11px;
            margin-top: 2px;
            font-weight: 600;
        }

        .delete-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 59, 48, 0.1);
            color: var(--system-red);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin-left: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .delete-btn:active {
            background: var(--system-red);
            color: white;
            transform: scale(0.9);
        }

        .add-btn {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            border: none;
            background: var(--system-blue);
            color: white;
            margin-top: 16px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.25);
        }

        .add-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* 状态色 */
        .red {
            color: var(--system-red);
        }

        .green {
            color: var(--system-green);
        }

        .bg-red {
            background: rgba(255, 59, 48, 0.1);
            color: var(--system-red);
        }

        .bg-green {
            background: rgba(52, 199, 89, 0.1);
            color: var(--system-green);
        }

        .fade {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 走势图容器 */
        .chart-card {
            background:
                radial-gradient(circle at top right, rgba(96, 165, 250, 0.12), transparent 28%),
                linear-gradient(180deg, #12192d 0%, #0d1427 100%);
            border-radius: 30px;
            padding: 18px;
            margin-top: 16px;
            border: 1px solid rgba(148, 163, 184, 0.14);
            box-shadow: 0 22px 52px rgba(2, 6, 23, 0.28);
            display: none;
            /* 默认隐藏，选择股票后显示 */
            overflow: hidden;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 14px;
        }

        .chart-title-wrap {
            min-width: 0;
        }

        .chart-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            background: rgba(96, 165, 250, 0.14);
            color: #93c5fd;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin-bottom: 10px;
        }

        .chart-eyebrow::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 0 4px rgba(147, 197, 253, 0.12);
        }

        .chart-title {
            font-size: 18px;
            font-weight: 700;
            color: #f8fafc;
            line-height: 1.2;
            letter-spacing: -0.03em;
        }

        .chart-subtitle {
            margin-top: 6px;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 500;
        }

        .chart-controls {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .chart-period {
            display: flex;
            gap: 6px;
            padding: 4px;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .period-btn {
            min-width: 58px;
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid transparent;
            background: transparent;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .period-btn.active {
            background: linear-gradient(180deg, #1e90ff 0%, #007aff 100%);
            color: white;
            border-color: var(--system-blue);
            box-shadow: 0 10px 18px rgba(0, 122, 255, 0.22);
        }

        .period-btn:not(.active):hover {
            background: rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
        }

        .chart-reset-btn {
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(15, 23, 42, 0.55);
            color: #cbd5e1;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .chart-reset-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
        }

        .chart-range {
            display: flex;
            gap: 6px;
            padding: 4px;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.16);
        }

        .range-btn {
            min-width: 62px;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid transparent;
            background: transparent;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .range-btn.active {
            background: rgba(96, 165, 250, 0.18);
            border-color: rgba(96, 165, 250, 0.28);
            color: #e0f2fe;
        }

        .range-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
        }

        .chart-container {
            position: relative;
            height: 330px;
            width: 100%;
            padding: 14px 12px 8px;
            border-radius: 24px;
            background:
                radial-gradient(circle at top right, rgba(59, 130, 246, 0.12), transparent 26%),
                linear-gradient(180deg, #12192d 0%, #10182b 100%);
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .chart-navigator {
            margin-top: 10px;
            padding: 10px 12px 12px;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.12);
        }

        .chart-navigator[hidden] {
            display: none;
        }

        .chart-nav-top {
            position: relative;
            height: 38px;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.04);
        }

        #kline-overview {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .chart-nav-selection {
            position: absolute;
            top: 2px;
            bottom: 2px;
            border-radius: 8px;
            background: rgba(96, 165, 250, 0.18);
            border: 1px solid rgba(147, 197, 253, 0.55);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
            pointer-events: none;
        }

        .chart-nav-selection::before,
        .chart-nav-selection::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 4px;
            height: 16px;
            margin-top: -8px;
            border-radius: 999px;
            background: rgba(241, 245, 249, 0.9);
        }

        .chart-nav-selection::before {
            left: 6px;
        }

        .chart-nav-selection::after {
            right: 6px;
        }

        .chart-nav-slider {
            margin-top: 10px;
        }

        .chart-nav-zoom {
            margin-top: 10px;
        }

        .chart-nav-caption {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            color: #94a3b8;
            font-size: 11px;
            font-weight: 700;
        }

        .chart-nav-slider input[type="range"],
        .chart-nav-zoom input[type="range"] {
            width: 100%;
            margin: 0;
            background: transparent;
            appearance: none;
            -webkit-appearance: none;
        }

        .chart-nav-slider input[type="range"]::-webkit-slider-runnable-track,
        .chart-nav-zoom input[type="range"]::-webkit-slider-runnable-track {
            height: 6px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.22);
        }

        .chart-nav-slider input[type="range"]::-webkit-slider-thumb,
        .chart-nav-zoom input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            margin-top: -6px;
            border-radius: 50%;
            border: 2px solid rgba(191, 219, 254, 0.95);
            background: #60a5fa;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.28);
        }

        .chart-nav-slider input[type="range"]::-moz-range-track,
        .chart-nav-zoom input[type="range"]::-moz-range-track {
            height: 6px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.22);
        }

        .chart-nav-slider input[type="range"]::-moz-range-thumb,
        .chart-nav-zoom input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(191, 219, 254, 0.95);
            background: #60a5fa;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.28);
        }

        .chart-nav-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            color: #64748b;
            font-size: 11px;
            font-weight: 600;
        }

        .chart-container::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 24px;
            pointer-events: none;
            background:
                linear-gradient(180deg, transparent, rgba(148, 163, 184, 0.04));
        }

        #kline-chart {
            position: relative;
            z-index: 1;
        }

        .chart-loading {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 8px;
            height: 100%;
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .chart-loading small {
            font-size: 12px;
            font-weight: 500;
            color: #64748b;
        }

        @media (max-width: 480px) {
            .chart-header {
                flex-direction: column;
            }

            .chart-period {
                width: 100%;
            }

            .period-btn {
                flex: 1;
            }

            .chart-controls {
                width: 100%;
            }

            .chart-reset-btn {
                width: 100%;
            }

            .chart-container {
                height: 300px;
            }
        }
    </style>
    <script src="app-config.js"></script>
</head>

    <script>
        // 确保插件正常注册
        window.addEventListener('load', function () {
            if (window.ChartZoom) {
                try {
                    Chart.register(window.ChartZoom);
                } catch (e) {
                    console.warn('注册ChartZoom失败:', e);
                }
            }
        });

        // 持仓数据 (重命名为 holdingsData 避免和图表数据变量名冲突)
        let holdingsData = JSON.parse(localStorage.getItem('invest_pro_data')) || [
            { shares: 700, price: 141 },
            { shares: 700, price: 100 }
        ];

        // 图表相关变量
        let klineChart = null;
        let currentStockCode = null;
        let currentChartScale = 240; // 默认日线
        let currentKlineData = null;
        let currentRangePreset = null;
        let currentWindowStartIndex = null;
        let currentVisibleCount = null;
        let currentWindowSize = null;

        function getChartPeriodLabel(scale) {
            if (scale >= 7200) return '月线';
            if (scale >= 1200) return '周线';
            return '日线';
        }

        function getRangeCount(rangeKey, scale) {
            if (rangeKey === '2y') {
                if (scale >= 7200) return 24;
                if (scale >= 1200) return 104;
                return 500;
            }

            if (rangeKey === '5y') {
                if (scale >= 7200) return 60;
                if (scale >= 1200) return 260;
                return 1250;
            }

            return getInitialVisibleCount(scale);
        }

        function getDefaultWindowCount(rangeKey, scale) {
            if (scale >= 7200) {
                return rangeKey === '5y' ? 24 : 18;
            }

            if (scale >= 1200) {
                return rangeKey === '5y' ? 80 : 56;
            }

            return rangeKey === '5y' ? 220 : 160;
        }

        function getMinimumWindowCount(scale) {
            if (scale >= 7200) return 6;
            if (scale >= 1200) return 16;
            return 30;
        }

        function getKlineDataLength(scale) {
            if (scale >= 7200) return 120;
            if (scale >= 1200) return 320;
            return 1500;
        }

        function updateRangeButtons() {
            document.querySelectorAll('.range-btn').forEach(btn => {
                if (btn.dataset.range === currentRangePreset) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function clampChartWindowStart(start, total, visibleCount) {
            const maxStart = Math.max(0, total - visibleCount);
            return Math.max(0, Math.min(Number(start) || 0, maxStart));
        }

        // 获取每个加仓阶段的历史成本线数组
        function getHistoricalBreakevenPrices() {
            let prices = [];
            let totalShares = 0;
            let totalCost = 0;

            holdingsData.forEach((item, index) => {
                const s = Number(item.shares) || 0;
                const p = Number(item.price) || 0;

                // 只有当存在份额时才计算新的阶段成本
                if (s > 0) {
                    totalShares += s;
                    totalCost += s * p;
                    prices.push({
                        label: index === holdingsData.length - 1 ? '最新总成本' : `阶段成本 ${index + 1}`,
                        price: totalCost / totalShares
                    });
                }
            });

            return prices;
        }

        function handleFocus(el) {
            if (el.value === "0") {
                el.value = "";
            } else {
                el.select();
            }
        }

        function animateNumber(el, to) {
            const start = Number(el.dataset.val || 0);
            const duration = 400;
            const startTime = performance.now();

            function tick(now) {
                const progress = Math.min((now - startTime) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                const val = start + (to - start) * ease;
                el.innerText = '¥' + Math.round(val).toLocaleString();
                if (progress < 1) requestAnimationFrame(tick);
                else el.dataset.val = to;
            }
            requestAnimationFrame(tick);
        }

        function calculateOnly() {
            let totalCost = 0;
            let totalShares = 0;
            const currentPrice = +document.getElementById('price').value || 0;

            holdingsData.forEach((d, i) => {
                const cost = d.shares * d.price;
                const profit = (d.shares * currentPrice) - cost;
                const rate = cost ? (profit / cost * 100).toFixed(2) : '0.00';

                totalCost += cost;
                totalShares += d.shares;

                const itemProfitEl = document.getElementById(`p-${i}`);
                const itemRateEl = document.getElementById(`r-${i}`);
                if (itemProfitEl && itemRateEl) {
                    itemProfitEl.innerText = (profit >= 0 ? '+' : '') + Math.round(profit);
                    itemProfitEl.className = `item-profit ${profit >= 0 ? 'red' : 'green'}`;
                    itemRateEl.innerText = rate + '%';
                    itemRateEl.className = `item-rate ${profit >= 0 ? 'red' : 'green'}`;
                }
            });

            const totalValue = totalShares * currentPrice;
            const totalProfit = totalValue - totalCost;
            const totalRate = totalCost ? (totalProfit / totalCost * 100).toFixed(2) : '0.00';

            animateNumber(document.getElementById('profit'), totalProfit);
            document.getElementById('profit').className = `big-num ${totalProfit >= 0 ? 'red' : 'green'}`;

            const rateEl = document.getElementById('rate');
            rateEl.innerText = (totalProfit >= 0 ? '+' : '') + totalRate + '%';
            rateEl.className = `percent-badge ${totalProfit >= 0 ? 'bg-red' : 'bg-green'}`;

            document.getElementById('cost').innerText = '¥' + Math.round(totalCost).toLocaleString();
            document.getElementById('value').innerText = '¥' + Math.round(totalValue).toLocaleString();
            document.getElementById('breakeven').innerText = totalShares ? (totalCost / totalShares).toFixed(2) : '0.00';
            document.getElementById('total-display').value = totalShares;

            localStorage.setItem('invest_pro_data', JSON.stringify(holdingsData));

            if (currentStockCode && currentKlineData) {
                renderKlineChart(currentKlineData);
            }
        }

        function renderList() {
            const list = document.getElementById('list');
            list.innerHTML = '';

            holdingsData.forEach((d, i) => {
                const div = document.createElement('div');
                div.className = 'item fade';
                div.innerHTML = `
                    <div class="entry-fields">
                        <input type="number" value="${d.shares}" oninput="updateData(${i},'shares',this.value)" onfocus="handleFocus(this)">
                        <span>股 @</span>
                        <input type="number" value="${d.price}" oninput="updateData(${i},'price',this.value)" onfocus="handleFocus(this)">
                    </div>
                    <div class="item-right-box">
                        <div class="item-right">
                        <div id="p-${i}" class="item-profit">0</div>
                        <div id="r-${i}" class="item-rate">0%</div>
                        </div>
                        <button class="delete-btn" onclick="removeRecord(${i})">×</button>
                    </div>
                    `;
                list.appendChild(div);
            });
            calculateOnly();
        }

        function updateData(i, key, val) {
            holdingsData[i][key] = +val || 0;
            calculateOnly();
        }

        function addRecord() {
            holdingsData.push({ shares: 0, price: 0 });
            renderList();
        }

        function removeRecord(i) {
            const items = document.querySelectorAll('.item');
            items[i].style.opacity = '0';
            items[i].style.transform = 'translateX(40px)';
            setTimeout(() => {
                holdingsData.splice(i, 1);
                renderList();
            }, 250);
        }

        renderList();
        loadHoldings();

        async function loadHoldings() {
            try {
                const apiBase = window.API_BASE_URL || '';
                const url = apiBase + '/api/data';

                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error('获取持仓数据失败: ' + response.status);
                }
                const responseData = await response.json();

                const select = document.getElementById('stock-select');
                while (select.options.length > 1) {
                    select.remove(1);
                }
                const stocks = responseData.rows.filter(row => !row.isFund);

                stocks.forEach(stock => {
                    const option = document.createElement('option');
                    option.value = stock.id || stock.code;
                    option.textContent = `${stock.name || stock.code} (${stock.shares}股 @ ${stock.cost})`;
                    option.dataset.shares = stock.shares;
                    option.dataset.cost = stock.cost;
                    option.dataset.code = stock.code;
                    select.appendChild(option);
                });
            } catch (error) {
                console.warn('加载持仓失败:', error.message);
            }
        }

        async function onStockSelectChange(select) {
            const selectedOption = select.options[select.selectedIndex];
            if (!selectedOption.value) {
                return;
            }
            const shares = parseFloat(selectedOption.dataset.shares);
            const cost = parseFloat(selectedOption.dataset.cost);
            const stockCode = selectedOption.dataset.code;
            if (isNaN(shares) || isNaN(cost) || shares <= 0 || cost <= 0) {
                alert('持仓数据无效');
                select.selectedIndex = 0;
                return;
            }
            holdingsData.length = 0;
            holdingsData.push({ shares: shares, price: cost });
            renderList();

            if (stockCode) {
                try {
                    const price = await fetchStockPrice(stockCode);
                    if (price > 0) {
                        const priceInput = document.getElementById('price');
                        priceInput.value = price;
                        calculateOnly();
                    }
                } catch (error) {
                    console.error('获取股票价格失败:', error);
                }

                showKlineChart(stockCode);
            }
        }

        async function fetchStockPrice(stockCode) {
            try {
                const apiBase = window.API_BASE_URL || '';
                const url = `${apiBase}/api/quotes?items=${encodeURIComponent(stockCode + ':0')}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('获取价格失败');
                const responseData = await response.json();
                const key = `${stockCode}:0`;
                const quote = responseData.quotes[key];
                if (quote && quote.price > 0) {
                    return quote.price;
                }
                return 0;
            } catch (error) {
                console.error('获取股票价格失败:', error);
                return 0;
            }
        }

        // 显示图表并加载数据
        async function showKlineChart(stockCode) {
            currentStockCode = stockCode;
            currentWindowStartIndex = null;
            currentWindowSize = null;

            const chartCard = document.getElementById('chart-card');
            chartCard.style.display = 'block';

            const chartTitle = document.getElementById('chart-title');
            chartTitle.textContent = `${stockCode} 走势图`;
            const chartSubtitle = document.getElementById('chart-subtitle');
            chartSubtitle.textContent = `查看 ${getChartPeriodLabel(currentChartScale)} 趋势与价格波动`;
            updateRangeButtons();

            const loadingEl = document.getElementById('chart-loading');
            const canvasEl = document.getElementById('kline-chart');
            loadingEl.style.display = 'flex';
            canvasEl.style.display = 'none';
            loadingEl.innerHTML = '正在加载图表数据...<small>图表数据准备中</small>';

            await loadKlineData(stockCode, currentChartScale);
        }

        // 加载图表数据
        async function loadKlineData(stockCode, scale) {
            try {
                let symbol;
                if (stockCode.length === 5) {
                    symbol = 'hk' + stockCode;
                } else if (/^[569]/.test(stockCode)) {
                    symbol = 'sh' + stockCode;
                } else {
                    symbol = 'sz' + stockCode;
                }

                const apiBase = window.API_BASE_URL || '';
                const url = `${apiBase}/api/kline/${symbol}?scale=${scale}&datalen=${getKlineDataLength(scale)}`;

                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const result = await response.json();
                if (!result.success) {
                    throw new Error(result.error || '获取图表数据失败');
                }

                const parsedData = parseKlineData(result.data);
                currentKlineData = parsedData;

                const loadingEl = document.getElementById('chart-loading');
                const canvasEl = document.getElementById('kline-chart');
                canvasEl.style.display = 'block';
                loadingEl.style.display = 'none';

                renderKlineChart(parsedData);

            } catch (error) {
                console.error('加载图表数据失败:', error);
                const loadingEl = document.getElementById('chart-loading');
                const navigator = document.getElementById('chart-navigator');
                if (navigator) {
                    navigator.hidden = true;
                }
                loadingEl.innerHTML = '加载图表数据失败<small>请稍后重试</small>';
            }
        }

        // 解析图表数据
        function parseKlineData(klineData) {
            if (!Array.isArray(klineData) || klineData.length === 0) {
                return { labels: [], timestamps: [], closes: [], dates: [] };
            }

            const labels = [];
            const timestamps = [];
            const closes = [];
            const dates = [];

            const sortedData = [...klineData].sort((a, b) => {
                return new Date(a.day) - new Date(b.day);
            });

            sortedData.forEach(item => {
                const date = new Date(item.day);
                const timestamp = date.getTime();
                const close = parseFloat(item.close);

                if (Number.isNaN(timestamp) || !Number.isFinite(close)) {
                    return;
                }

                labels.push(item.day);
                timestamps.push(timestamp);
                dates.push(item.day);
                closes.push(close);
            });

            return { labels, timestamps, closes, dates };
        }

        function getChartTimeUnit(scale) {
            if (scale >= 7200) return 'month';
            if (scale >= 1200) return 'week';
            return 'day';
        }

        function getInitialVisibleCount(scale) {
            if (scale >= 7200) return 24;
            if (scale >= 1200) return 36;
            return 60;
        }
        function getDefaultVisibleCount(scale) {
            console.log('getDefaultVisibleCount for scale', scale); 
            if (scale >= 7200) return 12;
            if (scale >= 1200) return 24;
            return 40;
        }

        function resetChartZoom() {
            if (!klineChart) return;

            currentRangePreset = null;
            currentWindowStartIndex = null;
            currentWindowSize = null;
            updateRangeButtons();
            if (typeof klineChart.resetZoom === 'function') {
                klineChart.resetZoom();
            }

            if (currentKlineData) {
                renderKlineChart(currentKlineData);
            }
        }

        function setChartRange(rangeKey) {
            currentRangePreset = currentRangePreset === rangeKey ? null : rangeKey;
            currentWindowStartIndex = null;
            currentWindowSize = null;
            updateRangeButtons();

            if (!currentKlineData) return;

            renderKlineChart(currentKlineData);
        }

        function drawOverviewChart(chartData) {
            const canvas = document.getElementById('kline-overview');
            if (!canvas) return;

            const width = canvas.clientWidth || canvas.parentElement?.clientWidth || 0;
            const height = canvas.clientHeight || 38;
            if (!width || !height) return;

            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.round(width * dpr);
            canvas.height = Math.round(height * dpr);

            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, width, height);

            const values = chartData.closes || [];
            if (values.length < 2) return;

            const min = Math.min(...values);
            const max = Math.max(...values);
            const range = Math.max(max - min, 0.01);

            ctx.beginPath();
            values.forEach((value, index) => {
                const x = (index / (values.length - 1)) * width;
                const y = height - ((value - min) / range) * (height - 6) - 3;
                if (index === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.strokeStyle = 'rgba(96, 165, 250, 0.9)';
            ctx.lineWidth = 1.25;
            ctx.stroke();

            ctx.lineTo(width, height - 2);
            ctx.lineTo(0, height - 2);
            ctx.closePath();
            ctx.fillStyle = 'rgba(96, 165, 250, 0.10)';
            ctx.fill();
        }

        function updateChartNavigator(chartData, startIndex, visibleCount) {
            const navigator = document.getElementById('chart-navigator');
            const slider = document.getElementById('chart-window-slider');
            const sizeSlider = document.getElementById('chart-window-size-slider');
            const selection = document.getElementById('chart-nav-selection');
            const startLabel = document.getElementById('chart-nav-start-label');
            const endLabel = document.getElementById('chart-nav-end-label');
            const windowCaption = document.getElementById('chart-window-caption');
            const zoomCaption = document.getElementById('chart-zoom-caption');
            if (!navigator || !slider || !sizeSlider || !selection || !startLabel || !endLabel || !windowCaption || !zoomCaption) {
                return;
            }

            const total = chartData.timestamps.length;
            if (!total || total <= visibleCount) {
                navigator.hidden = true;
                return;
            }

            navigator.hidden = false;
            drawOverviewChart(chartData);

            const maxStart = Math.max(0, total - visibleCount);
            slider.max = String(maxStart);
            slider.value = String(startIndex);
            windowCaption.textContent = `${startIndex + 1} / ${Math.max(1, maxStart + 1)}`;

            const rangeMax = Math.min(getRangeCount(currentRangePreset, currentChartScale), total);
            const minWindow = Math.min(getMinimumWindowCount(currentChartScale), rangeMax);
            sizeSlider.min = String(minWindow);
            sizeSlider.max = String(rangeMax);
            sizeSlider.value = String(visibleCount);
            zoomCaption.textContent = `${visibleCount} 个点`;

            const leftPercent = (startIndex / total) * 100;
            const widthPercent = (visibleCount / total) * 100;
            selection.style.left = `${leftPercent}%`;
            selection.style.width = `${Math.max(widthPercent, 6)}%`;

            startLabel.textContent = chartData.dates[startIndex] || '-';
            endLabel.textContent = chartData.dates[Math.min(total - 1, startIndex + visibleCount - 1)] || '-';
        }

        function handleChartWindowSlide(value) {
            if (!currentKlineData) return;
            currentWindowStartIndex = Number(value) || 0;
            renderKlineChart(currentKlineData);
        }

        function handleChartZoomSlide(value) {
            if (!currentKlineData) return;
            currentWindowSize = Number(value) || null;
            currentWindowStartIndex = clampChartWindowStart(currentWindowStartIndex, currentKlineData.timestamps.length, currentWindowSize || currentVisibleCount || getInitialVisibleCount(currentChartScale));
            renderKlineChart(currentKlineData);
        }

        // 绘制折线图
        function renderKlineChart(chartData) {
            const canvas = document.getElementById('kline-chart');
            if (!canvas) return;

            if (!chartData || !Array.isArray(chartData.labels) || !Array.isArray(chartData.closes)) {
                console.error('无效的图表数据格式:', chartData);
                return;
            }

            if (!Array.isArray(chartData.timestamps) || chartData.timestamps.length === 0) {
                console.warn('图表无可用数据点');
                const navigator = document.getElementById('chart-navigator');
                if (navigator) {
                    navigator.hidden = true;
                }
                return;
            }

            const ctx = canvas.getContext('2d');

            if (klineChart) {
                try {
                    klineChart.destroy();
                    klineChart = null;
                } catch (error) {
                    console.warn('销毁现有图表时出错:', error);
                }
            }

            const existingChart = Chart.getChart(canvas);
            if (existingChart) {
                try {
                    existingChart.destroy();
                } catch (error) { }
            }

            const xValues = chartData.timestamps && chartData.timestamps.length > 0 ? chartData.timestamps : chartData.labels;
            const len = xValues.length;
            if (len === 0 || chartData.closes.length !== len) {
                console.error('数据长度不一致或为空');
                return;
            }

            // 获取各阶段的历史持仓成本
            const costPrices = getHistoricalBreakevenPrices();
            const costPriceValues = costPrices.map(cp => cp.price);

            // 将每一次的成本线转换为 Dataset，并分配不同的颜色
            const costDatasets = costPrices.map((cp, idx) => {
                const isLatest = idx === costPrices.length - 1; // 最后一个就是“最新总成本”
                // 内置几个漂亮的备选颜色
                const lineColors = [
                    'rgba(245, 158, 11, 0.95)',  // 橙色
                    'rgba(16, 185, 129, 0.95)',  // 翠绿
                    'rgba(139, 92, 246, 0.95)',  // 紫色
                    'rgba(236, 72, 153, 0.95)',  // 粉红
                    'rgba(6, 182, 212, 0.95)'    // 青色
                ];
                const color = lineColors[idx % lineColors.length];

                return {
                    type: 'line',
                    label: cp.label,
                    data: xValues.map(timestamp => ({ x: timestamp, y: cp.price })),
                    borderColor: color,
                    borderWidth: isLatest ? 2 : 1.5,
                    borderDash: isLatest ? [] : [6, 6], // 最新成本用实线，历史成本保留用虚线
                    pointRadius: 0,
                    pointHitRadius: 8,
                    fill: false,
                    tension: 0,
                    order: isLatest ? -1 : 0 // 最新成本展示在最上层
                };
            });

            const configData = {
                datasets: [
                    {
                        label: '收盘价',
                        data: xValues.map((timestamp, index) => ({
                            x: timestamp,
                            y: chartData.closes[index]
                        })),
                        borderColor: 'rgb(0, 122, 255)',
                        backgroundColor: 'rgba(0, 122, 255, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.15,
                        pointRadius: 0,
                        pointHitRadius: 10,
                        order: 1 // 走势图放在下面
                    },
                    ...costDatasets // 展开所有的历史和最新成本线
                ]
            };

            // 计算包含图表价格和所有历史成本线在内的 Y 轴范围
            const minPrice = Math.min(...chartData.closes, ...(costPriceValues.length ? costPriceValues : []));
            const maxPrice = Math.max(...chartData.closes, ...(costPriceValues.length ? costPriceValues : []));
            const pricePadding = Math.max((maxPrice - minPrice) * 0.08, maxPrice * 0.01, 0.01);

            // 2. 在 renderKlineChart 内部应用
            const rangeMaxCount = Math.min(getRangeCount(currentRangePreset, currentChartScale), xValues.length);

            // 确认这一行：使用的是 getDefaultVisibleCount 而不是原先的 getDefaultWindowCount
            const defaultWindowCount = Math.min(getDefaultVisibleCount(currentChartScale), rangeMaxCount);

            const visibleCount = Math.max(
                Math.min(currentWindowSize == null ? defaultWindowCount : currentWindowSize, rangeMaxCount, xValues.length),
                Math.min(getMinimumWindowCount(currentChartScale), rangeMaxCount)
            );
            const startIndex = currentWindowStartIndex == null
                ? Math.max(0, xValues.length - visibleCount)
                : clampChartWindowStart(currentWindowStartIndex, xValues.length, visibleCount);

            currentWindowStartIndex = startIndex;
            currentVisibleCount = visibleCount;
            const initialMin = visibleCount > 0 ? xValues[startIndex] : undefined;
            const initialMax = visibleCount > 0 ? xValues[Math.min(xValues.length - 1, startIndex + visibleCount - 1)] : undefined;
            console.log('渲染图表 with visibleCount:', visibleCount, 'startIndex:', startIndex, 'initialMin:', initialMin, 'initialMax:', initialMax);
            klineChart = new Chart(ctx, {
                type: 'line',
                data: configData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                        axis: 'x' // 增强水平滑动的灵敏度
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        zoom: {
                            pan: {
                                enabled: true,
                                mode: 'x'
                            },
                            zoom: {
                                wheel: {
                                    enabled: true
                                },
                                pinch: {
                                    enabled: true
                                },
                                drag: {
                                    enabled: true,
                                    backgroundColor: 'rgba(96, 165, 250, 0.12)',
                                    borderColor: 'rgba(147, 197, 253, 0.5)',
                                    borderWidth: 1
                                },
                                mode: 'x'
                            },
                            limits: {
                                x: {
                                    min: xValues[0],
                                    max: xValues[xValues.length - 1],
                                    minRange: currentChartScale >= 7200 ? 1000 * 60 * 60 * 24 * 30 : 1000 * 60 * 60 * 24 * 7
                                }
                            }
                        },
                        tooltip: {
                            displayColors: false,
                            backgroundColor: 'rgba(248, 250, 252, 0.96)',
                            titleColor: '#0f172a',
                            bodyColor: '#334155',
                            borderColor: 'rgba(148, 163, 184, 0.25)',
                            borderWidth: 1,
                            padding: 12,
                            callbacks: {
                                title: (items) => items[0] ? chartData.dates[items[0].dataIndex] : '',
                                label: (context) => {
                                    // 格式化 Tooltip，包含“阶段成本”、“最新总成本”或“收盘价”
                                    if (context.dataset.label.includes('成本')) {
                                        return `${context.dataset.label}: ${context.parsed.y.toFixed(2)}`;
                                    }
                                    return `收盘价: ${context.parsed.y.toFixed(2)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            min: initialMin,
                            max: initialMax,
                            time: {
                                unit: getChartTimeUnit(currentChartScale),
                                tooltipFormat: 'yyyy-MM-dd',
                                // 新增：优化不同周期下的显示格式
                                displayFormats: {
                                    day: 'MM-dd',           // 日线视图：04-11
                                    week: 'yy年MM月',        // 周线视图：26年04月 (缩短年份)
                                    month: 'yyyy-MM',       // 月线视图：2026-04
                                    quarter: 'yyyy年'
                                }
                            },
                            ticks: {
                                color: '#94a3b8',
                                maxRotation: 0,
                                autoSkip: true,
                                maxTicksLimit: 5,
                                font: {
                                    size: 10 // 稍微调小字体大小
                                }
                            },
                            grid: {
                                color: 'rgba(148, 163, 184, 0.1)',
                                drawBorder: false
                            }
                        },
                        y: {
                            position: 'right',
                            min: Math.max(0, minPrice - pricePadding),
                            max: maxPrice + pricePadding,
                            ticks: {
                                color: '#94a3b8',
                                callback: function (value) {
                                    return value.toFixed(2);
                                }
                            },
                            grid: {
                                color: 'rgba(148, 163, 184, 0.05)', // 让网格线更淡，突出K线                                drawBorder: false
                            }
                        }
                    }
                }
            });

            updateChartNavigator(chartData, startIndex, visibleCount);
        }

        // 切换周期
        async function changeChartPeriod(scale) {
            if (scale === currentChartScale || !currentStockCode) return;

            document.querySelectorAll('.period-btn').forEach(btn => {
                if (btn.dataset.scale == scale) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            currentChartScale = scale;
            updateRangeButtons();
            currentWindowStartIndex = null;
            currentWindowSize = null;
            const chartSubtitle = document.getElementById('chart-subtitle');
            if (chartSubtitle) {
                chartSubtitle.textContent = `查看 ${getChartPeriodLabel(scale)} 趋势与价格波动`;
            }

            const loadingEl = document.getElementById('chart-loading');
            const canvasEl = document.getElementById('kline-chart');
            loadingEl.style.display = 'flex';
            canvasEl.style.display = 'none';
            loadingEl.innerHTML = '正在加载图表数据...<small>切换到新的周期视图</small>';

            await loadKlineData(currentStockCode, scale);
        }
    </script>

</body>

</html>
