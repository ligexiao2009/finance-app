<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>投资管理 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        :root {
            --system-red: #ff3b30;
            --system-green: #34c759;
            --system-blue: #007aff;
            --bg-color: #f2f2f7;
            --card-bg: rgba(255, 255, 255, 0.8);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(at 0% 0%, rgba(0, 122, 255, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 59, 48, 0.05) 0px, transparent 50%),
                var(--bg-color);
            min-height: 100vh;
            color: #1c1c1e;
        }

        .container {
            max-width: 440px;
            margin: auto;
            padding: 20px 16px;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
        }

        .header-label {
            font-size: 13px;
            color: #8e8e93;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .profit-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 20px;
        }

        .big-num {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: -1.2px;
            transition: color 0.3s;
        }

        .percent-badge {
            font-size: 14px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .kpis {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .kpi {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            padding: 12px 6px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.4), 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .kpi .v {
            font-size: 14px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .kpi .l {
            font-size: 10px;
            color: #8e8e93;
            margin-top: 4px;
            font-weight: 500;
        }

        .price-input-group {
            display: flex;
            background: rgba(0, 0, 0, 0.05);
            padding: 5px;
            border-radius: 14px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-wrapper::before {
            content: attr(data-label);
            position: absolute;
            left: 12px;
            top: 8px;
            font-size: 10px;
            color: #8e8e93;
            font-weight: 600;
        }

        .price-input-group input {
            width: 100%;
            padding: 22px 12px 8px;
            border: none;
            background: transparent;
            font-size: 18px;
            font-weight: 700;
            color: var(--system-blue);
            outline: none;
        }

        .list-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 4px 16px;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
        }

        .item:last-child {
            border: none;
        }

        .entry-fields {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .entry-fields input {
            width: 72px;
            padding: 8px 6px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            background: white;
            font-size: 15px;
            text-align: center;
            font-weight: 700;
            outline: none;
        }

        .entry-fields span {
            font-size: 12px;
            color: #c7c7cc;
            font-weight: 600;
        }

        .item-right-box {
            display: flex;
            align-items: center;
        }

        .item-right {
            text-align: right;
            min-width: 80px;
        }

        .item-profit {
            font-size: 16px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .item-rate {
            font-size: 11px;
            margin-top: 2px;
            font-weight: 600;
        }

        .delete-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 59, 48, 0.1);
            color: var(--system-red);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin-left: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .delete-btn:active {
            background: var(--system-red);
            color: white;
            transform: scale(0.9);
        }

        .add-btn {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            border: none;
            background: var(--system-blue);
            color: white;
            margin-top: 16px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.25);
        }

        .add-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .red {
            color: var(--system-red);
        }

        .green {
            color: var(--system-green);
        }

        .bg-red {
            background: rgba(255, 59, 48, 0.1);
            color: var(--system-red);
        }

        .bg-green {
            background: rgba(52, 199, 89, 0.1);
            color: var(--system-green);
        }

        .fade {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 走势图容器 */
        .chart-card {
            background: radial-gradient(circle at top right, rgba(96, 165, 250, 0.12), transparent 28%), linear-gradient(180deg, #12192d 0%, #0d1427 100%);
            border-radius: 30px;
            padding: 18px;
            margin-top: 16px;
            border: 1px solid rgba(148, 163, 184, 0.14);
            box-shadow: 0 22px 52px rgba(2, 6, 23, 0.28);
            display: none;
            overflow: hidden;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 14px;
        }

        .chart-title-wrap {
            min-width: 0;
        }

        .chart-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            background: rgba(96, 165, 250, 0.14);
            color: #93c5fd;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin-bottom: 10px;
        }

        .chart-eyebrow::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 0 4px rgba(147, 197, 253, 0.12);
        }

        .chart-title {
            font-size: 18px;
            font-weight: 700;
            color: #f8fafc;
            line-height: 1.2;
            letter-spacing: -0.03em;
        }

        .chart-subtitle {
            margin-top: 6px;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 500;
        }

        .chart-controls {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .chart-period {
            display: flex;
            gap: 6px;
            padding: 4px;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .period-btn {
            min-width: 58px;
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid transparent;
            background: transparent;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .period-btn.active {
            background: linear-gradient(180deg, #1e90ff 0%, #007aff 100%);
            color: white;
            border-color: var(--system-blue);
            box-shadow: 0 10px 18px rgba(0, 122, 255, 0.22);
        }

        .chart-reset-btn {
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(15, 23, 42, 0.55);
            color: #cbd5e1;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .chart-container {
            position: relative;
            height: 330px;
            width: 100%;
            padding: 14px 12px 8px;
            border-radius: 24px;
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.12), transparent 26%), linear-gradient(180deg, #12192d 0%, #10182b 100%);
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        #kline-chart {
            position: relative;
            z-index: 1;
        }

        .chart-loading {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 8px;
            height: 100%;
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        .chart-loading small {
            font-size: 12px;
            font-weight: 500;
            color: #64748b;
        }

        @media (max-width: 480px) {
            .chart-header {
                flex-direction: column;
            }

            .chart-period,
            .chart-controls,
            .chart-reset-btn {
                width: 100%;
            }

            .period-btn {
                flex: 1;
            }

            .chart-container {
                height: 300px;
            }
        }
    </style>
    <script src="app-config.js"></script>
</head>

<body>

    <div class="container">
        <div class="main-card">
            <div class="header-label">预计总盈亏</div>
            <div class="profit-row">
                <div id="profit" class="big-num red">¥0</div>
                <div id="rate" class="percent-badge bg-red">0.00%</div>
            </div>
            <div class="kpis">
                <div class="kpi">
                    <div id="cost" class="v">¥0</div>
                    <div class="l">总成本</div>
                </div>
                <div class="kpi">
                    <div id="value" class="v">¥0</div>
                    <div class="l">当前市值</div>
                </div>
                <div class="kpi">
                    <div id="breakeven" class="v">0.00</div>
                    <div class="l">回本单价</div>
                </div>
            </div>
            <div class="price-input-group">
                <div class="input-wrapper" data-label="市场单价">
                    <input type="number" id="price" value="170" step="0.01" oninput="calculateOnly()"
                        onfocus="handleFocus(this)">
                </div>
                <div style="width:1px; background:rgba(0,0,0,0.08); margin:10px 0;"></div>
                <div class="input-wrapper" data-label="累计持仓">
                    <input type="number" id="total-display" value="0" readonly>
                </div>
            </div>
        </div>

        <div class="list-card" style="margin-bottom: 12px; padding: 16px;">
            <select id="stock-select"
                style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: white; font-size: 14px; font-weight: 600; outline: none;"
                onchange="onStockSelectChange(this)">
                <option value="">选择持仓股票...</option>
            </select>
        </div>

        <div class="list-card">
            <div id="list"></div>
        </div>
        <button class="add-btn" onclick="addRecord()">+ 新增补仓记录</button>

        <div class="chart-card" id="chart-card">
            <div class="chart-header">
                <div class="chart-title-wrap">
                    <div class="chart-eyebrow">趋势图表</div>
                    <div class="chart-title" id="chart-title">收盘价走势图</div>
                    <div class="chart-subtitle" id="chart-subtitle">查看最近一段时间的价格波动，可缩放时间范围</div>
                </div>
                <div class="chart-controls">
                    <div class="chart-period">
                        <button class="period-btn active" data-scale="240" onclick="changeChartPeriod(240)">日线</button>
                        <button class="period-btn" data-scale="1200" onclick="changeChartPeriod(1200)">周线</button>
                        <button class="period-btn" data-scale="7200" onclick="changeChartPeriod(7200)">月线</button>
                    </div>
                    <button class="chart-reset-btn" onclick="resetChartZoom()">重置缩放</button>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="kline-chart"></canvas>
                <div class="chart-loading" id="chart-loading">正在加载图表数据...</div>
            </div>
        </div>
    </div>

    <script>
        // 确保插件正常注册
        window.addEventListener('load', function () {
            if (window.ChartZoom) {
                try { Chart.register(window.ChartZoom); } catch (e) { }
            }
        });

        let holdingsData = JSON.parse(localStorage.getItem('invest_pro_data')) || [
            { shares: 700, price: 141 }, { shares: 700, price: 100 }
        ];

        let klineChart = null;
        let currentStockCode = null;
        let currentChartScale = 240;
        let currentKlineData = null;
        let currentRangePreset = null;
        let currentWindowStartIndex = null;
        let currentWindowSize = null;

        function getChartPeriodLabel(scale) {
            if (scale >= 7200) return '月线';
            if (scale >= 1200) return '周线';
            return '日线';
        }

        // 补回丢失的获取数据长度函数
        function getKlineDataLength(scale) {
            if (scale >= 7200) return 120;
            if (scale >= 1200) return 250;
            return 500;
        }

        function getRangeCount(rangeKey, scale) {
            return scale >= 7200 ? 60 : scale >= 1200 ? 260 : 1250;
        }

        function getMinimumWindowCount(scale) {
            if (scale >= 7200) return 6;
            if (scale >= 1200) return 12;
            return 20;
        }

        function getDefaultVisibleCount(scale) {
            if (scale >= 7200) return 12;
            if (scale >= 1200) return 24;
            return 30; // 默认放大视角
        }

        function clampChartWindowStart(start, total, visibleCount) {
            const maxStart = Math.max(0, total - visibleCount);
            return Math.max(0, Math.min(Number(start) || 0, maxStart));
        }

        function getHistoricalBreakevenPrices() {
            let prices = [], totalShares = 0, totalCost = 0;
            holdingsData.forEach((item, index) => {
                const s = Number(item.shares) || 0, p = Number(item.price) || 0;
                if (s > 0) {
                    totalShares += s; totalCost += s * p;
                    prices.push({ label: index === holdingsData.length - 1 ? '最新总成本' : `阶段成本 ${index + 1}`, price: totalCost / totalShares });
                }
            });
            return prices;
        }

        function updateYAxisRange(chart) {
            const xAxis = chart.scales.x, yAxis = chart.scales.y;
            const minTime = xAxis.min, maxTime = xAxis.max;
            const priceDataset = chart.data.datasets.find(ds => ds.label === '收盘价');
            if (!priceDataset || !priceDataset.data) return;

            const visibleData = priceDataset.data.filter(p => p.x >= minTime && p.x <= maxTime);
            if (visibleData.length > 0) {
                const prices = visibleData.map(p => p.y);
                let vMax = Math.max(...prices), vMin = Math.min(...prices);

                chart.data.datasets.forEach(ds => {
                    if (ds.label && ds.label.includes('成本')) {
                        const costVal = ds.data[0]?.y;
                        if (costVal && costVal <= vMax * 1.2 && costVal >= vMin * 0.8) {
                            vMax = Math.max(vMax, costVal); vMin = Math.min(vMin, costVal);
                        }
                    }
                });
                const padding = (vMax - vMin) * 0.1 || vMax * 0.05;
                yAxis.options.min = vMin - padding; yAxis.options.max = vMax + padding;
                chart.update('none');
            }
        }

        function handleFocus(el) { if (el.value === "0") el.value = ""; else el.select(); }
        function animateNumber(el, to) {
            const start = Number(el.dataset.val || 0), duration = 400, startTime = performance.now();
            function tick(now) {
                const progress = Math.min((now - startTime) / duration, 1);
                const val = start + (to - start) * (1 - Math.pow(1 - progress, 3));
                el.innerText = '¥' + Math.round(val).toLocaleString();
                if (progress < 1) requestAnimationFrame(tick); else el.dataset.val = to;
            }
            requestAnimationFrame(tick);
        }

        function calculateOnly() {
            let totalCost = 0, totalShares = 0;
            const currentPrice = +document.getElementById('price').value || 0;
            holdingsData.forEach((d, i) => {
                const cost = d.shares * d.price, profit = (d.shares * currentPrice) - cost;
                const rate = cost ? (profit / cost * 100).toFixed(2) : '0.00';
                totalCost += cost; totalShares += d.shares;
                const pEl = document.getElementById(`p-${i}`), rEl = document.getElementById(`r-${i}`);
                if (pEl && rEl) {
                    pEl.innerText = (profit >= 0 ? '+' : '') + Math.round(profit); pEl.className = `item-profit ${profit >= 0 ? 'red' : 'green'}`;
                    rEl.innerText = rate + '%'; rEl.className = `item-rate ${profit >= 0 ? 'red' : 'green'}`;
                }
            });
            const totalValue = totalShares * currentPrice, totalProfit = totalValue - totalCost;
            const totalRate = totalCost ? (totalProfit / totalCost * 100).toFixed(2) : '0.00';
            animateNumber(document.getElementById('profit'), totalProfit);
            document.getElementById('profit').className = `big-num ${totalProfit >= 0 ? 'red' : 'green'}`;
            const rateEl = document.getElementById('rate');
            rateEl.innerText = (totalProfit >= 0 ? '+' : '') + totalRate + '%'; rateEl.className = `percent-badge ${totalProfit >= 0 ? 'bg-red' : 'bg-green'}`;
            document.getElementById('cost').innerText = '¥' + Math.round(totalCost).toLocaleString();
            document.getElementById('value').innerText = '¥' + Math.round(totalValue).toLocaleString();
            document.getElementById('breakeven').innerText = totalShares ? (totalCost / totalShares).toFixed(2) : '0.00';
            document.getElementById('total-display').value = totalShares;
            localStorage.setItem('invest_pro_data', JSON.stringify(holdingsData));
            if (currentStockCode && currentKlineData) renderKlineChart(currentKlineData);
        }

        function renderList() {
            const list = document.getElementById('list'); list.innerHTML = '';
            holdingsData.forEach((d, i) => {
                const div = document.createElement('div'); div.className = 'item fade';
                div.innerHTML = `<div class="entry-fields"><input type="number" value="${d.shares}" oninput="updateData(${i},'shares',this.value)" onfocus="handleFocus(this)"><span>股 @</span><input type="number" value="${d.price}" oninput="updateData(${i},'price',this.value)" onfocus="handleFocus(this)"></div><div class="item-right-box"><div class="item-right"><div id="p-${i}" class="item-profit">0</div><div id="r-${i}" class="item-rate">0%</div></div><button class="delete-btn" onclick="removeRecord(${i})">×</button></div>`;
                list.appendChild(div);
            });
            calculateOnly();
        }

        function updateData(i, key, val) { holdingsData[i][key] = +val || 0; calculateOnly(); }
        function addRecord() { holdingsData.push({ shares: 0, price: 0 }); renderList(); }
        function removeRecord(i) {
            const items = document.querySelectorAll('.item');
            items[i].style.opacity = '0'; items[i].style.transform = 'translateX(40px)';
            setTimeout(() => { holdingsData.splice(i, 1); renderList(); }, 250);
        }

        renderList();
        loadHoldings();

        async function loadHoldings() {
            try {
                const response = await fetch((window.API_BASE_URL || '') + '/api/data');
                if (!response.ok) throw new Error('获取失败');
                const responseData = await response.json();
                const select = document.getElementById('stock-select');
                while (select.options.length > 1) select.remove(1);
                responseData.rows.filter(r => !r.isFund).forEach(s => {
                    const option = document.createElement('option');
                    option.value = s.id || s.code; option.textContent = `${s.name || s.code} (${s.shares}股 @ ${s.cost})`;
                    option.dataset.shares = s.shares; option.dataset.cost = s.cost; option.dataset.code = s.code;
                    select.appendChild(option);
                });
            } catch (e) { }
        }

        async function onStockSelectChange(select) {
            const opt = select.options[select.selectedIndex];
            if (!opt.value) return;
            const shares = parseFloat(opt.dataset.shares), cost = parseFloat(opt.dataset.cost), stockCode = opt.dataset.code;
            if (isNaN(shares) || isNaN(cost) || shares <= 0 || cost <= 0) { select.selectedIndex = 0; return; }
            holdingsData.length = 0; holdingsData.push({ shares, price: cost }); renderList();
            if (stockCode) {
                try {
                    const res = await fetch(`${window.API_BASE_URL || ''}/api/quotes?items=${encodeURIComponent(stockCode + ':0')}`);
                    const data = await res.json(), price = data.quotes[`${stockCode}:0`]?.price;
                    if (price > 0) { document.getElementById('price').value = price; calculateOnly(); }
                } catch (e) { }
                showKlineChart(stockCode);
            }
        }

        async function showKlineChart(stockCode) {
            currentStockCode = stockCode; currentWindowStartIndex = null; currentWindowSize = null;
            document.getElementById('chart-card').style.display = 'block';
            document.getElementById('chart-title').textContent = `${stockCode} 走势图`;

            const loadingEl = document.getElementById('chart-loading'), canvasEl = document.getElementById('kline-chart');
            loadingEl.style.display = 'flex'; canvasEl.style.display = 'none';
            loadingEl.innerHTML = '正在加载图表数据...<small>图表数据准备中</small>';
            await loadKlineData(stockCode, currentChartScale);
        }

        // 补回丢失的 changeChartPeriod 函数
        async function changeChartPeriod(scale) {
            if (scale === currentChartScale || !currentStockCode) return;
            document.querySelectorAll('.period-btn').forEach(btn => {
                if (btn.dataset.scale == scale) btn.classList.add('active'); else btn.classList.remove('active');
            });
            currentChartScale = scale; currentWindowStartIndex = null; currentWindowSize = null;
            document.getElementById('chart-subtitle').textContent = `查看 ${getChartPeriodLabel(scale)} 趋势与价格波动`;
            const loadingEl = document.getElementById('chart-loading'), canvasEl = document.getElementById('kline-chart');
            loadingEl.style.display = 'flex'; canvasEl.style.display = 'none';
            loadingEl.innerHTML = '正在加载K线数据...<small>切换到新的周期视图</small>';
            await loadKlineData(currentStockCode, scale);
        }

        async function loadKlineData(stockCode, scale) {
            try {
                let symbol = stockCode.length === 5 ? 'hk' + stockCode : /^[569]/.test(stockCode) ? 'sh' + stockCode : 'sz' + stockCode;
                const url = `${window.API_BASE_URL || ''}/api/kline/${symbol}?scale=${scale}&datalen=${getKlineDataLength(scale)}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const result = await response.json();
                if (!result.success) throw new Error(result.error || '获取图表数据失败');

                const parsedData = parseKlineData(result.data);
                currentKlineData = parsedData;

                const loadingEl = document.getElementById('chart-loading'), canvasEl = document.getElementById('kline-chart');
                canvasEl.style.display = 'block'; loadingEl.style.display = 'none';
                renderKlineChart(parsedData);
            } catch (error) {
                document.getElementById('chart-loading').style.display = 'flex';
                document.getElementById('kline-chart').style.display = 'none';
                document.getElementById('chart-loading').innerHTML = '加载图表数据失败<small>请稍后重试或检查网络</small>';
            }
        }

        function parseKlineData(klineData) {
            if (!Array.isArray(klineData) || klineData.length === 0) return { labels: [], timestamps: [], closes: [], dates: [] };
            const labels = [], timestamps = [], closes = [], dates = [];
            [...klineData].sort((a, b) => new Date(a.day) - new Date(b.day)).forEach(item => {
                const date = new Date(item.day), timestamp = date.getTime(), close = parseFloat(item.close);
                if (!Number.isNaN(timestamp) && Number.isFinite(close)) {
                    labels.push(item.day); timestamps.push(timestamp); dates.push(item.day); closes.push(close);
                }
            });
            return { labels, timestamps, closes, dates };
        }

        function getChartTimeUnit(scale) { return scale >= 7200 ? 'month' : scale >= 1200 ? 'week' : 'day'; }

        function resetChartZoom() {
            if (!klineChart) return;
            currentRangePreset = null; currentWindowStartIndex = null; currentWindowSize = null;
            if (currentKlineData) renderKlineChart(currentKlineData);
        }

        function renderKlineChart(chartData) {
            const canvas = document.getElementById('kline-chart');
            if (!canvas || !chartData.timestamps || chartData.timestamps.length === 0) return;
            const ctx = canvas.getContext('2d');
            if (klineChart) klineChart.destroy();

            const xValues = chartData.timestamps, costPrices = getHistoricalBreakevenPrices();
            const costDatasets = costPrices.map((cp, idx) => {
                const isLatest = idx === costPrices.length - 1;
                const lineColors = ['rgba(245, 158, 11, 0.95)', 'rgba(16, 185, 129, 0.95)', 'rgba(139, 92, 246, 0.95)'];
                return {
                    type: 'line', label: cp.label, data: xValues.map(t => ({ x: t, y: cp.price })),
                    borderColor: lineColors[idx % lineColors.length], borderWidth: isLatest ? 2 : 1.5,
                    borderDash: isLatest ? [] : [6, 6], pointRadius: 0, pointHitRadius: 8, fill: false, tension: 0, order: isLatest ? -1 : 0
                };
            });

            const configData = {
                datasets: [
                    {
                        label: '收盘价', data: xValues.map((t, i) => ({ x: t, y: chartData.closes[i] })),
                        borderColor: 'rgb(0, 122, 255)', backgroundColor: 'rgba(0, 122, 255, 0.1)',
                        borderWidth: 2, fill: true, tension: 0.15, pointRadius: 0, pointHitRadius: 10, order: 1
                    }, ...costDatasets
                ]
            };

            const rangeMaxCount = Math.min(getRangeCount(currentRangePreset, currentChartScale), xValues.length);
            const visibleCount = Math.max(Math.min(currentWindowSize == null ? Math.min(getDefaultVisibleCount(currentChartScale), rangeMaxCount) : currentWindowSize, rangeMaxCount, xValues.length), Math.min(getMinimumWindowCount(currentChartScale), rangeMaxCount));
            const startIndex = currentWindowStartIndex == null ? Math.max(0, xValues.length - visibleCount) : clampChartWindowStart(currentWindowStartIndex, xValues.length, visibleCount);

            const initialMinX = visibleCount > 0 ? xValues[startIndex] : undefined;
            const initialMaxX = visibleCount > 0 ? xValues[Math.min(xValues.length - 1, startIndex + visibleCount - 1)] : undefined;

            const visibleCloses = chartData.closes.slice(startIndex, startIndex + visibleCount);
            let initialMaxY = Math.max(...visibleCloses), initialMinY = Math.min(...visibleCloses);
            costPrices.forEach(cp => {
                if (cp.price <= initialMaxY * 1.2 && cp.price >= initialMinY * 0.8) {
                    initialMaxY = Math.max(initialMaxY, cp.price); initialMinY = Math.min(initialMinY, cp.price);
                }
            });
            const pricePadding = (initialMaxY - initialMinY) * 0.1 || initialMaxY * 0.05;

            klineChart = new Chart(ctx, {
                type: 'line', data: configData,
                options: {
                    responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false, axis: 'x' },
                    plugins: {
                        legend: { display: false },
                        zoom: {
                            pan: { enabled: true, mode: 'x', onPan: ({ chart }) => updateYAxisRange(chart) },
                            zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x', onZoom: ({ chart }) => updateYAxisRange(chart) },
                            limits: { x: { min: xValues[0], max: xValues[xValues.length - 1], minRange: 1000 * 60 * 60 * 24 * 7 } }
                        },
                        tooltip: {
                            displayColors: false, backgroundColor: 'rgba(248, 250, 252, 0.96)', titleColor: '#0f172a', bodyColor: '#334155', borderColor: 'rgba(148, 163, 184, 0.25)', borderWidth: 1, padding: 12,
                            callbacks: {
                                title: (items) => items[0] ? chartData.dates[items[0].dataIndex] : '',
                                label: (context) => context.dataset.label.includes('成本') ? `${context.dataset.label}: ${context.parsed.y.toFixed(2)}` : `收盘价: ${context.parsed.y.toFixed(2)}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time', min: initialMinX, max: initialMaxX,
                            // 注意这里：直接使用 displayFormats，不依赖外部语言包了，绝对不会再报错
                            time: { unit: getChartTimeUnit(currentChartScale), tooltipFormat: 'yyyy-MM-dd', displayFormats: { day: 'MM-dd', week: 'yy年MM月', month: 'yyyy-MM', quarter: 'yyyy年' } },
                            ticks: { color: '#94a3b8', maxRotation: 0, autoSkip: true, maxTicksLimit: 5, font: { size: 10 } },
                            grid: { color: 'rgba(148, 163, 184, 0.1)', drawBorder: false }
                        },
                        y: {
                            position: 'right', min: Math.max(0, initialMinY - pricePadding), max: initialMaxY + pricePadding,
                            ticks: { color: '#94a3b8', callback: value => value.toFixed(2) }, grid: { color: 'rgba(148, 163, 184, 0.05)', drawBorder: false }
                        }
                    }
                }
            });
        }
    </script>
</body>
