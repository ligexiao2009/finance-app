<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="投资助手">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>投资管理 Pro</title>
<style>
:root {
  --system-red: #ff3b30;
  --system-green: #34c759;
  --system-blue: #007aff;
  --bg-color: #f2f2f7;
  --card-bg: rgba(255, 255, 255, 0.7);
  --input-bg: rgba(255, 255, 255, 0.8);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  background-color: var(--bg-color);
  background: radial-gradient(at 0% 0%, rgba(0,122,255,0.05) 0px, transparent 50%),
              radial-gradient(at 100% 100%, rgba(255,59,48,0.05) 0px, transparent 50%),
              var(--bg-color);
  min-height: 100vh;
  color: #1c1c1e;
}

.container { max-width: 440px; margin: auto; padding: 24px 16px; }

/* 头部资产概览卡片 */
.main-card {
  background: var(--card-bg);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-radius: 28px;
  padding: 24px;
  margin-bottom: 20px;
  border: 1px solid rgba(255, 255, 255, 0.7);
  box-shadow: 0 10px 40px rgba(0,0,0,0.06);
}

.header-label { font-size: 13px; color: #8e8e93; font-weight: 500; margin-bottom: 4px; }
.profit-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 20px; }
.big-num { font-size: 40px; font-weight: 700; letter-spacing: -1px; }
.percent-badge { 
  font-size: 14px; font-weight: 600; padding: 2px 8px; border-radius: 8px;
  background: rgba(0,0,0,0.05);
}

/* KPI 网格 */
.kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.kpi {
  background: rgba(255,255,255,0.5);
  padding: 12px 8px;
  border-radius: 16px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.4);
}
.kpi .v { font-size: 15px; font-weight: 600; color: #1c1c1e; font-variant-numeric: tabular-nums; }
.kpi .l { font-size: 11px; color: #8e8e93; margin-top: 4px; }

/* 核心输入区 */
.price-input-group {
  display: flex;
  background: rgba(0,0,0,0.04);
  padding: 4px;
  border-radius: 14px;
}
.input-wrapper { flex: 1; position: relative; }
.input-wrapper::before {
  content: attr(data-label);
  position: absolute; left: 12px; top: 8px;
  font-size: 10px; color: #8e8e93; text-transform: uppercase;
}
.price-input-group input {
  width: 100%; padding: 22px 12px 8px; border: none; background: transparent;
  font-size: 17px; font-weight: 600; color: var(--system-blue);
}

/* 列表部分 */
.list-card {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 28px;
  padding: 8px 20px;
  border: 1px solid rgba(255,255,255,0.7);
}
.item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 0; border-bottom: 0.5px solid rgba(0,0,0,0.1);
}
.item:last-child { border: none; }

.entry-fields { display: flex; gap: 8px; align-items: center; }
.entry-fields input {
  width: 75px; padding: 8px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.05);
  background: white; font-size: 14px; text-align: center; font-weight: 500;
}
.entry-fields span { font-size: 12px; color: #c7c7cc; }

.item-right { text-align: right; }
.item-profit { font-size: 16px; font-weight: 600; }
.item-rate { font-size: 11px; font-weight: 500; margin-top: 2px; }

/* 按钮 */
.add-btn {
  width: 100%; padding: 16px; border-radius: 20px; border: none;
  background: var(--system-blue); color: white;
  margin-top: 16px; font-size: 16px; font-weight: 600;
  box-shadow: 0 4px 15px rgba(0,122,255,0.3);
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.add-btn:active { transform: scale(0.97); opacity: 0.9; }

/* 工具类 */
.red { color: var(--system-red) !important; }
.green { color: var(--system-green) !important; }
.bg-red { background: rgba(255,59,48,0.1) !important; color: var(--system-red) !important; }
.bg-green { background: rgba(52,199,89,0.1) !important; color: var(--system-green) !important; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade { animation: slideUp 0.4s ease-out; }
</style>
</head>
<body>

<div class="container">
  <div class="main-card">
    <div class="header-label">预估总盈亏</div>
    <div class="profit-row">
      <div id="profit" class="big-num red">¥0</div>
      <div id="rate" class="percent-badge bg-red">0%</div>
    </div>

    <div class="kpis">
      <div class="kpi"><div id="cost" class="v">¥0</div><div class="l">持仓成本</div></div>
      <div class="kpi"><div id="value" class="v">¥0</div><div class="l">当前市值</div></div>
      <div class="kpi"><div id="breakeven" class="v">0.00</div><div class="l">保本价</div></div>
    </div>

    <div class="price-input-group">
      <div class="input-wrapper" data-label="实时价格">
        <input type="number" id="price" value="170" step="0.01" oninput="render()" />
      </div>
      <div style="width:1px; background:rgba(0,0,0,0.1); margin:8px 0;"></div>
      <div class="input-wrapper" data-label="对比仓位">
        <input type="number" id="total" value="1400" readonly />
      </div>
    </div>
  </div>

  <div class="list-card">
    <div id="list"></div>
  </div>

  <button class="add-btn" onclick="add()">+ 新增补仓记录</button>
</div>

<script>
// 初始化数据 (引用自你的持仓记录)
let data=[
  {shares:700, price:141},
  {shares:700, price:100}
]

function animateNumber(el, to) {
  const start = Number(el.dataset.val || 0);
  const duration = 400;
  const startTime = performance.now();

  function tick(now) {
    const progress = Math.min((now - startTime) / duration, 1);
    const easeOut = 1 - Math.pow(1 - progress, 3); // 减速曲线
    const val = start + (to - start) * easeOut;
    
    el.innerText = '¥' + Math.round(val).toLocaleString();
    if (progress < 1) requestAnimationFrame(tick);
    else el.dataset.val = to;
  }
  requestAnimationFrame(tick);
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  let totalCost = 0;
  let totalShares = 0;
  const currentPrice = +document.getElementById('price').value || 0;

  data.forEach((d, i) => {
    const cost = d.shares * d.price;
    const value = d.shares * currentPrice;
    const profit = value - cost;
    const rate = cost ? (profit / cost * 100).toFixed(2) : 0;

    totalCost += cost;
    totalShares += d.shares;

    const div = document.createElement('div');
    div.className = 'item fade';
    div.innerHTML = `
      <div class="entry-fields">
        <input type="number" value="${d.shares}" onchange="update(${i},'shares',this.value)" placeholder="股数">
        <span>@</span>
        <input type="number" value="${d.price}" onchange="update(${i},'price',this.value)" placeholder="单价">
      </div>
      <div class="item-right">
        <div class="item-profit ${profit >= 0 ? 'red' : 'green'}">
          ${profit >= 0 ? '+' : ''}${Math.round(profit)}
        </div>
        <div class="item-rate ${profit >= 0 ? 'red' : 'green'}">${rate}%</div>
      </div>
    `;
    list.appendChild(div);
  });

  const totalValue = totalShares * currentPrice;
  const totalProfit = totalValue - totalCost;
  const totalRate = totalCost ? (totalProfit / totalCost * 100).toFixed(2) : 0;

  // 更新UI
  animateNumber(document.getElementById('profit'), totalProfit);
  
  const rateEl = document.getElementById('rate');
  rateEl.innerText = (totalProfit >= 0 ? '+' : '') + totalRate + '%';
  rateEl.className = `percent-badge ${totalProfit >= 0 ? 'bg-red' : 'bg-green'}`;
  
  const profitEl = document.getElementById('profit');
  profitEl.className = `big-num ${totalProfit >= 0 ? 'red' : 'green'}`;

  document.getElementById('cost').innerText = '¥' + Math.round(totalCost).toLocaleString();
  document.getElementById('value').innerText = '¥' + Math.round(totalValue).toLocaleString();
  document.getElementById('breakeven').innerText = totalShares ? (totalCost / totalShares).toFixed(2) : '0.00';
  document.getElementById('total').value = totalShares;
}

function update(i, key, val) {
  data[i][key] = +val || 0;
  render();
}

function add() {
  data.push({shares: 0, price: 0});
  render();
}

// 首次渲染
render();
</script>

</body>
</html>
