<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>投资管理 Pro</title>

    <!-- <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script> -->

    <style>
        :root {
            --system-red: #ff3b30;
            --system-green: #34c759;
            --system-blue: #007aff;
            --bg-color: #f2f2f7;
            --card-bg: rgba(255, 255, 255, 0.8);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(at 0% 0%, rgba(0, 122, 255, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 59, 48, 0.05) 0px, transparent 50%),
                var(--bg-color);
            min-height: 100vh;
            color: #1c1c1e;
        }

        .container {
            max-width: 440px;
            margin: auto;
            padding: 20px 16px;
        }

        /* 主资产卡片 */
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
        }

        .header-label {
            font-size: 13px;
            color: #8e8e93;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .profit-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 20px;
        }

        .big-num {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: -1.2px;
            transition: color 0.3s;
        }

        .percent-badge {
            font-size: 14px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        /* KPI 指标卡片 */
        .kpis {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .kpi {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            padding: 12px 6px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.4), 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .kpi .v {
            font-size: 14px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .kpi .l {
            font-size: 10px;
            color: #8e8e93;
            margin-top: 4px;
            font-weight: 500;
        }

        /* 头部价格输入（缩小版） */
        .price-input-group {
            display: flex;
            background: rgba(0, 0, 0, 0.05);
            padding: 5px;
            border-radius: 14px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-wrapper::before {
            content: attr(data-label);
            position: absolute;
            left: 12px;
            top: 8px;
            font-size: 10px;
            color: #8e8e93;
            font-weight: 600;
        }

        .price-input-group input {
            width: 100%;
            padding: 22px 12px 8px;
            border: none;
            background: transparent;
            font-size: 18px;
            font-weight: 700;
            color: var(--system-blue);
            outline: none;
        }

        /* 列表记录 */
        .list-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 4px 16px;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
        }

        .item:last-child {
            border: none;
        }

        /* 列表中的输入框（缩小版） */
        .entry-fields {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .entry-fields input {
            width: 72px;
            padding: 8px 6px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            background: white;
            font-size: 15px;
            text-align: center;
            font-weight: 700;
            outline: none;
        }

        .entry-fields span {
            font-size: 12px;
            color: #c7c7cc;
            font-weight: 600;
        }

        .item-right-box {
            display: flex;
            align-items: center;
        }

        .item-right {
            text-align: right;
            min-width: 80px;
        }

        .item-profit {
            font-size: 16px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .item-rate {
            font-size: 11px;
            margin-top: 2px;
            font-weight: 600;
        }

        .delete-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 59, 48, 0.1);
            color: var(--system-red);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin-left: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .delete-btn:active {
            background: var(--system-red);
            color: white;
            transform: scale(0.9);
        }

        .add-btn {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            border: none;
            background: var(--system-blue);
            color: white;
            margin-top: 16px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.25);
        }

        .add-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* 状态色 */
        .red {
            color: var(--system-red);
        }

        .green {
            color: var(--system-green);
        }

        .bg-red {
            background: rgba(255, 59, 48, 0.1);
            color: var(--system-red);
        }

        .bg-green {
            background: rgba(52, 199, 89, 0.1);
            color: var(--system-green);
        }

        .fade {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* K线图容器
        .chart-card {
            background:
                radial-gradient(circle at top right, rgba(96, 165, 250, 0.12), transparent 28%),
                linear-gradient(180deg, #12192d 0%, #0d1427 100%);
            border-radius: 30px;
            padding: 18px;
            margin-top: 16px;
            border: 1px solid rgba(148, 163, 184, 0.14);
            box-shadow: 0 22px 52px rgba(2, 6, 23, 0.28);
            display: none; /* 默认隐藏，选择股票后显示 */
            overflow: hidden;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 14px;
        }

        .chart-title-wrap {
            min-width: 0;
        }

        .chart-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            background: rgba(96, 165, 250, 0.14);
            color: #93c5fd;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin-bottom: 10px;
        }

        .chart-eyebrow::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 0 4px rgba(147, 197, 253, 0.12);

        .chart-title {
            font-size: 18px;
            font-weight: 700;
            color: #f8fafc;
            line-height: 1.2;
            letter-spacing: -0.03em;
        }

        .chart-subtitle {
            margin-top: 6px;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 500;
        }

        .chart-controls {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .chart-period {
            display: flex;
            gap: 6px;
            padding: 4px;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .period-btn {
            min-width: 58px;
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid transparent;
            background: transparent;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .period-btn.active {
            background: linear-gradient(180deg, #1e90ff 0%, #007aff 100%);
            color: white;
            border-color: var(--system-blue);
            box-shadow: 0 10px 18px rgba(0, 122, 255, 0.22);
        }

        .period-btn:not(.active):hover {
            background: rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
        }

        .chart-reset-btn {
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(15, 23, 42, 0.55);
            color: #cbd5e1;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .chart-reset-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
        }

        .chart-range {
            display: flex;
            gap: 6px;
            padding: 4px;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.16);
        }

        .range-btn {
            min-width: 62px;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid transparent;
            background: transparent;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .range-btn.active {
            background: rgba(96, 165, 250, 0.18);
            border-color: rgba(96, 165, 250, 0.28);
            color: #e0f2fe;
        }

        .range-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
        }

        .chart-container {
            position: relative;
            height: 330px;
            width: 100%;
            padding: 14px 12px 8px;
            border-radius: 24px;
            background:
                radial-gradient(circle at top right, rgba(59, 130, 246, 0.12), transparent 26%),
                linear-gradient(180deg, #12192d 0%, #10182b 100%);
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .chart-navigator {
            margin-top: 10px;
            padding: 10px 12px 12px;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.12);
        }

        .chart-navigator[hidden] {
            display: none;
        }

        .chart-nav-top {
            position: relative;
            height: 38px;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.04);
        }

        #kline-overview {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .chart-nav-selection {
            position: absolute;
            top: 2px;
            bottom: 2px;
            border-radius: 8px;
            background: rgba(96, 165, 250, 0.18);
            border: 1px solid rgba(147, 197, 253, 0.55);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
            pointer-events: none;
        }

        .chart-nav-selection::before,
        .chart-nav-selection::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 4px;
            height: 16px;
            margin-top: -8px;
            border-radius: 999px;
            background: rgba(241, 245, 249, 0.9);
        }

        .chart-nav-selection::before {
            left: 6px;
        }

        .chart-nav-selection::after {
            right: 6px;
        }

        .chart-nav-slider {
            margin-top: 10px;
        }

        .chart-nav-zoom {
            margin-top: 10px;
        }

        .chart-nav-caption {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            color: #94a3b8;
            font-size: 11px;
            font-weight: 700;
        }

        .chart-nav-slider input[type="range"],
        .chart-nav-zoom input[type="range"] {
            width: 100%;
            margin: 0;
            background: transparent;
            appearance: none;
            -webkit-appearance: none;
        }

        .chart-nav-slider input[type="range"]::-webkit-slider-runnable-track,
        .chart-nav-zoom input[type="range"]::-webkit-slider-runnable-track {
            height: 6px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.22);
        }

        .chart-nav-slider input[type="range"]::-webkit-slider-thumb,
        .chart-nav-zoom input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            margin-top: -6px;
            border-radius: 50%;
            border: 2px solid rgba(191, 219, 254, 0.95);
            background: #60a5fa;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.28);
        }

        .chart-nav-slider input[type="range"]::-moz-range-track,
        .chart-nav-zoom input[type="range"]::-moz-range-track {
            height: 6px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.22);
        }

        .chart-nav-slider input[type="range"]::-moz-range-thumb,
        .chart-nav-zoom input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(191, 219, 254, 0.95);
            background: #60a5fa;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.28);
        }

        .chart-nav-labels {
            display: flex;
            justify-content: space-between;

        .chart-container::before {

        #kline-chart {

            font-weight: 600;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .chart-loading small {
            font-size: 12px;

            color: #64748b;
        }

        @media (max-width: 480px) {
            .chart-header {
                flex-direction: column;
            }

            .chart-period {
                width: 100%;
            }

            .period-btn {
                flex: 1;
            }

            .chart-controls {
                width: 100%;
            }

            .chart-reset-btn {
                width: 100%;
            }

            .chart-container {
                height: 300px;
            }
        }
        */
    </style>
    <script src="app-config.js"></script>
</head>

<body>

    <div class="container">
        <div class="main-card">
            <div class="header-label">预计总盈亏</div>
            <div class="profit-row">
                <div id="profit" class="big-num red">¥0</div>
                <div id="rate" class="percent-badge bg-red">0.00%</div>
            </div>

            <div class="kpis">
                <div class="kpi">
                    <div id="cost" class="v">¥0</div>
                    <div class="l">总成本</div>
                </div>
                <div class="kpi">
                    <div id="value" class="v">¥0</div>
                    <div class="l">当前市值</div>
                </div>
                <div class="kpi">
                    <div id="breakeven" class="v">0.00</div>
                    <div class="l">回本单价</div>
                </div>
            </div>

            <div class="price-input-group">
                <div class="input-wrapper" data-label="市场单价">
                    <input type="number" id="price" value="170" step="0.01" oninput="calculateOnly()"
                        onfocus="handleFocus(this)">
                </div>
                <div style="width:1px; background:rgba(0,0,0,0.08); margin:10px 0;"></div>
                <div class="input-wrapper" data-label="累计持仓">
                    <input type="number" id="total-display" value="0" readonly>
                </div>
            </div>
        </div>

        <div class="list-card" style="margin-bottom: 12px; padding: 16px;">
            <div style="flex: 1;">
                <select id="stock-select" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: white; font-size: 14px; font-weight: 600; outline: none; color: #1c1c1e;" onchange="onStockSelectChange(this)">
                    <option value="">选择持仓股票...</option>
                </select>
            </div>
        </div>

        <div class="list-card">
            <div id="list"></div>
        </div>

        <button class="add-btn" onclick="addRecord()">+ 新增补仓记录</button>

        <!-- K线图前端区域已注释，恢复时取消整个块的注释
        <div class="chart-card" id="chart-card">
            <div class="chart-header">
                <div class="chart-title-wrap">
                    <div class="chart-eyebrow">趋势图表</div>
                    <div class="chart-title" id="chart-title">K线图</div>
                    <div class="chart-subtitle" id="chart-subtitle">查看最近一段时间的价格波动，可缩放时间范围</div>
                </div>
                <div class="chart-controls">
                    <div class="chart-period">
                        <button class="period-btn active" data-scale="240" onclick="changeChartPeriod(240)">日线</button>
                        <button class="period-btn" data-scale="1200" onclick="changeChartPeriod(1200)">周K</button>
                        <button class="period-btn" data-scale="7200" onclick="changeChartPeriod(7200)">月K</button>
                    </div>
                    <div class="chart-range">
                        <button class="range-btn" type="button" data-range="2y" onclick="setChartRange('2y')">近2年</button>
                        <button class="range-btn" type="button" data-range="5y" onclick="setChartRange('5y')">近5年</button>
                    </div>
                    <button class="chart-reset-btn" type="button" onclick="resetChartZoom()">重置范围</button>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="kline-chart"></canvas>
                <div class="chart-loading" id="chart-loading">正在加载K线数据...</div>
            </div>
            <div class="chart-navigator" id="chart-navigator" hidden>
                <div class="chart-nav-top">
                    <canvas id="kline-overview"></canvas>
                    <div class="chart-nav-selection" id="chart-nav-selection"></div>
                </div>
                <div class="chart-nav-slider">
                    <div class="chart-nav-caption">
                        <span>平移窗口</span>
                        <span id="chart-window-caption">最近区间</span>
                    </div>
                    <input id="chart-window-slider" type="range" min="0" max="0" step="1" value="0" oninput="handleChartWindowSlide(this.value)">

                    <input id="chart-window-size-slider" type="range" min="20" max="120" step="1" value="60" oninput="handleChartZoomSlide(this.value)">

                </div>
            </div>
        </div>
        -->
    </div>

        function animateNumber(el, to) {
            const start = Number(el.dataset.val || 0);
            const duration = 400;
            const startTime = performance.now();

            function tick(now) {
                const progress = Math.min((now - startTime) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                const val = start + (to - start) * ease;
                el.innerText = '¥' + Math.round(val).toLocaleString();
                if (progress < 1) requestAnimationFrame(tick);
                else el.dataset.val = to;
            }
            requestAnimationFrame(tick);

                const profit = (d.shares * currentPrice) - cost;
                const rate = cost ? (profit / cost * 100).toFixed(2) : '0.00';

                totalCost += cost;
                totalShares += d.shares;

                const itemProfitEl = document.getElementById(`p-${i}`);

            const totalValue = totalShares * currentPrice;
            const totalProfit = totalValue - totalCost;
            const totalRate = totalCost ? (totalProfit / totalCost * 100).toFixed(2) : '0.00';

            animateNumber(document.getElementById('profit'), totalProfit);

        function drawOverviewChart(data) {
            const canvas = document.getElementById('kline-overview');
            if (!canvas) return;

            const width = canvas.clientWidth || canvas.parentElement?.clientWidth || 0;
            const height = canvas.clientHeight || 38;
            if (!width || !height) return;

            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.round(width * dpr);
            canvas.height = Math.round(height * dpr);

            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, width, height);

            const values = data.closes || [];
            if (values.length < 2) return;

            const min = Math.min(...values);
            const max = Math.max(...values);
            const range = Math.max(max - min, 0.01);

            ctx.beginPath();
            values.forEach((value, index) => {
                const x = (index / (values.length - 1)) * width;
                const y = height - ((value - min) / range) * (height - 6) - 3;
                if (index === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.strokeStyle = 'rgba(96, 165, 250, 0.9)';
            ctx.lineWidth = 1.25;
            ctx.stroke();

            ctx.lineTo(width, height - 2);
            ctx.lineTo(0, height - 2);
            ctx.closePath();
            ctx.fillStyle = 'rgba(96, 165, 250, 0.10)';
            ctx.fill();
        }
